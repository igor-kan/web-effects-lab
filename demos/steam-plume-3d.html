<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steam Plume 3D</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0f1a;
        font-family: "Segoe UI", sans-serif;
        color: #e8f2ff;
      }

      #stage {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: 470px;
        background: rgba(9, 17, 30, 0.58);
        border: 1px solid rgba(160, 208, 255, 0.28);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
        opacity: 0.92;
      }

      .home {
        color: #9ecfff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Steam Plume 3D</h1>
      <p>
        Drag to orbit, wheel to zoom, press <strong>S</strong> to toggle steam density,
        press <strong>W</strong> to toggle wind.
      </p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";

      const canvas = document.getElementById("stage");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b1320);
      scene.fog = new THREE.Fog(0x0b1320, 8, 45);

      const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 120);

      const orbit = {
        target: new THREE.Vector3(0, 3.0, 0),
        theta: 0.65,
        phi: 1.0,
        radius: 13,
        dragging: false,
        px: 0,
        py: 0,
      };

      function updateCamera() {
        orbit.phi = Math.max(0.24, Math.min(Math.PI - 0.2, orbit.phi));
        orbit.radius = Math.max(6, Math.min(24, orbit.radius));

        const sp = Math.sin(orbit.phi);
        camera.position.set(
          orbit.target.x + orbit.radius * sp * Math.sin(orbit.theta),
          orbit.target.y + orbit.radius * Math.cos(orbit.phi),
          orbit.target.z + orbit.radius * sp * Math.cos(orbit.theta)
        );
        camera.lookAt(orbit.target);
      }

      const hemi = new THREE.HemisphereLight(0xd9ebff, 0x2f3b42, 0.7);
      scene.add(hemi);

      const key = new THREE.DirectionalLight(0xffffff, 0.9);
      key.position.set(6, 10, 3);
      scene.add(key);

      const fill = new THREE.PointLight(0x7da7ff, 1.5, 36, 2);
      fill.position.set(-5, 4, -3);
      scene.add(fill);

      const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.8, 1.2, 1.3, 40),
        new THREE.MeshStandardMaterial({ color: 0x2e3a46, roughness: 0.88, metalness: 0.1 })
      );
      base.position.y = 0.65;
      scene.add(base);

      const floor = new THREE.Mesh(
        new THREE.CircleGeometry(18, 80),
        new THREE.MeshStandardMaterial({ color: 0x1a2433, roughness: 0.95, metalness: 0.04 })
      );
      floor.rotation.x = -Math.PI * 0.5;
      scene.add(floor);

      const PARTICLE_COUNT = 2600;
      const pos = new Float32Array(PARTICLE_COUNT * 3);
      const sizes = new Float32Array(PARTICLE_COUNT);
      const alphas = new Float32Array(PARTICLE_COUNT);

      const seeds = Array.from({ length: PARTICLE_COUNT }, () => ({
        phase: Math.random() * Math.PI * 2,
        swirl: 0.6 + Math.random() * 1.6,
        baseR: Math.random() * 0.9,
        speed: 0.4 + Math.random() * 0.9,
      }));

      function resetParticle(i, randY = true) {
        const angle = Math.random() * Math.PI * 2;
        const r = Math.random() * 0.35;
        const y = randY ? Math.random() * 8.8 : 0;

        pos[i * 3] = Math.cos(angle) * r;
        pos[i * 3 + 1] = y;
        pos[i * 3 + 2] = Math.sin(angle) * r;

        sizes[i] = 10 + Math.random() * 25;
        alphas[i] = 0.05 + Math.random() * 0.35;
      }

      for (let i = 0; i < PARTICLE_COUNT; i += 1) {
        resetParticle(i);
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
      geo.setAttribute("aSize", new THREE.BufferAttribute(sizes, 1));
      geo.setAttribute("aAlpha", new THREE.BufferAttribute(alphas, 1));

      const mat = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        blending: THREE.NormalBlending,
        uniforms: {
          uColorA: { value: new THREE.Color(0xdceaf3) },
          uColorB: { value: new THREE.Color(0x89a5bd) },
          uDensity: { value: 1.0 },
        },
        vertexShader: `
          attribute float aSize;
          attribute float aAlpha;
          varying float vAlpha;
          varying float vY;

          uniform float uDensity;

          void main() {
            vec4 mv = modelViewMatrix * vec4(position, 1.0);
            float depthScale = clamp(260.0 / -mv.z, 0.0, 40.0);
            gl_PointSize = aSize * depthScale * (0.35 + uDensity * 0.65);
            vAlpha = aAlpha;
            vY = position.y;
            gl_Position = projectionMatrix * mv;
          }
        `,
        fragmentShader: `
          precision mediump float;
          varying float vAlpha;
          varying float vY;
          uniform vec3 uColorA;
          uniform vec3 uColorB;
          uniform float uDensity;

          void main() {
            vec2 uv = gl_PointCoord - 0.5;
            float d = length(uv);
            if (d > 0.5) discard;

            float soft = smoothstep(0.5, 0.0, d);
            float core = smoothstep(0.24, 0.0, d);
            vec3 color = mix(uColorB, uColorA, clamp(vY / 9.0, 0.0, 1.0));
            color += core * 0.18;

            float alpha = soft * vAlpha * (0.5 + uDensity * 0.6);
            gl_FragColor = vec4(color, alpha);
          }
        `,
      });

      const steam = new THREE.Points(geo, mat);
      steam.position.y = 0.8;
      scene.add(steam);

      let windEnabled = true;
      let dense = true;

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "w") windEnabled = !windEnabled;
        if (key === "s") {
          dense = !dense;
          mat.uniforms.uDensity.value = dense ? 1.0 : 0.45;
        }
      });

      function pointerDown(x, y) {
        orbit.dragging = true;
        orbit.px = x;
        orbit.py = y;
      }

      function pointerMove(x, y) {
        if (!orbit.dragging) return;
        const dx = x - orbit.px;
        const dy = y - orbit.py;
        orbit.px = x;
        orbit.py = y;
        orbit.theta -= dx * 0.005;
        orbit.phi += dy * 0.0045;
      }

      window.addEventListener("mousedown", (event) => pointerDown(event.clientX, event.clientY));
      window.addEventListener("mousemove", (event) => pointerMove(event.clientX, event.clientY));
      window.addEventListener("mouseup", () => {
        orbit.dragging = false;
      });

      window.addEventListener(
        "touchstart",
        (event) => {
          const t = event.touches[0];
          pointerDown(t.clientX, t.clientY);
        },
        { passive: true }
      );
      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          pointerMove(t.clientX, t.clientY);
        },
        { passive: true }
      );
      window.addEventListener("touchend", () => {
        orbit.dragging = false;
      });

      window.addEventListener("wheel", (event) => {
        orbit.radius += event.deltaY * 0.01;
      });

      let prev = performance.now();
      function animate(now) {
        const dt = Math.min(0.04, (now - prev) / 1000);
        prev = now;

        if (!orbit.dragging) {
          orbit.theta += 0.0009;
        }

        const wind = windEnabled ? Math.sin(now * 0.00055) * 0.35 + Math.cos(now * 0.00027) * 0.22 : 0;

        for (let i = 0; i < PARTICLE_COUNT; i += 1) {
          const b = i * 3;
          const seed = seeds[i];

          let x = pos[b];
          let y = pos[b + 1];
          let z = pos[b + 2];

          const spiral = now * 0.001 * seed.swirl + seed.phase;
          x += (Math.sin(spiral) * 0.0025 + wind * 0.01) * (1 + y * 0.04);
          z += Math.cos(spiral * 0.9) * 0.0024;
          y += dt * (1.5 + seed.speed * 1.8);

          x *= 0.9985;
          z *= 0.9985;

          if (y > 9.8 || Math.abs(x) > 4.8 || Math.abs(z) > 4.8) {
            resetParticle(i, false);
            x = pos[b];
            y = pos[b + 1];
            z = pos[b + 2];
          }

          pos[b] = x;
          pos[b + 1] = y;
          pos[b + 2] = z;
          alphas[i] = (0.15 + Math.sin(spiral * 0.6) * 0.04) * (1 - y / 11);
        }

        geo.attributes.position.needsUpdate = true;
        geo.attributes.aAlpha.needsUpdate = true;

        key.position.set(Math.cos(now * 0.0005) * 8, 10, Math.sin(now * 0.0005) * 8);

        updateCamera();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      updateCamera();
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
