<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volumetric Cloud Chamber 3D</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #050a12;
        color: #ecf7ff;
        font-family: "Segoe UI", sans-serif;
      }

      #stage {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 9;
        max-width: 520px;
        background: rgba(8, 15, 24, 0.6);
        border: 1px solid rgba(162, 215, 255, 0.3);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.35;
        opacity: 0.94;
      }

      .home {
        color: #8fd4ff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Volumetric Cloud Chamber 3D</h1>
      <p>Layered point-cloud fog chamber with animated turbulence, godray planes, and orbital camera.</p>
      <p>
        Drag to orbit, wheel to zoom, click pulse burst, <strong>A</strong> auto-spin,
        <strong>C</strong> color mode, <strong>R</strong> reseed.
      </p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";

      const canvas = document.getElementById("stage");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.2;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x040b12);
      scene.fog = new THREE.FogExp2(0x040b12, 0.075);

      const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 120);

      const orbit = {
        target: new THREE.Vector3(0, 0, 0),
        theta: 0.8,
        phi: 1.1,
        radius: 11,
        dragging: false,
        px: 0,
        py: 0,
      };

      function updateCamera() {
        orbit.radius = Math.max(5, Math.min(22, orbit.radius));
        orbit.phi = Math.max(0.24, Math.min(Math.PI - 0.24, orbit.phi));

        const sinPhi = Math.sin(orbit.phi);
        camera.position.set(
          orbit.target.x + orbit.radius * sinPhi * Math.sin(orbit.theta),
          orbit.target.y + orbit.radius * Math.cos(orbit.phi),
          orbit.target.z + orbit.radius * sinPhi * Math.cos(orbit.theta)
        );
        camera.lookAt(orbit.target);
      }

      const hemi = new THREE.HemisphereLight(0x7dc3ff, 0x081823, 0.7);
      scene.add(hemi);

      const key = new THREE.PointLight(0x5bc3ff, 8, 40, 2);
      key.position.set(4, 2, 3);
      scene.add(key);

      const fill = new THREE.PointLight(0x72ffd9, 5, 40, 2);
      fill.position.set(-4, -1, -3);
      scene.add(fill);

      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(3.7, 0.08, 24, 180),
        new THREE.MeshStandardMaterial({
          color: 0x77d9ff,
          emissive: 0x2aa8ff,
          emissiveIntensity: 1.2,
          roughness: 0.22,
          metalness: 0.8,
          transparent: true,
          opacity: 0.7,
        })
      );
      ring.rotation.x = Math.PI * 0.53;
      scene.add(ring);

      const chamber = new THREE.Mesh(
        new THREE.CylinderGeometry(4.2, 4.2, 7.2, 50, 1, true),
        new THREE.MeshStandardMaterial({
          color: 0x103247,
          emissive: 0x0a1d2b,
          emissiveIntensity: 0.5,
          metalness: 0.18,
          roughness: 0.82,
          transparent: true,
          opacity: 0.2,
          side: THREE.DoubleSide,
        })
      );
      scene.add(chamber);

      const cloudCount = 5200;
      let pointsGeometry;
      let points;
      let positions;
      let phase;

      function reseedCloud() {
        if (points) {
          scene.remove(points);
          points.geometry.dispose();
          points.material.dispose();
        }

        positions = new Float32Array(cloudCount * 3);
        phase = new Float32Array(cloudCount);
        const sizes = new Float32Array(cloudCount);

        for (let i = 0; i < cloudCount; i += 1) {
          const r = Math.pow(Math.random(), 0.45) * 3.4;
          const a = Math.random() * Math.PI * 2;
          const y = (Math.random() - 0.5) * 5.6;
          positions[i * 3] = Math.cos(a) * r;
          positions[i * 3 + 1] = y;
          positions[i * 3 + 2] = Math.sin(a) * r;
          phase[i] = Math.random() * Math.PI * 2;
          sizes[i] = 0.45 + Math.random() * 1.35;
        }

        pointsGeometry = new THREE.BufferGeometry();
        pointsGeometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        pointsGeometry.setAttribute("size", new THREE.BufferAttribute(sizes, 1));

        const material = new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
          uniforms: {
            uTime: { value: 0 },
            uColorA: { value: new THREE.Color(0x5ec4ff) },
            uColorB: { value: new THREE.Color(0x62ffdb) },
            uColorMix: { value: 0.45 },
            uBurst: { value: 0 },
          },
          vertexShader: `
            attribute float size;
            varying float vMix;
            uniform float uTime;

            void main() {
              vec3 p = position;
              float swirl = sin(uTime * 0.55 + p.y * 1.6 + p.x * 0.6) * 0.55;
              p.x += cos(uTime * 0.42 + p.z * 1.8) * 0.12 + swirl * 0.14;
              p.z += sin(uTime * 0.44 + p.x * 1.7) * 0.12 - swirl * 0.14;
              p.y += sin(uTime * 0.72 + (p.x + p.z) * 0.9) * 0.08;

              vec4 mv = modelViewMatrix * vec4(p, 1.0);
              gl_Position = projectionMatrix * mv;
              gl_PointSize = size * (220.0 / -mv.z);
              vMix = clamp((p.y + 3.0) / 6.0, 0.0, 1.0);
            }
          `,
          fragmentShader: `
            precision highp float;
            varying float vMix;
            uniform vec3 uColorA;
            uniform vec3 uColorB;
            uniform float uColorMix;
            uniform float uBurst;

            void main() {
              vec2 uv = gl_PointCoord - 0.5;
              float d = length(uv);
              if (d > 0.5) discard;

              float core = exp(-d * 10.5);
              float rim = exp(-abs(d - 0.34) * 22.0);
              vec3 col = mix(uColorA, uColorB, clamp(vMix + uColorMix * 0.6, 0.0, 1.0));
              col += vec3(0.3, 0.35, 0.45) * uBurst;

              float alpha = (core * 0.85 + rim * 0.3) * (0.6 + uBurst * 0.4);
              gl_FragColor = vec4(col, alpha);
            }
          `,
        });

        points = new THREE.Points(pointsGeometry, material);
        scene.add(points);
      }

      reseedCloud();

      const rayPlanes = [];
      for (let i = 0; i < 5; i += 1) {
        const plane = new THREE.Mesh(
          new THREE.PlaneGeometry(8.2, 4.2),
          new THREE.MeshBasicMaterial({
            color: i % 2 ? 0x5ec4ff : 0x66ffe3,
            transparent: true,
            opacity: 0.08,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
          })
        );
        plane.rotation.y = (Math.PI / 5) * i;
        plane.position.y = (i - 2) * 0.45;
        scene.add(plane);
        rayPlanes.push(plane);
      }

      let autoSpin = true;
      let colorMode = 0;
      let burst = 0;

      function setPalette(mode) {
        const m = points.material;
        if (mode === 0) {
          m.uniforms.uColorA.value.set(0x5ec4ff);
          m.uniforms.uColorB.value.set(0x62ffdb);
          m.uniforms.uColorMix.value = 0.45;
          ring.material.color.set(0x77d9ff);
          ring.material.emissive.set(0x2aa8ff);
        } else if (mode === 1) {
          m.uniforms.uColorA.value.set(0xff9f8a);
          m.uniforms.uColorB.value.set(0xffe784);
          m.uniforms.uColorMix.value = 0.38;
          ring.material.color.set(0xffb28b);
          ring.material.emissive.set(0xff7b4f);
        } else {
          m.uniforms.uColorA.value.set(0xb29dff);
          m.uniforms.uColorB.value.set(0x8af3ff);
          m.uniforms.uColorMix.value = 0.58;
          ring.material.color.set(0xc19fff);
          ring.material.emissive.set(0x6e7dff);
        }
      }

      function onPointerDown(x, y) {
        orbit.dragging = true;
        orbit.px = x;
        orbit.py = y;
      }

      function onPointerMove(x, y) {
        if (!orbit.dragging) return;
        const dx = x - orbit.px;
        const dy = y - orbit.py;
        orbit.px = x;
        orbit.py = y;
        orbit.theta -= dx * 0.005;
        orbit.phi += dy * 0.0042;
      }

      window.addEventListener("mousedown", (event) => onPointerDown(event.clientX, event.clientY));
      window.addEventListener("mousemove", (event) => onPointerMove(event.clientX, event.clientY));
      window.addEventListener("mouseup", () => {
        orbit.dragging = false;
      });

      window.addEventListener(
        "touchstart",
        (event) => {
          const t = event.touches[0];
          onPointerDown(t.clientX, t.clientY);
        },
        { passive: true }
      );
      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          onPointerMove(t.clientX, t.clientY);
        },
        { passive: true }
      );
      window.addEventListener("touchend", () => {
        orbit.dragging = false;
      });

      window.addEventListener("wheel", (event) => {
        orbit.radius += event.deltaY * 0.01;
      });

      window.addEventListener("click", () => {
        burst = Math.min(1.6, burst + 0.9);
      });

      window.addEventListener("keydown", (event) => {
        const keyName = event.key.toLowerCase();
        if (keyName === "a") {
          autoSpin = !autoSpin;
        }
        if (keyName === "c") {
          colorMode = (colorMode + 1) % 3;
          setPalette(colorMode);
        }
        if (keyName === "r") {
          reseedCloud();
          setPalette(colorMode);
        }
      });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const clock = new THREE.Clock();
      setPalette(0);

      function render() {
        const t = clock.getElapsedTime();

        if (autoSpin && !orbit.dragging) {
          orbit.theta += 0.0018;
        }
        updateCamera();

        burst = Math.max(0, burst - 0.02);

        key.position.set(Math.cos(t * 0.7) * 4.8, 1.8 + Math.sin(t * 0.9) * 1.1, Math.sin(t * 0.7) * 4.8);
        fill.position.set(Math.cos(-t * 0.55) * 4.2, -1.4 + Math.cos(t * 0.8) * 0.9, Math.sin(-t * 0.55) * 4.2);

        ring.rotation.z = t * 0.22;
        ring.rotation.y = Math.sin(t * 0.28) * 0.5;
        ring.material.emissiveIntensity = 1 + burst * 1.4 + Math.sin(t * 2.2) * 0.2;

        points.material.uniforms.uTime.value = t;
        points.material.uniforms.uBurst.value = burst;

        for (let i = 0; i < rayPlanes.length; i += 1) {
          const plane = rayPlanes[i];
          plane.rotation.z = t * 0.11 + i * 0.35;
          plane.material.opacity = 0.06 + (Math.sin(t * 1.2 + i * 0.8) * 0.5 + 0.5) * 0.06 + burst * 0.03;
        }

        renderer.render(scene, camera);
        requestAnimationFrame(render);
      }

      render();
    </script>
  </body>
</html>
