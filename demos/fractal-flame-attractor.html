<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fractal Flame Attractor</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #130709;
        color: #fff0e6;
        font-family: "Segoe UI", sans-serif;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 8;
        max-width: 560px;
        background: rgba(29, 12, 11, 0.56);
        border: 1px solid rgba(255, 188, 142, 0.3);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }
      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.35; }
      .home { color: #ffc18f; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Fractal Flame Attractor</h1>
      <p>Chaotic attractor particles rendered as flame trails with color-mapped heat and turbulence.</p>
      <p>Move pointer to warp attractor, click burst heat, <strong>C</strong> palette, <strong>S</strong> speed, <strong>R</strong> reset.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d');

      let width = innerWidth;
      let height = innerHeight;
      let time = 0;
      let burst = 0;
      let palette = 0;
      let speedMode = 1;
      let paused = false;

      const pointer = { x: 0.5, y: 0.5, tx: 0.5, ty: 0.5 };
      const particles = [];
      const COUNT = 2600;

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function resize() {
        width = innerWidth;
        height = innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function resetParticles() {
        particles.length = 0;
        for (let i = 0; i < COUNT; i += 1) {
          particles.push({
            x: (Math.random() - 0.5) * 0.8,
            y: (Math.random() - 0.5) * 0.8,
            z: (Math.random() - 0.5) * 0.8,
            px: 0,
            py: 0,
          });
        }
      }

      function colorMap(t) {
        if (palette === 0) return [255, 110 + t * 120, 30 + t * 40];
        if (palette === 1) return [255, 200 - t * 80, 90 + t * 120];
        if (palette === 2) return [120 + t * 130, 255, 120 + t * 80];
        return [200 + t * 50, 110 + t * 80, 255];
      }

      function stepAttractor(p, dt) {
        const warpX = (pointer.x - 0.5) * 12;
        const warpY = (pointer.y - 0.5) * 12;

        const a = 10 + warpX * 0.4;
        const b = 28 + Math.sin(time * 0.4) * 4 + warpY * 0.6;
        const c = 8 / 3;

        const dx = a * (p.y - p.x);
        const dy = p.x * (b - p.z) - p.y;
        const dz = p.x * p.y - c * p.z;

        p.x += dx * dt;
        p.y += dy * dt;
        p.z += dz * dt;
      }

      function draw() {
        ctx.fillStyle = 'rgba(12, 5, 7, 0.14)';
        ctx.fillRect(0, 0, width, height);

        ctx.globalCompositeOperation = 'lighter';

        const scale = Math.min(width, height) * 0.024;
        const centerX = width * 0.5;
        const centerY = height * 0.54;

        const iterations = speedMode === 0 ? 1 : speedMode === 1 ? 2 : 3;
        const dt = (speedMode === 0 ? 0.0022 : speedMode === 1 ? 0.0035 : 0.0048) * (1 + burst * 0.35);

        for (let n = 0; n < iterations; n += 1) {
          for (const p of particles) {
            const sxPrev = centerX + p.x * scale;
            const syPrev = centerY - p.z * scale + p.y * scale * 0.2;

            stepAttractor(p, dt);

            const sx = centerX + p.x * scale;
            const sy = centerY - p.z * scale + p.y * scale * 0.2;

            const speed = clamp(Math.hypot(sx - sxPrev, sy - syPrev) * 0.4, 0, 1);
            const heat = clamp((p.z + 26) / 55, 0, 1);
            const t = clamp(0.25 + heat * 0.65 + speed * 0.4 + burst * 0.22, 0, 1);
            const [r, g, b] = colorMap(t);

            ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${0.05 + t * 0.3})`;
            ctx.lineWidth = 0.8 + t * 1.1;
            ctx.beginPath();
            ctx.moveTo(sxPrev, syPrev);
            ctx.lineTo(sx, sy);
            ctx.stroke();

            if (!Number.isFinite(p.x) || !Number.isFinite(p.y) || !Number.isFinite(p.z) || Math.abs(p.x) > 60 || Math.abs(p.y) > 60 || Math.abs(p.z) > 60) {
              p.x = (Math.random() - 0.5) * 0.8;
              p.y = (Math.random() - 0.5) * 0.8;
              p.z = (Math.random() - 0.5) * 0.8;
            }
          }
        }

        ctx.globalCompositeOperation = 'source-over';
      }

      let last = performance.now();
      function frame(now) {
        const dt = Math.min(0.033, (now - last) * 0.001);
        last = now;

        pointer.x += (pointer.tx - pointer.x) * 0.08;
        pointer.y += (pointer.ty - pointer.y) * 0.08;

        if (!paused) {
          time += dt;
          burst = Math.max(0, burst - dt * 0.8);
        }

        draw();
        requestAnimationFrame(frame);
      }

      addEventListener('resize', () => {
        resize();
        ctx.fillStyle = '#130709';
        ctx.fillRect(0, 0, width, height);
      });

      addEventListener('mousemove', (event) => {
        pointer.tx = event.clientX / width;
        pointer.ty = event.clientY / height;
      });
      addEventListener('touchmove', (event) => {
        const t = event.touches[0];
        pointer.tx = t.clientX / width;
        pointer.ty = t.clientY / height;
      }, { passive: true });

      addEventListener('click', () => {
        burst = Math.min(1.8, burst + 0.9);
      });

      addEventListener('keydown', (event) => {
        const k = event.key.toLowerCase();
        if (k === 'c') palette = (palette + 1) % 4;
        if (k === 's') speedMode = (speedMode + 1) % 3;
        if (k === 'r') {
          ctx.fillStyle = '#130709';
          ctx.fillRect(0, 0, width, height);
          resetParticles();
        }
        if (k === 'p') paused = !paused;
      });

      resize();
      resetParticles();
      ctx.fillStyle = '#130709';
      ctx.fillRect(0, 0, width, height);
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
