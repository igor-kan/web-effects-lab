<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hologram Particle Statue</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #040915;
        font-family: "Segoe UI", sans-serif;
        color: #e9f6ff;
      }

      #stage {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: 560px;
        background: rgba(9, 16, 30, 0.62);
        border: 1px solid rgba(146, 212, 255, 0.34);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
      }

      .home {
        color: #9fd8ff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Hologram Particle Statue</h1>
      <p>
        Point-cloud hologram statue with scanline shimmer, glitch offsets, and interactive orbit camera.
      </p>
      <p>Drag to orbit, wheel to zoom, click glitch burst, <strong>A</strong> auto-spin, <strong>R</strong> reseed cloud.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";

      const canvas = document.getElementById("stage");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x040915);
      scene.fog = new THREE.Fog(0x040915, 6, 36);

      const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 120);

      const orbit = {
        theta: 0.85,
        phi: 1.1,
        radius: 8.4,
        dragging: false,
        px: 0,
        py: 0,
      };

      function updateCamera() {
        orbit.phi = Math.max(0.22, Math.min(Math.PI - 0.2, orbit.phi));
        orbit.radius = Math.max(4.5, Math.min(18, orbit.radius));

        const sinPhi = Math.sin(orbit.phi);
        camera.position.set(
          orbit.radius * sinPhi * Math.sin(orbit.theta),
          orbit.radius * Math.cos(orbit.phi),
          orbit.radius * sinPhi * Math.cos(orbit.theta)
        );
        camera.lookAt(0, 0.8, 0);
      }

      const baseLight = new THREE.HemisphereLight(0x7ad9ff, 0x1a2740, 0.68);
      scene.add(baseLight);

      const point = new THREE.PointLight(0x6be1ff, 1.8, 30, 2);
      point.position.set(3, 5, 2);
      scene.add(point);

      let points;
      let positions;
      let basePositions;

      function generateStatueCloud() {
        if (points) {
          scene.remove(points);
          points.geometry.dispose();
          points.material.dispose();
        }

        const count = 28000;
        positions = new Float32Array(count * 3);
        basePositions = new Float32Array(count * 3);

        for (let i = 0; i < count; i += 1) {
          const i3 = i * 3;

          const h = Math.random();
          const angle = Math.random() * Math.PI * 2;
          const radius =
            h < 0.12
              ? 0.3 + Math.random() * 0.2
              : h < 0.32
              ? 0.45 + Math.random() * 0.24
              : h < 0.75
              ? 0.58 + Math.random() * 0.16
              : 0.4 + Math.random() * 0.18;

          const y = h * 3.5 - 0.35;
          const bodyWarp = Math.sin(y * 2.3) * 0.12;

          const x = Math.cos(angle) * (radius + bodyWarp) + (Math.random() * 2 - 1) * 0.03;
          const z = Math.sin(angle) * (radius + bodyWarp) + (Math.random() * 2 - 1) * 0.03;

          positions[i3] = x;
          positions[i3 + 1] = y;
          positions[i3 + 2] = z;

          basePositions[i3] = x;
          basePositions[i3 + 1] = y;
          basePositions[i3 + 2] = z;
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));

        const mat = new THREE.PointsMaterial({
          color: 0x7fe6ff,
          size: 0.02,
          transparent: true,
          opacity: 0.85,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
        });

        points = new THREE.Points(geo, mat);
        scene.add(points);
      }

      generateStatueCloud();

      const scanPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(6, 0.06),
        new THREE.MeshBasicMaterial({ color: 0x97efff, transparent: true, opacity: 0.45, side: THREE.DoubleSide })
      );
      scanPlane.rotation.x = -Math.PI * 0.5;
      scene.add(scanPlane);

      const floor = new THREE.Mesh(
        new THREE.CircleGeometry(3.2, 64),
        new THREE.MeshBasicMaterial({ color: 0x14314f, transparent: true, opacity: 0.35 })
      );
      floor.rotation.x = -Math.PI * 0.5;
      floor.position.y = -0.38;
      scene.add(floor);

      let autoSpin = true;
      let glitch = 0;

      function onDown(x, y) {
        orbit.dragging = true;
        orbit.px = x;
        orbit.py = y;
      }

      function onMove(x, y) {
        if (!orbit.dragging) return;
        const dx = x - orbit.px;
        const dy = y - orbit.py;
        orbit.px = x;
        orbit.py = y;
        orbit.theta -= dx * 0.005;
        orbit.phi += dy * 0.0045;
      }

      window.addEventListener("mousedown", (event) => onDown(event.clientX, event.clientY));
      window.addEventListener("mousemove", (event) => onMove(event.clientX, event.clientY));
      window.addEventListener("mouseup", () => {
        orbit.dragging = false;
      });

      window.addEventListener(
        "touchstart",
        (event) => {
          const t = event.touches[0];
          onDown(t.clientX, t.clientY);
        },
        { passive: true }
      );
      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          onMove(t.clientX, t.clientY);
        },
        { passive: true }
      );
      window.addEventListener("touchend", () => {
        orbit.dragging = false;
      });

      window.addEventListener("wheel", (event) => {
        orbit.radius += event.deltaY * 0.01;
      });

      window.addEventListener("click", () => {
        glitch = Math.min(1.2, glitch + 0.5);
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "a") autoSpin = !autoSpin;
        if (key === "r") generateStatueCloud();
      });

      function animate(now) {
        const t = now * 0.001;

        if (autoSpin && !orbit.dragging) {
          orbit.theta += 0.0019;
        }

        glitch = Math.max(0, glitch - 0.015);

        const pos = points.geometry.attributes.position.array;
        for (let i = 0; i < pos.length; i += 3) {
          const bx = basePositions[i];
          const by = basePositions[i + 1];
          const bz = basePositions[i + 2];

          const ripple = Math.sin(by * 6 + t * 4 + bx * 2) * 0.012;
          const scan = Math.sin(by * 10 - t * 8) * 0.004;
          const g = glitch * (Math.random() * 2 - 1) * 0.08;

          pos[i] = bx + ripple + g;
          pos[i + 1] = by + scan;
          pos[i + 2] = bz + ripple * 0.7;
        }
        points.geometry.attributes.position.needsUpdate = true;

        points.rotation.y = t * 0.18;
        points.material.opacity = 0.72 + Math.sin(t * 4.2) * 0.12 + glitch * 0.1;

        scanPlane.position.y = -0.25 + ((Math.sin(t * 2.2) * 0.5 + 0.5) * 3.2);
        scanPlane.material.opacity = 0.25 + Math.sin(t * 6.5) * 0.12 + glitch * 0.18;

        point.position.set(Math.cos(t * 0.65) * 3.4, 2.8 + Math.sin(t * 1.1) * 1.3, Math.sin(t * 0.65) * 3.4);

        updateCamera();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      updateCamera();
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
