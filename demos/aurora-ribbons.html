<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Ribbons</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #02060f;
        color: #e9f7ff;
        font-family: "Gill Sans", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        padding: 9px 12px;
        border-radius: 10px;
        background: rgba(3, 12, 22, 0.56);
        border: 1px solid rgba(170, 225, 255, 0.28);
        max-width: 370px;
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.35;
      }

      .home {
        color: #91dfff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Aurora Ribbons</h1>
      <p>Move your pointer across the scene to bend and energize wave ribbons.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d");

      let width = window.innerWidth;
      let height = window.innerHeight;

      const pointer = {
        x: width * 0.5,
        y: height * 0.5,
        active: false,
      };

      const ribbons = Array.from({ length: 8 }, (_, i) => ({
        amp: 26 + i * 10,
        freq: 0.004 + i * 0.0008,
        speed: 0.55 + i * 0.18,
        hue: 164 + i * 24,
        alpha: 0.26 - i * 0.02,
        offset: Math.random() * Math.PI * 2,
      }));

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function background(time) {
        const grad = ctx.createLinearGradient(0, 0, 0, height);
        grad.addColorStop(0, "#040d1f");
        grad.addColorStop(1, "#030712");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);

        for (let i = 0; i < 90; i += 1) {
          const x = (i * 157.7) % width;
          const y = (i * 91.3 + time * 0.015) % height;
          const alpha = 0.05 + ((i % 7) / 7) * 0.2;
          ctx.fillStyle = `rgba(220, 240, 255, ${alpha})`;
          ctx.fillRect(x, y, 1.2, 1.2);
        }
      }

      function ribbonY(layer, x, time, base) {
        const waveA = Math.sin(x * layer.freq + time * 0.001 * layer.speed + layer.offset);
        const waveB = Math.sin(x * layer.freq * 0.43 - time * 0.0009 * layer.speed);
        let y = base + waveA * layer.amp + waveB * layer.amp * 0.58;

        if (pointer.active) {
          const dist = Math.abs(x - pointer.x);
          const influence = Math.max(0, 1 - dist / 260);
          y += Math.sin(time * 0.004 + x * 0.01) * 52 * influence;
          y += (pointer.y - height * 0.5) * 0.02 * influence;
        }

        return y;
      }

      function drawRibbon(layer, time, index) {
        const base = height * (0.2 + index * 0.09);
        const step = 10;

        ctx.beginPath();
        for (let x = 0; x <= width + step; x += step) {
          const y = ribbonY(layer, x, time, base);
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }

        const strokeGradient = ctx.createLinearGradient(0, base - layer.amp * 2, width, base + layer.amp * 2);
        strokeGradient.addColorStop(0, `hsla(${layer.hue - 20}, 95%, 60%, ${layer.alpha})`);
        strokeGradient.addColorStop(0.5, `hsla(${layer.hue}, 95%, 68%, ${layer.alpha * 1.35})`);
        strokeGradient.addColorStop(1, `hsla(${layer.hue + 26}, 95%, 60%, ${layer.alpha})`);

        ctx.strokeStyle = strokeGradient;
        ctx.lineWidth = 4.2;
        ctx.shadowBlur = 26;
        ctx.shadowColor = `hsla(${layer.hue}, 95%, 64%, 0.7)`;
        ctx.stroke();

        ctx.lineTo(width, height + 30);
        ctx.lineTo(0, height + 30);
        ctx.closePath();

        const fillGradient = ctx.createLinearGradient(0, base, 0, height + 40);
        fillGradient.addColorStop(0, `hsla(${layer.hue}, 96%, 58%, ${layer.alpha * 0.35})`);
        fillGradient.addColorStop(1, "rgba(8, 14, 22, 0)");
        ctx.fillStyle = fillGradient;
        ctx.fill();
      }

      function frame(time) {
        background(time);

        ctx.globalCompositeOperation = "lighter";
        ribbons.forEach((layer, index) => drawRibbon(layer, time, index));
        ctx.globalCompositeOperation = "source-over";

        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("mousemove", (event) => {
        pointer.x = event.clientX;
        pointer.y = event.clientY;
        pointer.active = true;
      });
      window.addEventListener("mouseleave", () => {
        pointer.active = false;
      });

      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          pointer.x = t.clientX;
          pointer.y = t.clientY;
          pointer.active = true;
        },
        { passive: true }
      );

      window.addEventListener("touchend", () => {
        pointer.active = false;
      });

      resize();
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
