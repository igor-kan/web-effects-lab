<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laser Scanner Arena</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #050912;
        color: #edf8ff;
        font-family: "Segoe UI", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 9;
        max-width: 560px;
        background: rgba(8, 16, 30, 0.62);
        border: 1px solid rgba(146, 212, 255, 0.34);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
      }

      .home {
        color: #9fd8ff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Laser Scanner Arena</h1>
      <p>
        Multi-emitter laser scanner with reflective nodes, sweeps, and pulse-locked light bursts.
      </p>
      <p>Move pointer to reposition center scanner, click pulse, <strong>C</strong> color mode, <strong>R</strong> reset nodes.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d");

      let width = window.innerWidth;
      let height = window.innerHeight;
      let prev = performance.now();
      let time = 0;

      let pulse = 0;
      let colorMode = 0;

      const nodes = [];
      const NODE_COUNT = 14;

      const pointer = {
        x: width * 0.5,
        y: height * 0.5,
        tx: width * 0.5,
        ty: height * 0.5,
      };

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function resetNodes() {
        nodes.length = 0;
        for (let i = 0; i < NODE_COUNT; i += 1) {
          nodes.push({
            x: 40 + Math.random() * (width - 80),
            y: 40 + Math.random() * (height - 80),
            r: 6 + Math.random() * 7,
          });
        }
      }

      function beamColor(alpha, hueShift = 0) {
        const baseHue = colorMode === 0 ? 188 : colorMode === 1 ? 20 : 285;
        const hue = baseHue + hueShift;
        return `hsla(${hue}, 98%, 66%, ${alpha})`;
      }

      function drawBeam(x1, y1, x2, y2, alpha, widthPx, hueShift = 0) {
        ctx.strokeStyle = beamColor(alpha, hueShift);
        ctx.lineWidth = widthPx;
        ctx.shadowBlur = 12 + widthPx * 7;
        ctx.shadowColor = beamColor(Math.min(1, alpha + 0.2), hueShift);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }

      function update(dt) {
        time += dt;
        pulse = Math.max(0, pulse - dt * 0.9);
        pointer.x += (pointer.tx - pointer.x) * 0.08;
        pointer.y += (pointer.ty - pointer.y) * 0.08;
      }

      function render() {
        ctx.fillStyle = "rgba(5, 9, 18, 0.2)";
        ctx.fillRect(0, 0, width, height);

        const emitters = [
          { x: 0, y: 0, phase: 0 },
          { x: width, y: 0, phase: 1.6 },
          { x: width, y: height, phase: 3.1 },
          { x: 0, y: height, phase: 4.7 },
          { x: pointer.x, y: pointer.y, phase: 2.2 },
        ];

        for (const e of emitters) {
          for (let i = 0; i < nodes.length; i += 1) {
            const n = nodes[i];

            const d = Math.hypot(n.x - e.x, n.y - e.y);
            const gate = Math.sin(time * 2.2 + e.phase + i * 0.36) * 0.5 + 0.5;
            const strength = (0.25 + gate * 0.75) * (1 - Math.min(1, d / Math.hypot(width, height)) * 0.5);

            drawBeam(e.x, e.y, n.x, n.y, 0.08 + strength * 0.24 + pulse * 0.18, 0.7 + strength * 1.5, i * 2);

            if (i % 2 === 0) {
              const j = (i + 3) % nodes.length;
              const m = nodes[j];
              const w = 0.35 + strength * 0.65;
              drawBeam(n.x, n.y, m.x, m.y, 0.06 + w * 0.14 + pulse * 0.08, 0.45 + w, i * 1.2 + 20);
            }
          }
        }

        ctx.shadowBlur = 0;
        for (const n of nodes) {
          const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * 2.8);
          g.addColorStop(0, beamColor(0.95, 0));
          g.addColorStop(1, beamColor(0, 24));
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r * 2.8, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "rgba(240, 250, 255, 0.95)";
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r * 0.6, 0, Math.PI * 2);
          ctx.fill();
        }

        const scannerR = 14 + pulse * 9;
        ctx.strokeStyle = beamColor(0.75, 8);
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.arc(pointer.x, pointer.y, scannerR, 0, Math.PI * 2);
        ctx.stroke();
      }

      function frame(now) {
        const dt = Math.min(0.05, (now - prev) * 0.001);
        prev = now;
        update(dt);
        render();
        requestAnimationFrame(frame);
      }

      function updatePointer(clientX, clientY) {
        pointer.tx = clientX;
        pointer.ty = clientY;
      }

      window.addEventListener("mousemove", (event) => updatePointer(event.clientX, event.clientY));

      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          updatePointer(t.clientX, t.clientY);
        },
        { passive: true }
      );

      window.addEventListener("click", () => {
        pulse = Math.min(1.3, pulse + 0.45);
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "c") colorMode = (colorMode + 1) % 3;
        if (key === "r") resetNodes();
      });

      window.addEventListener("resize", () => {
        resize();
        resetNodes();
      });

      resize();
      resetNodes();
      frame();
    </script>
  </body>
</html>
