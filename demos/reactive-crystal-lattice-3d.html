<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reactive Crystal Lattice 3D</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #070b15;
        color: #eef6ff;
        font-family: "Segoe UI", sans-serif;
      }
      #stage {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: 560px;
        background: rgba(9, 14, 27, 0.62);
        border: 1px solid rgba(164, 212, 255, 0.3);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }
      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.35; }
      .home { color: #93d4ff; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Reactive Crystal Lattice 3D</h1>
      <p>Animated crystal lattice network with reactive nodes, edge energy waves, and pulse propagation.</p>
      <p>Drag to orbit, wheel to zoom, click pulse, <strong>C</strong> palette, <strong>A</strong> auto-spin, <strong>R</strong> reshuffle.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";

      const canvas = document.getElementById('stage');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.18;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x070d17);
      scene.fog = new THREE.Fog(0x070d17, 8, 34);

      const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 140);

      const orbit = {
        target: new THREE.Vector3(0, 0, 0),
        theta: 0.92,
        phi: 1.06,
        radius: 10.4,
        dragging: false,
        px: 0,
        py: 0,
      };

      function updateCamera() {
        orbit.radius = Math.max(4.5, Math.min(18, orbit.radius));
        orbit.phi = Math.max(0.24, Math.min(Math.PI - 0.2, orbit.phi));
        const sinPhi = Math.sin(orbit.phi);
        camera.position.set(
          orbit.target.x + orbit.radius * sinPhi * Math.sin(orbit.theta),
          orbit.target.y + orbit.radius * Math.cos(orbit.phi),
          orbit.target.z + orbit.radius * sinPhi * Math.cos(orbit.theta)
        );
        camera.lookAt(orbit.target);
      }

      scene.add(new THREE.HemisphereLight(0x8bd1ff, 0x0a1321, 0.72));
      const key = new THREE.PointLight(0x72cfff, 9, 34, 2);
      key.position.set(4.5, 3.1, 2.8);
      scene.add(key);
      const fill = new THREE.PointLight(0x8effd6, 5, 30, 2);
      fill.position.set(-4.2, 1.2, -3.5);
      scene.add(fill);

      const latticeGroup = new THREE.Group();
      scene.add(latticeGroup);

      let nodes = [];
      let edges = [];

      function clearLattice() {
        for (const n of nodes) latticeGroup.remove(n.mesh);
        for (const e of edges) latticeGroup.remove(e.mesh);
        nodes = [];
        edges = [];
      }

      function buildLattice() {
        clearLattice();

        const grid = 4;
        const spacing = 1.4;
        const nodeGeo = new THREE.IcosahedronGeometry(0.12, 1);

        for (let z = 0; z < grid; z += 1) {
          for (let y = 0; y < grid; y += 1) {
            for (let x = 0; x < grid; x += 1) {
              const mesh = new THREE.Mesh(
                nodeGeo,
                new THREE.MeshStandardMaterial({
                  color: 0x7fd6ff,
                  emissive: 0x2f9fff,
                  emissiveIntensity: 0.6,
                  roughness: 0.2,
                  metalness: 0.7,
                })
              );
              mesh.position.set(
                (x - (grid - 1) * 0.5) * spacing,
                (y - (grid - 1) * 0.5) * spacing,
                (z - (grid - 1) * 0.5) * spacing
              );
              mesh.position.x += (Math.random() - 0.5) * 0.22;
              mesh.position.y += (Math.random() - 0.5) * 0.22;
              mesh.position.z += (Math.random() - 0.5) * 0.22;
              latticeGroup.add(mesh);
              nodes.push({ mesh, phase: Math.random() * Math.PI * 2 });
            }
          }
        }

        const edgeMat = new THREE.MeshBasicMaterial({ color: 0x7ed7ff, transparent: true, opacity: 0.35 });

        for (let i = 0; i < nodes.length; i += 1) {
          for (let j = i + 1; j < nodes.length; j += 1) {
            const a = nodes[i].mesh.position;
            const b = nodes[j].mesh.position;
            const d = a.distanceTo(b);
            if (d > 1.9) continue;

            const geo = new THREE.CylinderGeometry(0.018, 0.018, d, 6, 1, true);
            const mesh = new THREE.Mesh(geo, edgeMat.clone());
            const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
            mesh.position.copy(mid);
            mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), new THREE.Vector3().subVectors(b, a).normalize());
            latticeGroup.add(mesh);
            edges.push({ mesh, i, j, base: d });
          }
        }
      }

      buildLattice();

      let autoSpin = true;
      let palette = 0;
      let pulse = 0;

      function applyPalette() {
        let nodeC, edgeC, emit;
        if (palette === 0) {
          nodeC = 0x7fd6ff;
          edgeC = 0x7ed7ff;
          emit = 0x2f9fff;
        } else if (palette === 1) {
          nodeC = 0xffc17a;
          edgeC = 0xffba7e;
          emit = 0xff8f37;
        } else {
          nodeC = 0xc6a5ff;
          edgeC = 0xc0b2ff;
          emit = 0x7e6bff;
        }

        for (const n of nodes) {
          n.mesh.material.color.set(nodeC);
          n.mesh.material.emissive.set(emit);
        }
        for (const e of edges) {
          e.mesh.material.color.set(edgeC);
        }
      }

      function onPointerDown(x, y) {
        orbit.dragging = true;
        orbit.px = x;
        orbit.py = y;
      }
      function onPointerMove(x, y) {
        if (!orbit.dragging) return;
        const dx = x - orbit.px;
        const dy = y - orbit.py;
        orbit.px = x;
        orbit.py = y;
        orbit.theta -= dx * 0.005;
        orbit.phi += dy * 0.0042;
      }

      addEventListener('mousedown', (e) => onPointerDown(e.clientX, e.clientY));
      addEventListener('mousemove', (e) => onPointerMove(e.clientX, e.clientY));
      addEventListener('mouseup', () => { orbit.dragging = false; });
      addEventListener('touchstart', (e) => { const t = e.touches[0]; onPointerDown(t.clientX, t.clientY); }, { passive: true });
      addEventListener('touchmove', (e) => { const t = e.touches[0]; onPointerMove(t.clientX, t.clientY); }, { passive: true });
      addEventListener('touchend', () => { orbit.dragging = false; });
      addEventListener('wheel', (e) => { orbit.radius += e.deltaY * 0.01; });

      addEventListener('click', () => {
        pulse = Math.min(1.8, pulse + 1.0);
      });

      addEventListener('keydown', (event) => {
        const k = event.key.toLowerCase();
        if (k === 'a') autoSpin = !autoSpin;
        if (k === 'c') {
          palette = (palette + 1) % 3;
          applyPalette();
        }
        if (k === 'r') buildLattice();
      });

      addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const clock = new THREE.Clock();
      applyPalette();

      function render() {
        const t = clock.getElapsedTime();

        if (autoSpin && !orbit.dragging) orbit.theta += 0.0014;
        updateCamera();

        pulse = Math.max(0, pulse - 0.02);

        latticeGroup.rotation.y += 0.0012;
        latticeGroup.rotation.x = Math.sin(t * 0.4) * 0.1;

        for (const n of nodes) {
          const ph = t * 2 + n.phase;
          n.mesh.scale.setScalar(0.86 + Math.sin(ph) * 0.18 + pulse * 0.22);
          n.mesh.material.emissiveIntensity = 0.45 + Math.sin(ph * 1.2) * 0.2 + pulse * 1.2;
        }

        for (const e of edges) {
          const ph = t * 1.6 + e.i * 0.13 + e.j * 0.08;
          e.mesh.material.opacity = 0.2 + Math.sin(ph) * 0.15 + pulse * 0.2;
        }

        key.position.set(Math.cos(t * 0.7) * 4.8, 2.8 + Math.sin(t * 1.1), Math.sin(t * 0.7) * 4.8);
        fill.position.set(Math.cos(-t * 0.5) * 4.1, 1.1 + Math.cos(t * 0.9), Math.sin(-t * 0.5) * 4.1);

        renderer.render(scene, camera);
        requestAnimationFrame(render);
      }

      render();
    </script>
  </body>
</html>
