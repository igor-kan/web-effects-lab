<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pyroclastic Cloud Lab</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #110b08;
        color: #fff3e5;
        font-family: "Segoe UI", sans-serif;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 9;
        max-width: 560px;
        background: rgba(27, 15, 9, 0.58);
        border: 1px solid rgba(255, 193, 150, 0.28);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }
      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.35; }
      .home { color: #ffcb9e; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Pyroclastic Cloud Lab</h1>
      <p>Volcanic eruption plume with ash, ember streaks, buoyant smoke loft, and wind-sheared drift.</p>
      <p>Move pointer to shift vent, click eruption burst, <strong>W</strong> wind, <strong>E</strong> extra burst, <strong>R</strong> reset.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d');

      let width = innerWidth;
      let height = innerHeight;
      let time = 0;
      let windMode = 1;
      let burst = 0;
      let paused = false;

      const pointer = { x: width * 0.5, y: height * 0.86, tx: width * 0.5, ty: height * 0.86 };
      const particles = [];

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function resize() {
        width = innerWidth;
        height = innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function wind() {
        if (windMode === 0) return -18;
        if (windMode === 1) return 0;
        return 18;
      }

      function spawn(count, impulse = 1) {
        for (let i = 0; i < count; i += 1) {
          const angle = -Math.PI * 0.5 + (Math.random() - 0.5) * 0.95;
          const speed = (120 + Math.random() * 150) * impulse;
          const hot = Math.random() < 0.22;
          const life = 2.1 + Math.random() * 2.2;

          particles.push({
            x: pointer.x + (Math.random() - 0.5) * 16,
            y: pointer.y + (Math.random() - 0.5) * 8,
            vx: Math.cos(angle) * speed + (Math.random() - 0.5) * 30,
            vy: Math.sin(angle) * speed - Math.random() * 60,
            age: 0,
            life,
            size: hot ? 2 + Math.random() * 2.5 : 7 + Math.random() * 18,
            hot,
            spin: (Math.random() - 0.5) * 2,
          });
        }

        if (particles.length > 3600) {
          particles.splice(0, particles.length - 3600);
        }
      }

      function update(dt) {
        pointer.x += (pointer.tx - pointer.x) * 0.08;
        pointer.y += (pointer.ty - pointer.y) * 0.08;

        const w = wind();
        const baseRate = 28 + Math.floor(Math.sin(time * 0.8) * 6 + 6);
        spawn(baseRate, 1 + burst * 0.55);

        burst = Math.max(0, burst - dt * 0.65);

        for (let i = particles.length - 1; i >= 0; i -= 1) {
          const p = particles[i];
          p.age += dt;
          if (p.age >= p.life) {
            particles.splice(i, 1);
            continue;
          }

          const t = p.age / p.life;
          const buoyancy = p.hot ? 180 : 80;
          p.vy -= buoyancy * dt * (1 - t * 0.7);

          const turbulence = Math.sin(p.y * 0.018 + time * 3 + p.spin * 2) * 12 + Math.cos(p.x * 0.014 - time * 2.6) * 10;
          p.vx += (w + turbulence) * dt;
          p.vx *= 0.992;
          p.vy *= 0.993;

          p.x += p.vx * dt;
          p.y += p.vy * dt;

          if (p.x < -80 || p.x > width + 80 || p.y < -120 || p.y > height + 80) {
            particles.splice(i, 1);
          }
        }
      }

      function drawBackground() {
        const sky = ctx.createLinearGradient(0, 0, 0, height);
        sky.addColorStop(0, '#120913');
        sky.addColorStop(0.45, '#24120d');
        sky.addColorStop(1, '#1a130d');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, width, height);

        const glow = ctx.createRadialGradient(pointer.x, pointer.y + 20, 0, pointer.x, pointer.y + 20, 170 + burst * 120);
        glow.addColorStop(0, 'rgba(255,132,42,0.34)');
        glow.addColorStop(1, 'rgba(255,132,42,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(pointer.x - 220, pointer.y - 220, 440, 440);

        ctx.fillStyle = '#130f0e';
        ctx.beginPath();
        ctx.moveTo(0, height);
        ctx.lineTo(width * 0.22, height * 0.74);
        ctx.lineTo(width * 0.44, height * 0.84);
        ctx.lineTo(width * 0.56, height * 0.72);
        ctx.lineTo(width * 0.82, height * 0.83);
        ctx.lineTo(width, height * 0.77);
        ctx.lineTo(width, height);
        ctx.closePath();
        ctx.fill();
      }

      function drawParticles() {
        ctx.globalCompositeOperation = 'lighter';

        for (const p of particles) {
          const t = p.age / p.life;
          if (p.hot) {
            const alpha = (1 - t) * 0.95;
            const r = p.size * (1 + t * 0.6);
            ctx.fillStyle = `rgba(255, ${120 + (1 - t) * 80}, ${40 + (1 - t) * 40}, ${alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
            ctx.fill();
          } else {
            const alpha = (1 - t) * 0.22;
            const r = p.size * (1.1 + t * 1.8);
            const c = 70 + (1 - t) * 65;
            ctx.fillStyle = `rgba(${c}, ${c - 10}, ${c - 20}, ${alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        ctx.globalCompositeOperation = 'source-over';
      }

      let last = performance.now();
      function frame(now) {
        const dt = Math.min(0.033, (now - last) * 0.001);
        last = now;

        if (!paused) {
          time += dt;
          update(dt);
        }

        drawBackground();
        drawParticles();

        requestAnimationFrame(frame);
      }

      addEventListener('resize', resize);
      addEventListener('mousemove', (event) => {
        pointer.tx = event.clientX;
        pointer.ty = Math.min(height * 0.9, event.clientY);
      });
      addEventListener('touchmove', (event) => {
        const t = event.touches[0];
        pointer.tx = t.clientX;
        pointer.ty = Math.min(height * 0.9, t.clientY);
      }, { passive: true });

      addEventListener('click', () => {
        burst = Math.min(1.8, burst + 0.9);
        spawn(220, 1.9);
      });

      addEventListener('keydown', (event) => {
        const k = event.key.toLowerCase();
        if (k === 'w') windMode = (windMode + 1) % 3;
        if (k === 'e') {
          burst = Math.min(2.2, burst + 1.2);
          spawn(280, 2.2);
        }
        if (k === 'r') {
          particles.length = 0;
          burst = 0;
        }
        if (k === 'p') paused = !paused;
      });

      resize();
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
