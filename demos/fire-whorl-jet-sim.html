<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fire Whorl Jet Sim</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #140c0a;
        color: #fff2e5;
        font-family: "Segoe UI", sans-serif;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 9;
        max-width: 580px;
        background: rgba(28, 15, 9, 0.6);
        border: 1px solid rgba(255, 194, 144, 0.3);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }
      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.35; }
      .home { color: #ffc490; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Fire Whorl Jet Sim</h1>
      <p>Turbulent fire jet with ember streaks, smoke lofting, and rotating whorl dynamics.</p>
      <p>Move pointer to steer nozzle, click burst, <strong>W</strong> wind mode, <strong>C</strong> palette, <strong>R</strong> reset.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d');

      let width = innerWidth;
      let height = innerHeight;
      let time = 0;
      let burst = 0;
      let windMode = 1;
      let palette = 0;

      const pointer = { x: width * 0.5, y: height * 0.86, tx: width * 0.5, ty: height * 0.86 };
      const particles = [];

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function resize() {
        width = innerWidth;
        height = innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function wind() {
        if (windMode === 0) return -16;
        if (windMode === 1) return 0;
        return 16;
      }

      function spawn(count, impulse = 1) {
        for (let i = 0; i < count; i += 1) {
          const hot = Math.random() < 0.55;
          const angle = -Math.PI * 0.5 + (Math.random() - 0.5) * 0.75;
          const speed = (110 + Math.random() * 160) * impulse;
          particles.push({
            x: pointer.x + (Math.random() - 0.5) * 14,
            y: pointer.y + (Math.random() - 0.5) * 8,
            vx: Math.cos(angle) * speed + (Math.random() - 0.5) * 20,
            vy: Math.sin(angle) * speed - Math.random() * 65,
            age: 0,
            life: hot ? 0.7 + Math.random() * 0.8 : 1.6 + Math.random() * 1.6,
            size: hot ? 2 + Math.random() * 2 : 6 + Math.random() * 15,
            hot,
            spin: (Math.random() - 0.5) * 2,
          });
        }
        if (particles.length > 3600) particles.splice(0, particles.length - 3600);
      }

      function colorHot(t) {
        if (palette === 0) return [255, 120 + (1 - t) * 120, 42 + (1 - t) * 45];
        if (palette === 1) return [255, 180 + (1 - t) * 65, 95 + (1 - t) * 75];
        if (palette === 2) return [135 + (1 - t) * 100, 255, 95 + (1 - t) * 65];
        return [230 + (1 - t) * 25, 120 + (1 - t) * 55, 255];
      }

      function update(dt) {
        pointer.x += (pointer.tx - pointer.x) * 0.08;
        pointer.y += (pointer.ty - pointer.y) * 0.08;

        spawn(34, 1 + burst * 0.6);
        burst = Math.max(0, burst - dt * 0.75);

        const w = wind();
        for (let i = particles.length - 1; i >= 0; i -= 1) {
          const p = particles[i];
          p.age += dt;
          if (p.age >= p.life) {
            particles.splice(i, 1);
            continue;
          }

          const t = p.age / p.life;
          const buoyancy = p.hot ? 190 : 85;
          p.vy -= buoyancy * dt * (1 - t * 0.7);

          const swirl = Math.sin(p.y * 0.02 + time * 3.2 + p.spin * 2) * 16 + Math.cos(p.x * 0.015 - time * 2.8) * 11;
          p.vx += (w + swirl) * dt;
          p.vx *= 0.992;
          p.vy *= 0.993;

          p.x += p.vx * dt;
          p.y += p.vy * dt;

          if (p.x < -80 || p.x > width + 80 || p.y < -120 || p.y > height + 80) {
            particles.splice(i, 1);
          }
        }
      }

      function drawBackground() {
        const bg = ctx.createLinearGradient(0, 0, 0, height);
        bg.addColorStop(0, '#130b10');
        bg.addColorStop(0.45, '#24140d');
        bg.addColorStop(1, '#19120d');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, width, height);

        const glow = ctx.createRadialGradient(pointer.x, pointer.y + 20, 0, pointer.x, pointer.y + 20, 170 + burst * 120);
        glow.addColorStop(0, 'rgba(255,140,48,0.34)');
        glow.addColorStop(1, 'rgba(255,140,48,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(pointer.x - 220, pointer.y - 220, 440, 440);
      }

      function draw() {
        drawBackground();
        ctx.globalCompositeOperation = 'lighter';

        for (const p of particles) {
          const t = p.age / p.life;
          if (p.hot) {
            const [r, g, b] = colorHot(t);
            const alpha = (1 - t) * 0.95;
            const rSize = p.size * (1 + t * 0.7);
            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, rSize, 0, Math.PI * 2);
            ctx.fill();
          } else {
            const alpha = (1 - t) * 0.2;
            const rSize = p.size * (1.1 + t * 1.9);
            const c = 70 + (1 - t) * 65;
            ctx.fillStyle = `rgba(${c}, ${c - 10}, ${c - 22}, ${alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, rSize, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        ctx.globalCompositeOperation = 'source-over';
      }

      let prev = performance.now();
      function frame(now) {
        const dt = Math.min(0.033, (now - prev) * 0.001);
        prev = now;
        time += dt;

        update(dt);
        draw();
        requestAnimationFrame(frame);
      }

      addEventListener('resize', resize);
      addEventListener('mousemove', (e) => {
        pointer.tx = e.clientX;
        pointer.ty = Math.min(height * 0.9, e.clientY);
      });
      addEventListener('touchmove', (e) => {
        const t = e.touches[0];
        pointer.tx = t.clientX;
        pointer.ty = Math.min(height * 0.9, t.clientY);
      }, { passive: true });

      addEventListener('click', () => {
        burst = Math.min(2.1, burst + 1.0);
        spawn(260, 2.0);
      });

      addEventListener('keydown', (event) => {
        const k = event.key.toLowerCase();
        if (k === 'w') windMode = (windMode + 1) % 3;
        if (k === 'c') palette = (palette + 1) % 4;
        if (k === 'r') particles.length = 0;
      });

      resize();
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
