<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plasma Tornado Column</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #070a12;
        color: #edf5ff;
        font-family: "Segoe UI", sans-serif;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 8;
        max-width: 560px;
        background: rgba(10, 15, 29, 0.62);
        border: 1px solid rgba(166, 209, 255, 0.3);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }
      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.35; }
      .home { color: #95d1ff; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Plasma Tornado Column</h1>
      <p>Charged tornado-style plasma column with rising particles, electric streaks, and vortex glow core.</p>
      <p>Move pointer to shift column, click overload burst, <strong>C</strong> palette, <strong>W</strong> wind mode, <strong>R</strong> reset.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d');

      let width = innerWidth;
      let height = innerHeight;
      let time = 0;
      let burst = 0;
      let palette = 0;
      let windMode = 1;

      const pointer = { x: width * 0.5, y: height * 0.8, tx: width * 0.5, ty: height * 0.8 };
      let particles = [];

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function resize() {
        width = innerWidth;
        height = innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function wind() {
        if (windMode === 0) return -14;
        if (windMode === 1) return 0;
        return 14;
      }

      function reset() {
        particles = [];
        for (let i = 0; i < 2400; i += 1) {
          particles.push({
            y: Math.random() * height,
            a: Math.random() * Math.PI * 2,
            r: 10 + Math.random() * 120,
            vy: 40 + Math.random() * 80,
            drift: Math.random() * Math.PI * 2,
            life: Math.random(),
          });
        }
      }

      function colors(t) {
        if (palette === 0) return [90 + t * 120, 130 + t * 90, 255];
        if (palette === 1) return [255, 140 + t * 70, 90 + t * 50];
        if (palette === 2) return [80 + t * 80, 255, 165 + t * 65];
        return [205 + t * 40, 120 + t * 50, 255];
      }

      function update(dt) {
        pointer.x += (pointer.tx - pointer.x) * 0.08;
        pointer.y += (pointer.ty - pointer.y) * 0.08;
        burst = Math.max(0, burst - dt * 0.9);

        const w = wind();

        for (const p of particles) {
          p.life += dt * 0.12;
          p.y -= p.vy * dt;
          p.a += dt * (2.5 + (1 - p.y / height) * 7.5 + burst * 2.2);

          const taper = clamp((height - p.y) / height, 0, 1);
          const tighten = 1 - taper * 0.82;
          p.r += Math.sin(time * 2 + p.drift) * 0.15;

          if (p.y < -20 || p.life > 2.0) {
            p.y = height + Math.random() * 70;
            p.a = Math.random() * Math.PI * 2;
            p.r = 10 + Math.random() * 120;
            p.vy = 45 + Math.random() * 90;
            p.life = 0;
          }

          p.x = pointer.x + Math.cos(p.a) * p.r * tighten + w * (1 - taper) * 0.4;
        }
      }

      function draw() {
        const bg = ctx.createLinearGradient(0, 0, 0, height);
        bg.addColorStop(0, '#070b15');
        bg.addColorStop(1, '#0e1320');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, width, height);

        const columnGlow = ctx.createRadialGradient(pointer.x, pointer.y - height * 0.28, 0, pointer.x, pointer.y - height * 0.28, height * 0.5);
        columnGlow.addColorStop(0, 'rgba(120,170,255,0.26)');
        columnGlow.addColorStop(1, 'rgba(120,170,255,0)');
        ctx.fillStyle = columnGlow;
        ctx.fillRect(pointer.x - height * 0.5, 0, height, height);

        ctx.globalCompositeOperation = 'lighter';

        for (const p of particles) {
          const t = clamp((height - p.y) / height, 0, 1);
          const [r, g, b] = colors(t + burst * 0.15);
          const alpha = 0.05 + t * 0.28 + burst * 0.1;
          const size = 0.8 + t * 2.2;

          ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
          ctx.fill();
        }

        for (let i = 0; i < 12; i += 1) {
          const h = Math.random() * height * 0.85;
          const radius = 20 + Math.random() * 130;
          const a0 = Math.random() * Math.PI * 2;
          const a1 = a0 + (Math.random() - 0.5) * 0.8;
          const x0 = pointer.x + Math.cos(a0) * radius;
          const y0 = height - h;
          const x1 = pointer.x + Math.cos(a1) * (radius * 0.2);
          const y1 = y0 - 35 - Math.random() * 70;

          ctx.strokeStyle = `rgba(180, 220, 255, ${0.08 + burst * 0.14})`;
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(x0, y0);
          ctx.lineTo((x0 + x1) * 0.5 + (Math.random() - 0.5) * 20, (y0 + y1) * 0.5);
          ctx.lineTo(x1, y1);
          ctx.stroke();
        }

        ctx.globalCompositeOperation = 'source-over';
      }

      let last = performance.now();
      function frame(now) {
        const dt = Math.min(0.033, (now - last) * 0.001);
        last = now;
        time += dt;

        update(dt);
        draw();
        requestAnimationFrame(frame);
      }

      addEventListener('resize', () => {
        resize();
        reset();
      });
      addEventListener('mousemove', (event) => {
        pointer.tx = event.clientX;
        pointer.ty = clamp(event.clientY, height * 0.62, height * 0.92);
      });
      addEventListener('touchmove', (event) => {
        const t = event.touches[0];
        pointer.tx = t.clientX;
        pointer.ty = clamp(t.clientY, height * 0.62, height * 0.92);
      }, { passive: true });

      addEventListener('click', () => {
        burst = Math.min(1.8, burst + 1.0);
      });

      addEventListener('keydown', (event) => {
        const k = event.key.toLowerCase();
        if (k === 'c') palette = (palette + 1) % 4;
        if (k === 'w') windMode = (windMode + 1) % 3;
        if (k === 'r') reset();
      });

      resize();
      reset();
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
