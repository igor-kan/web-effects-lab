<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedural City Drive</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #080c16;
        font-family: "Segoe UI", sans-serif;
      }

      #stage {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: 430px;
        background: rgba(10, 16, 28, 0.66);
        border: 1px solid rgba(138, 179, 255, 0.22);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
        color: #ebf3ff;
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
        opacity: 0.92;
      }

      .home {
        color: #96beff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Procedural City Drive</h1>
      <p>Hold left mouse and drag to look. Use <strong>WASD</strong> to navigate neon city streets.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";

      const canvas = document.getElementById("stage");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x080b13);
      scene.fog = new THREE.Fog(0x080b13, 28, 190);

      const camera = new THREE.PerspectiveCamera(68, window.innerWidth / window.innerHeight, 0.1, 500);
      camera.position.set(0, 2.5, 14);

      const hemi = new THREE.HemisphereLight(0x7ca3ff, 0x101722, 0.45);
      scene.add(hemi);

      const key = new THREE.DirectionalLight(0x95b6ff, 0.58);
      key.position.set(24, 36, 18);
      scene.add(key);

      const road = new THREE.Mesh(
        new THREE.PlaneGeometry(320, 320),
        new THREE.MeshStandardMaterial({ color: 0x0d131f, roughness: 0.98, metalness: 0.02 })
      );
      road.rotation.x = -Math.PI * 0.5;
      scene.add(road);

      const grid = new THREE.GridHelper(320, 80, 0x1f3b68, 0x13243f);
      grid.position.y = 0.02;
      scene.add(grid);

      const cityGroup = new THREE.Group();
      scene.add(cityGroup);

      const buildingGeo = new THREE.BoxGeometry(1, 1, 1);
      const buildingMat = new THREE.MeshStandardMaterial({ roughness: 0.72, metalness: 0.18, vertexColors: true });

      const buildingCount = 2200;
      const buildings = new THREE.InstancedMesh(buildingGeo, buildingMat, buildingCount);
      const dummy = new THREE.Object3D();
      const color = new THREE.Color();

      let idx = 0;
      for (let x = -78; x <= 78; x += 3) {
        for (let z = -78; z <= 78; z += 3) {
          if (Math.abs(x) < 6 || Math.abs(z) < 6 || (Math.abs(x) % 18 < 2 || Math.abs(z) % 18 < 2)) {
            continue;
          }

          if (idx >= buildingCount) break;

          const height = 1.4 + Math.random() * 24;
          const widthScale = 0.7 + Math.random() * 1.7;
          const depthScale = 0.7 + Math.random() * 1.7;

          dummy.position.set(x + (Math.random() - 0.5) * 0.7, height * 0.5, z + (Math.random() - 0.5) * 0.7);
          dummy.scale.set(widthScale, height, depthScale);
          dummy.updateMatrix();
          buildings.setMatrixAt(idx, dummy.matrix);

          const pulse = 0.25 + (height / 25) * 0.75;
          color.setHSL(0.58 + Math.random() * 0.1, 0.45, 0.12 + pulse * 0.22);
          buildings.setColorAt(idx, color);

          idx += 1;
        }
      }
      buildings.count = idx;
      cityGroup.add(buildings);

      const roadLights = [];
      const lightGeo = new THREE.SphereGeometry(0.09, 10, 10);
      const lightMatA = new THREE.MeshBasicMaterial({ color: 0xff4d79 });
      const lightMatB = new THREE.MeshBasicMaterial({ color: 0x3ce1ff });

      for (let i = 0; i < 210; i += 1) {
        const mesh = new THREE.Mesh(lightGeo, i % 2 === 0 ? lightMatA : lightMatB);
        mesh.position.set((Math.random() - 0.5) * 180, 0.22, (Math.random() - 0.5) * 180);
        mesh.userData = {
          speed: 8 + Math.random() * 18,
          lane: Math.random() > 0.5 ? "x" : "z",
          sign: Math.random() > 0.5 ? 1 : -1,
        };
        roadLights.push(mesh);
        scene.add(mesh);
      }

      const keys = new Set();
      let yaw = 0;
      let pitch = -0.07;
      let dragging = false;
      let mx = 0;
      let my = 0;

      const velocity = new THREE.Vector3();
      const forward = new THREE.Vector3();
      const right = new THREE.Vector3();
      const up = new THREE.Vector3(0, 1, 0);

      function applyLook() {
        camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, "YXZ"));
      }

      function updateMovement(delta) {
        const speed = 17;
        const input = new THREE.Vector3();

        if (keys.has("KeyW")) input.z -= 1;
        if (keys.has("KeyS")) input.z += 1;
        if (keys.has("KeyA")) input.x -= 1;
        if (keys.has("KeyD")) input.x += 1;

        if (input.lengthSq() === 0) {
          input.z = -0.3;
        }

        input.normalize();

        forward.set(0, 0, -1).applyQuaternion(camera.quaternion);
        forward.y = 0;
        forward.normalize();
        right.crossVectors(forward, up).normalize();

        const move = new THREE.Vector3();
        move.addScaledVector(forward, -input.z);
        move.addScaledVector(right, input.x);
        move.normalize();

        velocity.lerp(move.multiplyScalar(speed), 0.1);
        camera.position.addScaledVector(velocity, delta);

        camera.position.x = Math.max(-150, Math.min(150, camera.position.x));
        camera.position.z = Math.max(-150, Math.min(150, camera.position.z));
        camera.position.y = 2.4 + Math.sin(performance.now() * 0.004) * 0.03;
      }

      function updateRoadLights(delta) {
        for (const light of roadLights) {
          const d = light.userData;
          if (d.lane === "x") {
            light.position.x += d.speed * d.sign * delta;
            light.position.z = Math.round(light.position.z / 6) * 6;
            if (Math.abs(light.position.x) > 160) {
              light.position.x = -160 * d.sign;
              light.position.z = (Math.random() - 0.5) * 170;
            }
          } else {
            light.position.z += d.speed * d.sign * delta;
            light.position.x = Math.round(light.position.x / 6) * 6;
            if (Math.abs(light.position.z) > 160) {
              light.position.z = -160 * d.sign;
              light.position.x = (Math.random() - 0.5) * 170;
            }
          }
        }
      }

      let prev = performance.now();
      function animate(now) {
        const delta = Math.min(0.04, (now - prev) / 1000);
        prev = now;

        updateMovement(delta);
        applyLook();
        updateRoadLights(delta);

        const t = now * 0.0006;
        hemi.intensity = 0.35 + Math.sin(t) * 0.12;
        key.intensity = 0.45 + Math.cos(t * 1.3) * 0.16;

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      window.addEventListener("keydown", (event) => keys.add(event.code));
      window.addEventListener("keyup", (event) => keys.delete(event.code));

      window.addEventListener("mousedown", (event) => {
        dragging = true;
        mx = event.clientX;
        my = event.clientY;
      });

      window.addEventListener("mouseup", () => {
        dragging = false;
      });

      window.addEventListener("mousemove", (event) => {
        if (!dragging) return;
        const dx = event.clientX - mx;
        const dy = event.clientY - my;
        mx = event.clientX;
        my = event.clientY;

        yaw -= dx * 0.004;
        pitch -= dy * 0.0032;
        pitch = Math.max(-1.15, Math.min(1.15, pitch));
      });

      window.addEventListener(
        "touchstart",
        (event) => {
          const t = event.touches[0];
          dragging = true;
          mx = t.clientX;
          my = t.clientY;
        },
        { passive: true }
      );

      window.addEventListener(
        "touchmove",
        (event) => {
          if (!dragging) return;
          const t = event.touches[0];
          const dx = t.clientX - mx;
          const dy = t.clientY - my;
          mx = t.clientX;
          my = t.clientY;

          yaw -= dx * 0.004;
          pitch -= dy * 0.0032;
          pitch = Math.max(-1.15, Math.min(1.15, pitch));
        },
        { passive: true }
      );

      window.addEventListener("touchend", () => {
        dragging = false;
      });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      applyLook();
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
