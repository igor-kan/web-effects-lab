<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prism Caustic Interference</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #030711;
        color: #eaf5ff;
        font-family: "Segoe UI", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        image-rendering: pixelated;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 8;
        max-width: 560px;
        background: rgba(9, 17, 31, 0.62);
        border: 1px solid rgba(146, 212, 255, 0.34);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
      }

      .home {
        color: #9fd8ff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Prism Caustic Interference</h1>
      <p>
        Interference-based light caustics with prism-like chromatic splits and wavefront layering.
      </p>
      <p>Move pointer to refract center, click pulse, <strong>C</strong> palette, <strong>P</strong> pause.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d", { alpha: false });

      const GRID_W = 320;
      const GRID_H = 190;
      const low = document.createElement("canvas");
      low.width = GRID_W;
      low.height = GRID_H;
      const lowCtx = low.getContext("2d", { alpha: false });
      const image = lowCtx.createImageData(GRID_W, GRID_H);

      let width = window.innerWidth;
      let height = window.innerHeight;
      let time = 0;
      let pulse = 0;
      let palette = 0;
      let paused = false;

      const pointer = {
        x: 0.5,
        y: 0.5,
        tx: 0.5,
        ty: 0.5,
      };

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function mix(a, b, t) {
        return a + (b - a) * t;
      }

      function colorFromPalette(v, c1, c2, c3) {
        const a = clamp(v * 1.25, 0, 1);
        const b = clamp(Math.pow(v, 0.65), 0, 1);
        return [
          mix(c1[0], c2[0], a) + c3[0] * b,
          mix(c1[1], c2[1], a) + c3[1] * b,
          mix(c1[2], c2[2], a) + c3[2] * b,
        ];
      }

      function paletteColor(v) {
        if (palette === 0) return colorFromPalette(v, [16, 28, 70], [50, 190, 255], [130, 65, 120]);
        if (palette === 1) return colorFromPalette(v, [14, 36, 48], [120, 230, 190], [80, 95, 180]);
        if (palette === 2) return colorFromPalette(v, [24, 14, 58], [255, 140, 92], [110, 90, 165]);
        return colorFromPalette(v, [10, 26, 70], [148, 178, 255], [120, 120, 120]);
      }

      function drawInterference() {
        pointer.x += (pointer.tx - pointer.x) * 0.08;
        pointer.y += (pointer.ty - pointer.y) * 0.08;

        const px = image.data;
        const cx = pointer.x * GRID_W;
        const cy = pointer.y * GRID_H;

        pulse = Math.max(0, pulse - 0.012);

        for (let y = 0; y < GRID_H; y += 1) {
          for (let x = 0; x < GRID_W; x += 1) {
            const i = (x + y * GRID_W) * 4;

            const uvx = (x / GRID_W) * 2 - 1;
            const uvy = (y / GRID_H) * 2 - 1;

            const dx = x - cx;
            const dy = y - cy;
            const d = Math.sqrt(dx * dx + dy * dy) + 0.0001;
            const a = Math.atan2(dy, dx);

            const w1 = Math.sin(d * 0.2 - time * 4.1 + Math.sin(a * 3.0 + time * 1.8) * 2.2);
            const w2 = Math.cos((uvx * 11 + uvy * 8) + time * 2.2 + Math.sin(d * 0.05 + time * 0.8) * 1.8);
            const w3 = Math.sin((uvx * uvx + uvy * uvy) * 35 - time * 3.4 + pulse * 14);

            const interference = (w1 * 0.48 + w2 * 0.32 + w3 * 0.2) * 0.5 + 0.5;
            const caustic = Math.pow(clamp(interference, 0, 1), 2.4);
            const edge = clamp(1 - d / (GRID_W * 0.7), 0, 1);
            const glow = caustic * (0.65 + edge * 0.35) + pulse * edge * 0.5;

            const [r0, g0, b0] = paletteColor(clamp(glow, 0, 1));

            const chromaShift = Math.sin(a * 4 + time * 2.7) * 8;

            px[i] = clamp(r0 + chromaShift * 0.8, 0, 255);
            px[i + 1] = clamp(g0 + Math.cos(a * 3 - time * 2.3) * 6, 0, 255);
            px[i + 2] = clamp(b0 - chromaShift * 0.8, 0, 255);
            px[i + 3] = 255;
          }
        }

        lowCtx.putImageData(image, 0, 0);
      }

      function frame() {
        if (!paused) {
          time += 0.016;
        }

        drawInterference();

        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(low, 0, 0, width, height);

        requestAnimationFrame(frame);
      }

      window.addEventListener("mousemove", (event) => {
        pointer.tx = event.clientX / width;
        pointer.ty = event.clientY / height;
      });

      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          pointer.tx = t.clientX / width;
          pointer.ty = t.clientY / height;
        },
        { passive: true }
      );

      window.addEventListener("click", () => {
        pulse = Math.min(1.4, pulse + 0.42);
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "c") {
          palette = (palette + 1) % 4;
        }
        if (key === "p") {
          paused = !paused;
        }
      });

      window.addEventListener("resize", resize);

      resize();
      frame();
    </script>
  </body>
</html>
