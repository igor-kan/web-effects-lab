<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supercell Lightning Radar</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #07121a;
        color: #eaf4ff;
        font-family: "Segoe UI", sans-serif;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 8;
        max-width: 560px;
        background: rgba(8, 16, 25, 0.6);
        border: 1px solid rgba(166, 212, 255, 0.3);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }
      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.35; }
      .home { color: #8fd2ff; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Supercell Lightning Radar</h1>
      <p>Storm radar field with rotating rain bands, storm-cell cores, and branching lightning strikes.</p>
      <p>Move pointer to steer storm center, click strike burst, <strong>C</strong> palette, <strong>G</strong> gust mode, <strong>R</strong> reset.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d');

      let width = innerWidth;
      let height = innerHeight;
      let time = 0;
      let palette = 0;
      let gustMode = 1;
      let burst = 0;
      let paused = false;

      const pointer = { x: width * 0.5, y: height * 0.5, tx: width * 0.5, ty: height * 0.5 };
      let drops = [];
      let bolts = [];

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function resize() {
        width = innerWidth;
        height = innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function wind() {
        if (gustMode === 0) return -20;
        if (gustMode === 1) return 0;
        return 20;
      }

      function reset() {
        drops = [];
        for (let i = 0; i < 2200; i += 1) {
          drops.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            life: Math.random(),
          });
        }
        bolts = [];
      }

      function makeBolt(x0, y0, x1, y1, depth = 3) {
        const pts = [{ x: x0, y: y0 }];
        const seg = 8;
        for (let i = 1; i < seg; i += 1) {
          const t = i / seg;
          const nx = -(y1 - y0);
          const ny = x1 - x0;
          const nLen = Math.hypot(nx, ny) || 1;
          const offset = (Math.sin(t * 18 + time * 9) + (Math.random() - 0.5) * 1.2) * (22 * (1 - Math.abs(t - 0.5) * 1.6));
          pts.push({
            x: x0 + (x1 - x0) * t + (nx / nLen) * offset,
            y: y0 + (y1 - y0) * t + (ny / nLen) * offset,
          });
        }
        pts.push({ x: x1, y: y1 });

        bolts.push({ pts, life: 0.22 + Math.random() * 0.15, age: 0, depth });

        if (depth > 0 && Math.random() < 0.7) {
          const j = 1 + Math.floor(Math.random() * (pts.length - 2));
          const p = pts[j];
          const ang = Math.atan2(y1 - y0, x1 - x0) + (Math.random() - 0.5) * 1.5;
          const len = Math.hypot(x1 - x0, y1 - y0) * (0.25 + Math.random() * 0.35);
          makeBolt(p.x, p.y, p.x + Math.cos(ang) * len, p.y + Math.sin(ang) * len, depth - 1);
        }
      }

      function paletteColors() {
        if (palette === 0) return { a: '#7bd4ff', b: '#6d92ff', c: '#cfeeff' };
        if (palette === 1) return { a: '#7bffbf', b: '#66dbff', c: '#dfffea' };
        if (palette === 2) return { a: '#ffca7a', b: '#ff8e6b', c: '#fff2d8' };
        return { a: '#d1a0ff', b: '#88a1ff', c: '#f4e6ff' };
      }

      function field(x, y) {
        const dx = x - pointer.x;
        const dy = y - pointer.y;
        const d = Math.hypot(dx, dy) + 1;
        const tang = 2400 / (d + 50);
        const radial = -160 / (d + 60);

        let fx = (-dy / d) * tang + (dx / d) * radial;
        let fy = (dx / d) * tang + (dy / d) * radial;

        const bands = Math.sin(d * 0.06 - time * 3.8 + Math.atan2(dy, dx) * 6.0) * 16;
        fx += (dx / d) * bands;
        fy += (dy / d) * bands;

        fx += wind() * 0.45;

        return { fx, fy, d };
      }

      function drawBackground() {
        const grad = ctx.createRadialGradient(pointer.x, pointer.y, 10, width * 0.5, height * 0.5, Math.max(width, height) * 0.85);
        grad.addColorStop(0, '#17324a');
        grad.addColorStop(0.45, '#102339');
        grad.addColorStop(1, '#070f1a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);

        const radarRings = 6;
        ctx.strokeStyle = 'rgba(170, 220, 255, 0.08)';
        for (let i = 1; i <= radarRings; i += 1) {
          const r = (Math.min(width, height) * 0.45 * i) / radarRings;
          ctx.beginPath();
          ctx.arc(pointer.x, pointer.y, r, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      function update(dt) {
        pointer.x += (pointer.tx - pointer.x) * 0.08;
        pointer.y += (pointer.ty - pointer.y) * 0.08;

        burst = Math.max(0, burst - dt * 0.9);

        for (const d of drops) {
          const f = field(d.x, d.y);
          d.vx += f.fx * dt * 0.07;
          d.vy += f.fy * dt * 0.07;
          d.vx *= 0.986;
          d.vy *= 0.986;

          d.x += d.vx * dt * 60;
          d.y += d.vy * dt * 60;
          d.life += dt * 0.18;

          if (d.x < -20 || d.x > width + 20 || d.y < -20 || d.y > height + 20 || d.life > 1.8) {
            d.x = Math.random() * width;
            d.y = Math.random() * height;
            d.vx = (Math.random() - 0.5) * 4;
            d.vy = (Math.random() - 0.5) * 4;
            d.life = Math.random() * 0.5;
          }
        }

        for (let i = bolts.length - 1; i >= 0; i -= 1) {
          const b = bolts[i];
          b.age += dt;
          if (b.age > b.life) bolts.splice(i, 1);
        }

        if (Math.random() < 0.025 + burst * 0.08) {
          const angle = Math.random() * Math.PI * 2;
          const radius = Math.min(width, height) * (0.12 + Math.random() * 0.24);
          const x0 = pointer.x + Math.cos(angle) * radius;
          const y0 = pointer.y + Math.sin(angle) * radius;
          const x1 = pointer.x + (Math.random() - 0.5) * width * 0.5;
          const y1 = pointer.y + (Math.random() - 0.5) * height * 0.5;
          makeBolt(x0, y0, x1, y1, 2);
        }
      }

      function draw() {
        drawBackground();
        const col = paletteColors();

        ctx.globalCompositeOperation = 'lighter';
        for (const d of drops) {
          const f = field(d.x, d.y);
          const t = clamp(1 - f.d / (Math.min(width, height) * 0.52), 0, 1);
          const len = 3 + t * 9;

          ctx.strokeStyle = `rgba(${120 + t * 90}, ${170 + t * 70}, 255, ${0.08 + t * 0.22 + burst * 0.08})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(d.x, d.y);
          ctx.lineTo(d.x - d.vx * 0.35, d.y - d.vy * 0.35 - len);
          ctx.stroke();
        }

        for (const b of bolts) {
          const life = 1 - b.age / b.life;
          ctx.strokeStyle = col.c;
          ctx.lineWidth = 3.2 * life;
          ctx.globalAlpha = 0.12 + life * 0.2;
          ctx.beginPath();
          ctx.moveTo(b.pts[0].x, b.pts[0].y);
          for (let i = 1; i < b.pts.length; i += 1) ctx.lineTo(b.pts[i].x, b.pts[i].y);
          ctx.stroke();

          ctx.strokeStyle = b.depth % 2 ? col.b : col.a;
          ctx.lineWidth = 1.1 * life + 0.5;
          ctx.globalAlpha = 0.45 + life * 0.4;
          ctx.beginPath();
          ctx.moveTo(b.pts[0].x, b.pts[0].y);
          for (let i = 1; i < b.pts.length; i += 1) ctx.lineTo(b.pts[i].x, b.pts[i].y);
          ctx.stroke();
        }

        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';
      }

      let last = performance.now();
      function frame(now) {
        const dt = Math.min(0.033, (now - last) * 0.001);
        last = now;

        if (!paused) {
          time += dt;
          update(dt);
        }
        draw();
        requestAnimationFrame(frame);
      }

      addEventListener('resize', () => {
        resize();
        reset();
      });
      addEventListener('mousemove', (e) => {
        pointer.tx = e.clientX;
        pointer.ty = e.clientY;
      });
      addEventListener('touchmove', (e) => {
        const t = e.touches[0];
        pointer.tx = t.clientX;
        pointer.ty = t.clientY;
      }, { passive: true });

      addEventListener('click', (e) => {
        burst = Math.min(1.8, burst + 0.9);
        const x0 = pointer.x;
        const y0 = pointer.y;
        makeBolt(x0, y0, e.clientX, e.clientY, 3);
      });

      addEventListener('keydown', (event) => {
        const k = event.key.toLowerCase();
        if (k === 'c') palette = (palette + 1) % 4;
        if (k === 'g') gustMode = (gustMode + 1) % 3;
        if (k === 'r') reset();
        if (k === 'p') paused = !paused;
      });

      resize();
      reset();
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
