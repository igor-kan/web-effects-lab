<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lava Flow Topography</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0c0705;
        color: #f6efe8;
        font-family: "Segoe UI", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        image-rendering: pixelated;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 9;
        max-width: 560px;
        background: rgba(26, 14, 10, 0.64);
        border: 1px solid rgba(255, 191, 150, 0.28);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
      }

      .home {
        color: #ffcfac;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Lava Flow Topography</h1>
      <p>
        Heat-field lava simulation over synthetic terrain with downhill spread, crust cooling, and molten channels.
      </p>
      <p>Click/drag to open vents. <strong>F</strong> adds random fissures, <strong>P</strong> pause, <strong>R</strong> reset terrain.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d", { alpha: false });

      const W = 260;
      const H = 160;
      const SIZE = W * H;

      const low = document.createElement("canvas");
      low.width = W;
      low.height = H;
      const lowCtx = low.getContext("2d", { alpha: false });
      const image = lowCtx.createImageData(W, H);

      let width = window.innerWidth;
      let height = window.innerHeight;
      let paused = false;
      let tick = 0;

      let terrain = new Float32Array(SIZE);
      let lava = new Float32Array(SIZE);
      let nextLava = new Float32Array(SIZE);
      let heat = new Float32Array(SIZE);

      const pointer = {
        x: W * 0.5,
        y: H * 0.5,
        down: false,
      };

      function idx(x, y) {
        return x + y * W;
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function toGrid(clientX, clientY) {
        pointer.x = clamp(Math.floor((clientX / width) * W), 1, W - 2);
        pointer.y = clamp(Math.floor((clientY / height) * H), 1, H - 2);
      }

      function buildTerrain() {
        for (let y = 0; y < H; y += 1) {
          for (let x = 0; x < W; x += 1) {
            const i = idx(x, y);
            const base =
              0.48 +
              Math.sin(x * 0.07) * 0.18 +
              Math.cos(y * 0.06) * 0.16 +
              Math.sin((x + y) * 0.035) * 0.14 +
              (Math.random() * 2 - 1) * 0.04;
            terrain[i] = clamp(base + y / H * 0.24, 0.1, 1.2);
          }
        }
      }

      function reset() {
        buildTerrain();
        lava.fill(0);
        nextLava.fill(0);
        heat.fill(0);

        for (let i = 0; i < 3; i += 1) {
          addVent((W * (0.3 + Math.random() * 0.4)) | 0, (H * (0.2 + Math.random() * 0.25)) | 0, 8);
        }
      }

      function addVent(cx, cy, radius = 6) {
        for (let oy = -radius; oy <= radius; oy += 1) {
          for (let ox = -radius; ox <= radius; ox += 1) {
            const d2 = ox * ox + oy * oy;
            if (d2 > radius * radius) continue;

            const x = clamp(cx + ox, 1, W - 2);
            const y = clamp(cy + oy, 1, H - 2);
            const i = idx(x, y);

            const falloff = 1 - d2 / (radius * radius + 0.001);
            lava[i] = Math.min(1.8, lava[i] + falloff * 1.2);
            heat[i] = Math.min(2.0, heat[i] + falloff * 1.5);
          }
        }
      }

      function step() {
        tick += 1;
        const t = tick * 0.016;

        if (pointer.down) {
          addVent(pointer.x, pointer.y, 5);
        }

        for (let y = 1; y < H - 1; y += 1) {
          for (let x = 1; x < W - 1; x += 1) {
            const i = idx(x, y);
            const amount = lava[i];

            let remain = amount * 0.94;

            if (amount > 0.02) {
              const neighbors = [
                [x + 1, y],
                [x - 1, y],
                [x, y + 1],
                [x, y - 1],
              ];

              for (const [nx, ny] of neighbors) {
                const ni = idx(nx, ny);
                const slope = terrain[i] - terrain[ni] + Math.sin((nx + ny) * 0.08 + t) * 0.02;
                if (slope > 0.002) {
                  const flow = Math.min(remain * 0.25, slope * amount * 0.62);
                  nextLava[ni] += flow;
                  remain -= flow;
                }
              }
            }

            nextLava[i] += remain;

            heat[i] = Math.max(0, heat[i] * 0.992 + remain * 0.016 - 0.0012);
          }
        }

        for (let i = 0; i < SIZE; i += 1) {
          lava[i] = clamp(nextLava[i], 0, 2.2);
          nextLava[i] = 0;
        }
      }

      function render() {
        const px = image.data;

        for (let i = 0; i < SIZE; i += 1) {
          const h = terrain[i];
          const l = lava[i];
          const temp = heat[i];

          let r = 22 + h * 30;
          let g = 15 + h * 20;
          let b = 12 + h * 12;

          if (l > 0.03) {
            const molten = clamp(l * 0.75 + temp * 0.5, 0, 1.5);
            r = 120 + molten * 110;
            g = 30 + molten * 75;
            b = 10 + molten * 30;

            const crust = clamp(1 - molten * 0.9, 0, 1);
            r = r * (1 - crust * 0.25);
            g = g * (1 - crust * 0.45);
            b = b * (1 - crust * 0.2);
          }

          const p = i * 4;
          px[p] = clamp(r, 0, 255);
          px[p + 1] = clamp(g, 0, 255);
          px[p + 2] = clamp(b, 0, 255);
          px[p + 3] = 255;
        }

        lowCtx.putImageData(image, 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(low, 0, 0, width, height);
      }

      function frame() {
        if (!paused) {
          step();
        }
        render();
        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize);

      window.addEventListener("mousemove", (event) => {
        toGrid(event.clientX, event.clientY);
      });

      window.addEventListener("mousedown", (event) => {
        pointer.down = true;
        toGrid(event.clientX, event.clientY);
        addVent(pointer.x, pointer.y, 6);
      });

      window.addEventListener("mouseup", () => {
        pointer.down = false;
      });

      window.addEventListener("click", (event) => {
        toGrid(event.clientX, event.clientY);
        addVent(pointer.x, pointer.y, 7);
      });

      window.addEventListener(
        "touchstart",
        (event) => {
          pointer.down = true;
          const t = event.touches[0];
          toGrid(t.clientX, t.clientY);
          addVent(pointer.x, pointer.y, 6);
        },
        { passive: true }
      );

      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          toGrid(t.clientX, t.clientY);
        },
        { passive: true }
      );

      window.addEventListener("touchend", () => {
        pointer.down = false;
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "r") reset();
        if (key === "p") paused = !paused;
        if (key === "f") {
          for (let i = 0; i < 3; i += 1) {
            addVent((W * Math.random()) | 0, (H * Math.random()) | 0, 5 + (Math.random() * 4) | 0);
          }
        }
      });

      resize();
      reset();
      frame();
    </script>
  </body>
</html>
