<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moebius Ribbon Lab</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #ecf6ff;
        font-family: "Segoe UI", sans-serif;
      }

      #stage {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: 540px;
        background: rgba(247, 252, 255, 0.84);
        border: 1px solid rgba(42, 76, 96, 0.2);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
        color: #1b3649;
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.35;
      }

      .home {
        color: #0d6f8f;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Moebius Ribbon Lab</h1>
      <p>
        Procedural 3D Moebius strip with floating particles, dynamic light sweep, and orbit camera control.
      </p>
      <p>Drag to orbit, wheel to zoom, <strong>W</strong> wireframe, <strong>A</strong> auto-spin, <strong>R</strong> pulse.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";

      const canvas = document.getElementById("stage");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.08;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xeaf5ff);
      scene.fog = new THREE.Fog(0xeaf5ff, 8, 34);

      const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 160);

      const orbit = {
        target: new THREE.Vector3(0, 0, 0),
        theta: 0.95,
        phi: 1.05,
        radius: 8.8,
        dragging: false,
        px: 0,
        py: 0,
      };

      function updateCamera() {
        orbit.phi = Math.max(0.22, Math.min(Math.PI - 0.2, orbit.phi));
        orbit.radius = Math.max(4.3, Math.min(17, orbit.radius));

        const sp = Math.sin(orbit.phi);
        camera.position.set(
          orbit.target.x + orbit.radius * sp * Math.sin(orbit.theta),
          orbit.target.y + orbit.radius * Math.cos(orbit.phi),
          orbit.target.z + orbit.radius * sp * Math.cos(orbit.theta)
        );
        camera.lookAt(orbit.target);
      }

      function mobiusPoint(u, v, R = 2.35) {
        const half = u * 0.5;
        const cosHalf = Math.cos(half);
        const sinHalf = Math.sin(half);
        const ring = R + v * cosHalf;
        const x = ring * Math.cos(u);
        const y = ring * Math.sin(u);
        const z = v * sinHalf;
        return new THREE.Vector3(x, z, y);
      }

      function buildMobiusGeometry(segmentsU = 220, segmentsV = 28, width = 0.65) {
        const positions = [];
        const normals = [];
        const uvs = [];
        const indices = [];

        for (let iu = 0; iu <= segmentsU; iu += 1) {
          const u = (iu / segmentsU) * Math.PI * 2;
          for (let iv = 0; iv <= segmentsV; iv += 1) {
            const v = ((iv / segmentsV) * 2 - 1) * width;
            const p = mobiusPoint(u, v);
            positions.push(p.x, p.y, p.z);
            uvs.push(iu / segmentsU, iv / segmentsV);
          }
        }

        const stride = segmentsV + 1;
        for (let iu = 0; iu < segmentsU; iu += 1) {
          for (let iv = 0; iv < segmentsV; iv += 1) {
            const a = iu * stride + iv;
            const b = a + 1;
            const c = (iu + 1) * stride + iv;
            const d = c + 1;
            indices.push(a, c, b, b, c, d);
          }
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute("uv", new THREE.Float32BufferAttribute(uvs, 2));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();

        // Duplicate normals into a mutable buffer for slight dynamic shading perturbation.
        const n = geometry.getAttribute("normal");
        for (let i = 0; i < n.count; i += 1) {
          normals.push(n.getX(i), n.getY(i), n.getZ(i));
        }
        geometry.setAttribute("normal", new THREE.Float32BufferAttribute(normals, 3));

        return geometry;
      }

      const hemi = new THREE.HemisphereLight(0xf8fcff, 0xb5cede, 0.92);
      scene.add(hemi);

      const key = new THREE.DirectionalLight(0xffffff, 1.25);
      key.position.set(5.5, 8.5, 3.5);
      scene.add(key);
      scene.add(key.target);

      const rim = new THREE.PointLight(0x67d2ff, 3, 24, 2);
      rim.position.set(-4.2, 2.6, -2.8);
      scene.add(rim);

      const floor = new THREE.Mesh(
        new THREE.CircleGeometry(12, 84),
        new THREE.MeshStandardMaterial({ color: 0xd4e8f4, roughness: 0.84, metalness: 0.06 })
      );
      floor.rotation.x = -Math.PI * 0.5;
      floor.position.y = -2.6;
      scene.add(floor);

      const geometry = buildMobiusGeometry();
      const material = new THREE.MeshStandardMaterial({
        color: 0x1f5f8d,
        roughness: 0.24,
        metalness: 0.72,
        emissive: 0x0f2f4f,
        emissiveIntensity: 0.35,
        side: THREE.DoubleSide,
      });

      const ribbon = new THREE.Mesh(geometry, material);
      scene.add(ribbon);

      const sparkGeo = new THREE.SphereGeometry(0.04, 8, 8);
      const sparkMat = new THREE.MeshStandardMaterial({
        color: 0xff9c4a,
        emissive: 0xff7b3b,
        emissiveIntensity: 1.1,
        metalness: 0.25,
        roughness: 0.2,
      });

      const sparks = [];
      for (let i = 0; i < 120; i += 1) {
        const s = new THREE.Mesh(sparkGeo, sparkMat);
        s.userData = {
          u: Math.random() * Math.PI * 2,
          v: (Math.random() * 2 - 1) * 0.62,
          speed: 0.45 + Math.random() * 0.7,
          wobble: Math.random() * Math.PI * 2,
        };
        scene.add(s);
        sparks.push(s);
      }

      let wireframe = false;
      let autoSpin = true;
      let pulse = 0;

      function onDown(x, y) {
        orbit.dragging = true;
        orbit.px = x;
        orbit.py = y;
      }

      function onMove(x, y) {
        if (!orbit.dragging) return;
        const dx = x - orbit.px;
        const dy = y - orbit.py;
        orbit.px = x;
        orbit.py = y;
        orbit.theta -= dx * 0.005;
        orbit.phi += dy * 0.0045;
      }

      window.addEventListener("mousedown", (e) => onDown(e.clientX, e.clientY));
      window.addEventListener("mousemove", (e) => onMove(e.clientX, e.clientY));
      window.addEventListener("mouseup", () => {
        orbit.dragging = false;
      });

      window.addEventListener(
        "touchstart",
        (e) => {
          const t = e.touches[0];
          onDown(t.clientX, t.clientY);
        },
        { passive: true }
      );
      window.addEventListener(
        "touchmove",
        (e) => {
          const t = e.touches[0];
          onMove(t.clientX, t.clientY);
        },
        { passive: true }
      );
      window.addEventListener("touchend", () => {
        orbit.dragging = false;
      });

      window.addEventListener("wheel", (e) => {
        orbit.radius += e.deltaY * 0.01;
      });

      window.addEventListener("keydown", (e) => {
        const keyName = e.key.toLowerCase();
        if (keyName === "w") {
          wireframe = !wireframe;
          material.wireframe = wireframe;
        }
        if (keyName === "a") {
          autoSpin = !autoSpin;
        }
        if (keyName === "r") {
          pulse = 1;
        }
      });

      function animate(time) {
        const t = time * 0.001;

        if (autoSpin && !orbit.dragging) {
          orbit.theta += 0.002;
        }

        pulse = Math.max(0, pulse - 0.015);

        ribbon.rotation.y = t * 0.2;
        ribbon.rotation.x = Math.sin(t * 0.8) * 0.08;

        const scalePulse = 1 + Math.sin(t * 2.4) * 0.04 + pulse * 0.11;
        ribbon.scale.setScalar(scalePulse);

        material.emissiveIntensity = 0.28 + Math.sin(t * 2.8) * 0.12 + pulse * 0.35;

        key.position.set(Math.cos(t * 0.5) * 7, 8.3 + Math.sin(t * 0.8) * 1.3, Math.sin(t * 0.5) * 6);

        for (const s of sparks) {
          const d = s.userData;
          d.u += d.speed * 0.005;
          const wob = Math.sin(t * 1.8 + d.wobble) * 0.09;
          const p = mobiusPoint(d.u, d.v + wob * 0.15, 2.35);
          s.position.copy(p);
          s.position.y += Math.sin(t * 3 + d.wobble) * 0.1;
          s.scale.setScalar(0.65 + Math.sin(t * 4 + d.wobble) * 0.25 + pulse * 0.4);
        }

        updateCamera();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      updateCamera();
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
