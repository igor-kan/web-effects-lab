<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storm Ocean Surface</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #020913;
        color: #ecf7ff;
        font-family: "Segoe UI", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        image-rendering: pixelated;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 9;
        max-width: 560px;
        background: rgba(8, 17, 31, 0.62);
        border: 1px solid rgba(146, 212, 255, 0.34);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
      }

      .home {
        color: #9fd8ff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Storm Ocean Surface</h1>
      <p>
        Wave-grid ocean simulation with wind-driven chop, dynamic foam crests, and interactive storm splashes.
      </p>
      <p>Click/drag for splash waves. <strong>W</strong> cycles wind, <strong>A</strong> auto storms, <strong>R</strong> reset.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d", { alpha: false });

      const W = 260;
      const H = 160;
      const SIZE = W * H;

      const low = document.createElement("canvas");
      low.width = W;
      low.height = H;
      const lowCtx = low.getContext("2d", { alpha: false });
      const image = lowCtx.createImageData(W, H);

      let width = window.innerWidth;
      let height = window.innerHeight;

      let wave = new Float32Array(SIZE);
      let vel = new Float32Array(SIZE);
      let nextWave = new Float32Array(SIZE);

      let tick = 0;
      let windMode = 1;
      let autoStorm = true;

      const pointer = {
        x: W * 0.5,
        y: H * 0.5,
        down: false,
      };

      function idx(x, y) {
        return x + y * W;
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function toGrid(clientX, clientY) {
        pointer.x = clamp(Math.floor((clientX / width) * W), 2, W - 3);
        pointer.y = clamp(Math.floor((clientY / height) * H), 2, H - 3);
      }

      function splash(cx, cy, radius = 8, strength = 1.2) {
        for (let oy = -radius; oy <= radius; oy += 1) {
          for (let ox = -radius; ox <= radius; ox += 1) {
            const d2 = ox * ox + oy * oy;
            if (d2 > radius * radius) continue;

            const x = clamp(cx + ox, 1, W - 2);
            const y = clamp(cy + oy, 1, H - 2);
            const i = idx(x, y);

            const falloff = 1 - d2 / (radius * radius + 0.001);
            vel[i] += strength * falloff;
          }
        }
      }

      function reset() {
        wave.fill(0);
        vel.fill(0);
      }

      function windForce() {
        if (windMode === 0) return -0.014;
        if (windMode === 1) return 0;
        return 0.014;
      }

      function step() {
        tick += 1;
        const t = tick * 0.015;

        if (pointer.down) {
          splash(pointer.x, pointer.y, 6, 0.85);
        }

        if (autoStorm && tick % 65 === 0) {
          const sx = 20 + Math.random() * (W - 40);
          const sy = 20 + Math.random() * (H - 40);
          splash(sx | 0, sy | 0, 7 + (Math.random() * 7) | 0, 0.95 + Math.random() * 0.8);
        }

        const wind = windForce();

        for (let y = 1; y < H - 1; y += 1) {
          for (let x = 1; x < W - 1; x += 1) {
            const i = idx(x, y);

            const lap =
              wave[idx(x - 1, y)] +
              wave[idx(x + 1, y)] +
              wave[idx(x, y - 1)] +
              wave[idx(x, y + 1)] -
              wave[i] * 4;

            vel[i] += lap * 0.22;

            const chop =
              Math.sin((x * 0.11 + t * 2.3) + Math.cos(y * 0.09 - t * 1.9)) * 0.004 +
              Math.cos((y * 0.08 - t * 1.6) + Math.sin(x * 0.07 + t * 2.1)) * 0.004;

            vel[i] += chop + wind;
            vel[i] *= 0.985;

            nextWave[i] = wave[i] + vel[i];
          }
        }

        [wave, nextWave] = [nextWave, wave];
      }

      function render() {
        const px = image.data;
        const sky = { r: 16, g: 34, b: 58 };

        for (let y = 1; y < H - 1; y += 1) {
          for (let x = 1; x < W - 1; x += 1) {
            const i = idx(x, y);
            const p = i * 4;

            const h = wave[i];
            const dx = wave[idx(x + 1, y)] - wave[idx(x - 1, y)];
            const dy = wave[idx(x, y + 1)] - wave[idx(x, y - 1)];

            const normalZ = 1 / Math.sqrt(dx * dx + dy * dy + 1);
            const light = clamp((0.5 - dx * 0.7 - dy * 0.4) * 0.5 + 0.5, 0, 1);
            const foam = clamp(Math.abs(dx) * 3.1 + Math.abs(dy) * 2.8 + Math.abs(vel[i]) * 0.4 - 0.35, 0, 1);

            const depth = clamp(0.45 + h * 0.2 + y / H * 0.35, 0, 1);

            let r = 8 + depth * 24 + light * 22;
            let g = 28 + depth * 72 + light * 44;
            let b = 52 + depth * 120 + light * 70;

            r = r * (1 - foam) + foam * 210;
            g = g * (1 - foam) + foam * 232;
            b = b * (1 - foam) + foam * 240;

            const reflect = clamp((1 - normalZ) * 0.9, 0, 1);
            r = r * (1 - reflect * 0.2) + sky.r * reflect * 0.5;
            g = g * (1 - reflect * 0.2) + sky.g * reflect * 0.5;
            b = b * (1 - reflect * 0.2) + sky.b * reflect * 0.5;

            px[p] = clamp(r, 0, 255);
            px[p + 1] = clamp(g, 0, 255);
            px[p + 2] = clamp(b, 0, 255);
            px[p + 3] = 255;
          }
        }

        lowCtx.putImageData(image, 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(low, 0, 0, width, height);
      }

      function frame() {
        step();
        render();
        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize);

      window.addEventListener("mousemove", (event) => {
        toGrid(event.clientX, event.clientY);
      });

      window.addEventListener("mousedown", (event) => {
        pointer.down = true;
        toGrid(event.clientX, event.clientY);
      });

      window.addEventListener("mouseup", () => {
        pointer.down = false;
      });

      window.addEventListener("click", (event) => {
        toGrid(event.clientX, event.clientY);
        splash(pointer.x, pointer.y, 8, 1.4);
      });

      window.addEventListener(
        "touchstart",
        (event) => {
          pointer.down = true;
          const t = event.touches[0];
          toGrid(t.clientX, t.clientY);
          splash(pointer.x, pointer.y, 8, 1.3);
        },
        { passive: true }
      );

      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          toGrid(t.clientX, t.clientY);
        },
        { passive: true }
      );

      window.addEventListener("touchend", () => {
        pointer.down = false;
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "r") reset();
        if (key === "w") windMode = (windMode + 1) % 3;
        if (key === "a") autoStorm = !autoStorm;
      });

      resize();
      reset();
      frame();
    </script>
  </body>
</html>
