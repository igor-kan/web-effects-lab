<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plasma Arc Reactor</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #050913;
        color: #e9f7ff;
        font-family: "Segoe UI", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 8;
        max-width: 510px;
        background: rgba(7, 16, 30, 0.62);
        border: 1px solid rgba(133, 210, 255, 0.34);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
      }

      .home {
        color: #9fd6ff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Plasma Arc Reactor</h1>
      <p>
        Orbital nodes form unstable plasma arcs. Move pointer to bend the field, click to overload.
      </p>
      <p>Press <strong>R</strong> to regenerate node layout and <strong>S</strong> for slow mode.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d");

      let width = window.innerWidth;
      let height = window.innerHeight;
      let cx = width * 0.5;
      let cy = height * 0.5;

      const pointer = {
        x: cx,
        y: cy,
        tx: cx,
        ty: cy,
        active: false,
      };

      const nodes = [];
      let overload = 0;
      let slowMode = false;
      let previousTime = performance.now();

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        cx = width * 0.5;
        cy = height * 0.5;
      }

      function resetNodes() {
        nodes.length = 0;
        const count = 10;
        for (let i = 0; i < count; i += 1) {
          const ring = i < 6 ? 1 : 2;
          const radius = (Math.min(width, height) * 0.13 + Math.random() * 70) * ring;
          nodes.push({
            angle: (Math.PI * 2 * i) / count + Math.random() * 0.4,
            speed: (Math.random() * 0.8 + 0.3) * (Math.random() < 0.5 ? -1 : 1),
            radius,
            pulse: Math.random() * Math.PI * 2,
            x: cx,
            y: cy,
          });
        }
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function drawBolt(ax, ay, bx, by, chaos, alpha, widthPx) {
        const dist = Math.hypot(bx - ax, by - ay);
        const segments = Math.max(7, (dist / 26) | 0);

        ctx.beginPath();
        ctx.moveTo(ax, ay);

        for (let i = 1; i < segments; i += 1) {
          const t = i / segments;
          const wave = Math.sin(t * Math.PI);
          const jitter = (Math.random() * 2 - 1) * chaos * wave;
          const nx = -(by - ay) / (dist || 1);
          const ny = (bx - ax) / (dist || 1);
          const x = lerp(ax, bx, t) + nx * jitter;
          const y = lerp(ay, by, t) + ny * jitter;
          ctx.lineTo(x, y);
        }

        ctx.lineTo(bx, by);

        ctx.lineWidth = widthPx;
        ctx.strokeStyle = `rgba(120, 232, 255, ${alpha})`;
        ctx.shadowBlur = 18;
        ctx.shadowColor = "rgba(81, 212, 255, 0.9)";
        ctx.stroke();

        if (Math.random() < 0.26) {
          const t = 0.3 + Math.random() * 0.4;
          const sx = lerp(ax, bx, t);
          const sy = lerp(ay, by, t);
          const branchAngle = Math.atan2(by - ay, bx - ax) + (Math.random() < 0.5 ? -1 : 1) * (0.5 + Math.random() * 0.9);
          const branchLen = dist * (0.12 + Math.random() * 0.15);
          const ex = sx + Math.cos(branchAngle) * branchLen;
          const ey = sy + Math.sin(branchAngle) * branchLen;
          drawBolt(sx, sy, ex, ey, chaos * 0.55, alpha * 0.45, Math.max(0.8, widthPx * 0.7));
        }
      }

      function updateNodes(dt, t) {
        const pull = pointer.active ? 0.22 : 0.05;
        cx += (pointer.tx - cx) * pull * dt * 3.5;
        cy += (pointer.ty - cy) * pull * dt * 3.5;

        for (const n of nodes) {
          n.angle += n.speed * dt * (slowMode ? 0.45 : 1);
          const pulse = 1 + Math.sin(t * 1.8 + n.pulse) * 0.16;
          n.x = cx + Math.cos(n.angle) * n.radius * pulse;
          n.y = cy + Math.sin(n.angle) * n.radius * pulse;
        }
      }

      function render(now) {
        const dt = Math.min(0.05, (now - previousTime) * 0.001);
        previousTime = now;
        const t = now * 0.001;

        overload = Math.max(0, overload - dt * 0.6);
        pointer.x += (pointer.tx - pointer.x) * 0.12;
        pointer.y += (pointer.ty - pointer.y) * 0.12;

        updateNodes(dt, t);

        ctx.fillStyle = "rgba(5, 9, 19, 0.2)";
        ctx.fillRect(0, 0, width, height);

        const centerGlow = 44 + overload * 110;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, centerGlow);
        grad.addColorStop(0, `rgba(112, 236, 255, ${0.42 + overload * 0.45})`);
        grad.addColorStop(1, "rgba(12, 28, 48, 0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, centerGlow, 0, Math.PI * 2);
        ctx.fill();

        for (let i = 0; i < nodes.length; i += 1) {
          const a = nodes[i];
          for (let j = i + 1; j < nodes.length; j += 1) {
            const b = nodes[j];
            const d = Math.hypot(a.x - b.x, a.y - b.y);
            if (d > 300) continue;
            const strength = 1 - d / 300;
            const jitter = 8 + strength * 16 + overload * 20;
            const alpha = 0.1 + strength * 0.55 + overload * 0.18;
            drawBolt(a.x, a.y, b.x, b.y, jitter, alpha, 0.7 + strength * 1.8);
          }

          if (pointer.active) {
            const d = Math.hypot(a.x - pointer.x, a.y - pointer.y);
            if (d < 340) {
              const strength = 1 - d / 340;
              drawBolt(a.x, a.y, pointer.x, pointer.y, 9 + strength * 12, 0.12 + strength * 0.28, 0.9);
            }
          }
        }

        if (overload > 0.03) {
          for (let i = 0; i < 4; i += 1) {
            const n = nodes[(Math.random() * nodes.length) | 0];
            drawBolt(cx, cy, n.x, n.y, 25 + overload * 35, 0.25 + overload * 0.35, 1.6 + overload * 1.4);
          }
        }

        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(190, 244, 255, 0.95)";
        for (const n of nodes) {
          ctx.beginPath();
          ctx.arc(n.x, n.y, 2.7, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = "rgba(133, 240, 255, 0.8)";
        ctx.beginPath();
        ctx.arc(pointer.x, pointer.y, 2.3, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(render);
      }

      function updatePointer(clientX, clientY) {
        pointer.tx = clientX;
        pointer.ty = clientY;
        pointer.active = true;
      }

      window.addEventListener("mousemove", (event) => updatePointer(event.clientX, event.clientY));
      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          updatePointer(t.clientX, t.clientY);
        },
        { passive: true }
      );
      window.addEventListener("touchstart", (event) => {
        const t = event.touches[0];
        updatePointer(t.clientX, t.clientY);
        overload = Math.min(1.2, overload + 0.48);
      });

      window.addEventListener("click", () => {
        overload = Math.min(1.2, overload + 0.55);
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "r") resetNodes();
        if (key === "s") slowMode = !slowMode;
      });

      window.addEventListener("resize", resize);

      resize();
      resetNodes();
      ctx.fillStyle = "#050913";
      ctx.fillRect(0, 0, width, height);
      requestAnimationFrame(render);
    </script>
  </body>
</html>
