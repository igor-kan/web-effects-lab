<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ink Diffusion Paper</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #f4efe5;
        color: #1c2a36;
        font-family: "Segoe UI", sans-serif;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        image-rendering: pixelated;
      }
      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 9;
        max-width: 560px;
        background: rgba(250, 245, 236, 0.78);
        border: 1px solid rgba(37, 56, 70, 0.2);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }
      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.36; }
      .home { color: #2f6d8d; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Ink Diffusion Paper</h1>
      <p>
        Ink-in-water diffusion on paper texture with absorption, bleed, and soft capillary spreading.
      </p>
      <p>Click/drag to paint ink. <strong>C</strong> cycle palette, <strong>W</strong> wetness mode, <strong>R</strong> reset.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d', { alpha: false });

      const W = 300;
      const H = 190;
      const SIZE = W * H;

      const low = document.createElement('canvas');
      low.width = W;
      low.height = H;
      const lowCtx = low.getContext('2d', { alpha: false });
      const image = lowCtx.createImageData(W, H);

      let width = innerWidth;
      let height = innerHeight;

      let pigment = new Float32Array(SIZE);
      let nextPigment = new Float32Array(SIZE);
      let wet = new Float32Array(SIZE);
      let wetMode = 1;
      let palette = 0;

      const pointer = { x: W * 0.5, y: H * 0.5, down: false };

      function idx(x, y) {
        return x + y * W;
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function resize() {
        width = innerWidth;
        height = innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function toGrid(clientX, clientY) {
        pointer.x = clamp(Math.floor((clientX / width) * W), 1, W - 2);
        pointer.y = clamp(Math.floor((clientY / height) * H), 1, H - 2);
      }

      function reset() {
        pigment.fill(0);
        nextPigment.fill(0);
        for (let i = 0; i < SIZE; i += 1) {
          wet[i] = 0.35 + Math.random() * 0.25;
        }
      }

      function brush(cx, cy, radius = 5, amount = 1.15) {
        for (let oy = -radius; oy <= radius; oy += 1) {
          for (let ox = -radius; ox <= radius; ox += 1) {
            const d2 = ox * ox + oy * oy;
            if (d2 > radius * radius) continue;
            const x = clamp(cx + ox, 1, W - 2);
            const y = clamp(cy + oy, 1, H - 2);
            const i = idx(x, y);
            const f = 1 - d2 / (radius * radius + 0.001);
            pigment[i] = Math.min(2, pigment[i] + amount * f);
            wet[i] = Math.min(1.2, wet[i] + 0.4 * f);
          }
        }
      }

      function diffusionStep() {
        const damp = wetMode === 0 ? 0.968 : wetMode === 1 ? 0.975 : 0.983;
        const spread = wetMode === 0 ? 0.19 : wetMode === 1 ? 0.24 : 0.31;

        for (let y = 1; y < H - 1; y += 1) {
          for (let x = 1; x < W - 1; x += 1) {
            const i = idx(x, y);
            const c = pigment[i];
            const n = pigment[idx(x, y - 1)];
            const s = pigment[idx(x, y + 1)];
            const e = pigment[idx(x + 1, y)];
            const wv = pigment[idx(x - 1, y)];

            const m = wet[i];
            const lap = (n + s + e + wv - c * 4) * spread * m;
            nextPigment[i] = clamp((c + lap) * damp, 0, 2.2);

            wet[i] = clamp(wet[i] * 0.998 + Math.sin((x + y) * 0.03) * 0.0004, 0.18, 1.25);
          }
        }

        [pigment, nextPigment] = [nextPigment, pigment];
      }

      function colorize(v, shade) {
        if (palette === 0) return [35 + v * 20, 65 + v * 75, 120 + v * 120 + shade * 8];
        if (palette === 1) return [90 + v * 120 + shade * 10, 40 + v * 40, 35 + v * 35];
        if (palette === 2) return [50 + v * 40, 85 + v * 120 + shade * 8, 70 + v * 90];
        return [28 + v * 150, 35 + v * 100, 55 + v * 160 + shade * 12];
      }

      function draw() {
        const px = image.data;

        for (let y = 0; y < H; y += 1) {
          for (let x = 0; x < W; x += 1) {
            const i = idx(x, y);
            const p = i * 4;

            const paper = 235 + Math.sin(x * 0.18 + y * 0.11) * 8 + Math.cos((x - y) * 0.07) * 6;
            const edge = Math.abs(pigment[i] - pigment[idx(clamp(x + 1, 0, W - 1), y)]);
            const v = clamp(pigment[i], 0, 1.6);
            const [ir, ig, ib] = colorize(v, edge * 140);

            const blend = clamp(v * 0.82, 0, 1);
            px[p] = clamp(paper * (1 - blend) + ir * blend, 0, 255);
            px[p + 1] = clamp((paper + 3) * (1 - blend) + ig * blend, 0, 255);
            px[p + 2] = clamp((paper + 8) * (1 - blend) + ib * blend, 0, 255);
            px[p + 3] = 255;
          }
        }

        lowCtx.putImageData(image, 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(low, 0, 0, width, height);
      }

      function frame() {
        if (pointer.down) brush(pointer.x, pointer.y, 6, 0.9);
        for (let i = 0; i < 2; i += 1) diffusionStep();
        draw();
        requestAnimationFrame(frame);
      }

      addEventListener('mousemove', (event) => toGrid(event.clientX, event.clientY));
      addEventListener('mousedown', (event) => {
        pointer.down = true;
        toGrid(event.clientX, event.clientY);
        brush(pointer.x, pointer.y, 6, 1.4);
      });
      addEventListener('mouseup', () => { pointer.down = false; });

      addEventListener('touchstart', (event) => {
        pointer.down = true;
        const t = event.touches[0];
        toGrid(t.clientX, t.clientY);
        brush(pointer.x, pointer.y, 6, 1.4);
      }, { passive: true });
      addEventListener('touchmove', (event) => {
        const t = event.touches[0];
        toGrid(t.clientX, t.clientY);
      }, { passive: true });
      addEventListener('touchend', () => { pointer.down = false; });

      addEventListener('keydown', (event) => {
        const k = event.key.toLowerCase();
        if (k === 'c') palette = (palette + 1) % 4;
        if (k === 'w') wetMode = (wetMode + 1) % 3;
        if (k === 'r') reset();
      });

      addEventListener('resize', resize);

      resize();
      reset();
      frame();
    </script>
  </body>
</html>
