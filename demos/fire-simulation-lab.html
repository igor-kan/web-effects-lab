<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fire Simulation Lab</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #050304;
        color: #ffeedd;
        font-family: "Segoe UI", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        image-rendering: pixelated;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 5;
        max-width: 440px;
        background: rgba(22, 10, 9, 0.55);
        border: 1px solid rgba(255, 164, 118, 0.3);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
      }

      .home {
        color: #ffb587;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Fire Simulation Lab</h1>
      <p>Drag to inject heat and flames. Press <strong>W</strong> to toggle wind and <strong>R</strong> to reset.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d", { alpha: false });

      const GRID_W = 280;
      const GRID_H = 190;
      const SIZE = GRID_W * GRID_H;

      const lowCanvas = document.createElement("canvas");
      lowCanvas.width = GRID_W;
      lowCanvas.height = GRID_H;
      const lowCtx = lowCanvas.getContext("2d", { alpha: false });
      const image = lowCtx.createImageData(GRID_W, GRID_H);

      let heat = new Float32Array(SIZE);
      let next = new Float32Array(SIZE);

      let width = window.innerWidth;
      let height = window.innerHeight;

      const pointer = { x: GRID_W * 0.5, y: GRID_H * 0.85, down: false };
      let windEnabled = true;
      let wind = 0;
      let t = 0;

      const sparks = [];

      function idx(x, y) {
        return x + y * GRID_W;
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function toGrid(clientX, clientY) {
        pointer.x = clamp(Math.floor((clientX / width) * GRID_W), 0, GRID_W - 1);
        pointer.y = clamp(Math.floor((clientY / height) * GRID_H), 0, GRID_H - 1);
      }

      function reset() {
        heat.fill(0);
        next.fill(0);
        sparks.length = 0;
      }

      function injectHeat(cx, cy, radius, amount) {
        for (let oy = -radius; oy <= radius; oy += 1) {
          for (let ox = -radius; ox <= radius; ox += 1) {
            const d2 = ox * ox + oy * oy;
            if (d2 > radius * radius) continue;
            const x = clamp(cx + ox, 0, GRID_W - 1);
            const y = clamp(cy + oy, 0, GRID_H - 1);
            const i = idx(x, y);
            heat[i] = clamp(heat[i] + amount * (1 - d2 / (radius * radius + 0.01)), 0, 1.6);
          }
        }
      }

      function spawnSpark(x, y) {
        sparks.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 0.4 + wind * 1.5,
          vy: -(1.2 + Math.random() * 1.6),
          life: 24 + Math.random() * 36,
          size: 1.0 + Math.random() * 2.0,
        });
      }

      function updateFire() {
        t += 1;
        if (windEnabled) {
          wind = Math.sin(t * 0.017) * 0.35 + Math.cos(t * 0.008) * 0.22;
        } else {
          wind *= 0.9;
        }

        for (let x = 0; x < GRID_W; x += 1) {
          const y = GRID_H - 1;
          const base = 0.6 + Math.random() * 0.7;
          heat[idx(x, y)] = Math.max(heat[idx(x, y)] * 0.5, base * Math.pow(Math.sin((x + t * 0.8) * 0.04) * 0.5 + 0.5, 0.45));
        }

        if (pointer.down) {
          injectHeat(pointer.x, pointer.y, 13, 0.16);
          if (Math.random() < 0.45) {
            spawnSpark(pointer.x, pointer.y);
          }
        }

        for (let i = 0; i < 5; i += 1) {
          const x = ((GRID_W * 0.5 + Math.sin(t * 0.03 + i) * GRID_W * 0.14) | 0);
          injectHeat(x, GRID_H - 8, 7, 0.08);
        }

        for (let y = 1; y < GRID_H - 1; y += 1) {
          for (let x = 1; x < GRID_W - 1; x += 1) {
            const i = idx(x, y);

            const below = heat[idx(x, clamp(y + 1, 0, GRID_H - 1))];
            const belowL = heat[idx(x - 1, clamp(y + 1, 0, GRID_H - 1))];
            const belowR = heat[idx(x + 1, clamp(y + 1, 0, GRID_H - 1))];
            const side = (heat[idx(x - 1, y)] + heat[idx(x + 1, y)]) * 0.5;

            const drift = wind * 0.8;
            const xWind = clamp((x + drift) | 0, 1, GRID_W - 2);
            const fromWind = heat[idx(xWind, clamp(y + 1, 0, GRID_H - 1))];

            let value = (below * 0.44 + belowL * 0.18 + belowR * 0.18 + side * 0.12 + fromWind * 0.2) * 0.95;
            value -= 0.006 + y * 0.0007;

            next[i] = clamp(value, 0, 1.5);
          }
        }

        for (let x = 0; x < GRID_W; x += 1) {
          next[idx(x, 0)] = 0;
        }

        [heat, next] = [next, heat];
      }

      function shade(v, yNorm) {
        const cool = clamp(v * 0.65, 0, 1);
        const hot = clamp((v - 0.45) * 2.0, 0, 1);
        const white = clamp((v - 0.92) * 2.8, 0, 1);

        let r = 45 + cool * 210 + hot * 40;
        let g = 8 + cool * 105 + hot * 90;
        let b = 4 + cool * 25;

        r += white * 120;
        g += white * 120;
        b += white * 85;

        const smoke = clamp((0.34 - v) * 1.8, 0, 1) * (1 - yNorm);
        r = r * (1 - smoke) + 95 * smoke;
        g = g * (1 - smoke) + 92 * smoke;
        b = b * (1 - smoke) + 98 * smoke;

        return [clamp(r, 0, 255), clamp(g, 0, 255), clamp(b, 0, 255), 255];
      }

      function drawFire() {
        const px = image.data;

        for (let y = 0; y < GRID_H; y += 1) {
          for (let x = 0; x < GRID_W; x += 1) {
            const i = idx(x, y);
            const p = i * 4;
            const [r, g, b, a] = shade(heat[i], 1 - y / (GRID_H - 1));
            px[p] = r;
            px[p + 1] = g;
            px[p + 2] = b;
            px[p + 3] = a;
          }
        }

        lowCtx.putImageData(image, 0, 0);

        ctx.imageSmoothingEnabled = false;
        ctx.clearRect(0, 0, width, height);
        ctx.drawImage(lowCanvas, 0, 0, width, height);
      }

      function updateSparks() {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        for (let i = sparks.length - 1; i >= 0; i -= 1) {
          const s = sparks[i];
          s.life -= 1;

          s.vx += wind * 0.02;
          s.vy += 0.015;
          s.x += s.vx;
          s.y += s.vy;

          if (s.life <= 0 || s.y < 0 || s.x < -5 || s.x > GRID_W + 5) {
            sparks.splice(i, 1);
            continue;
          }

          const alpha = clamp(s.life / 36, 0, 1);
          const sx = (s.x / GRID_W) * width;
          const sy = (s.y / GRID_H) * height;

          ctx.fillStyle = `rgba(255, ${180 + Math.random() * 60}, ${80 + Math.random() * 50}, ${0.7 * alpha})`;
          ctx.beginPath();
          ctx.arc(sx, sy, s.size + alpha, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      function frame() {
        updateFire();
        drawFire();

        if (Math.random() < 0.3) {
          spawnSpark(GRID_W * (0.5 + (Math.random() - 0.5) * 0.18), GRID_H - 7);
        }

        updateSparks();
        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize);

      window.addEventListener("mousedown", (event) => {
        pointer.down = true;
        toGrid(event.clientX, event.clientY);
      });
      window.addEventListener("mousemove", (event) => {
        toGrid(event.clientX, event.clientY);
      });
      window.addEventListener("mouseup", () => {
        pointer.down = false;
      });

      window.addEventListener(
        "touchstart",
        (event) => {
          pointer.down = true;
          const t = event.touches[0];
          toGrid(t.clientX, t.clientY);
        },
        { passive: true }
      );
      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          toGrid(t.clientX, t.clientY);
        },
        { passive: true }
      );
      window.addEventListener("touchend", () => {
        pointer.down = false;
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "r") reset();
        if (key === "w") windEnabled = !windEnabled;
      });

      resize();
      reset();
      frame();
    </script>
  </body>
</html>
