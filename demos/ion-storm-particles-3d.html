<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ion Storm Particles 3D</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #050913;
        color: #eef6ff;
        font-family: "Segoe UI", sans-serif;
      }
      #stage {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: 560px;
        background: rgba(8, 14, 27, 0.62);
        border: 1px solid rgba(166, 212, 255, 0.3);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }
      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.35; }
      .home { color: #93d4ff; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Ion Storm Particles 3D</h1>
      <p>Volumetric ion storm with charged particle swarms, electric filaments, and orbital camera control.</p>
      <p>Drag to orbit, wheel to zoom, click pulse burst, <strong>C</strong> palette, <strong>A</strong> auto-spin, <strong>R</strong> reseed.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";

      const canvas = document.getElementById('stage');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.2;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050913);
      scene.fog = new THREE.FogExp2(0x050913, 0.07);

      const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 140);

      const orbit = {
        target: new THREE.Vector3(0, 0, 0),
        theta: 0.94,
        phi: 1.04,
        radius: 10.2,
        dragging: false,
        px: 0,
        py: 0,
      };

      function updateCamera() {
        orbit.radius = Math.max(4.5, Math.min(22, orbit.radius));
        orbit.phi = Math.max(0.22, Math.min(Math.PI - 0.2, orbit.phi));
        const sinPhi = Math.sin(orbit.phi);
        camera.position.set(
          orbit.target.x + orbit.radius * sinPhi * Math.sin(orbit.theta),
          orbit.target.y + orbit.radius * Math.cos(orbit.phi),
          orbit.target.z + orbit.radius * sinPhi * Math.cos(orbit.theta)
        );
        camera.lookAt(orbit.target);
      }

      scene.add(new THREE.HemisphereLight(0x8cd7ff, 0x081323, 0.72));
      const key = new THREE.PointLight(0x73d1ff, 10, 34, 2);
      key.position.set(4.4, 2.8, 3.0);
      scene.add(key);
      const fill = new THREE.PointLight(0x9bffd9, 5, 32, 2);
      fill.position.set(-4.0, 1.3, -3.6);
      scene.add(fill);

      const core = new THREE.Mesh(
        new THREE.IcosahedronGeometry(1.0, 2),
        new THREE.MeshStandardMaterial({
          color: 0x315d8c,
          emissive: 0x2a91d8,
          emissiveIntensity: 0.9,
          roughness: 0.2,
          metalness: 0.68,
        })
      );
      scene.add(core);

      const shell = new THREE.Mesh(
        new THREE.SphereGeometry(2.8, 40, 40),
        new THREE.MeshBasicMaterial({
          color: 0x66c8ff,
          transparent: true,
          opacity: 0.08,
          side: THREE.DoubleSide,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        })
      );
      scene.add(shell);

      let points;
      let positions;
      const count = 5200;
      function reseedPoints() {
        if (points) {
          scene.remove(points);
          points.geometry.dispose();
          points.material.dispose();
        }

        positions = new Float32Array(count * 3);
        const sizes = new Float32Array(count);
        for (let i = 0; i < count; i += 1) {
          const r = Math.pow(Math.random(), 0.45) * 4.8;
          const a = Math.random() * Math.PI * 2;
          const y = (Math.random() - 0.5) * 5.5;
          positions[i * 3] = Math.cos(a) * r;
          positions[i * 3 + 1] = y;
          positions[i * 3 + 2] = Math.sin(a) * r;
          sizes[i] = 0.4 + Math.random() * 1.2;
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const mat = new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
          uniforms: {
            uTime: { value: 0 },
            uBurst: { value: 0 },
            uColorA: { value: new THREE.Color(0x67ccff) },
            uColorB: { value: new THREE.Color(0x8dffe0) },
          },
          vertexShader: `
            attribute float size;
            varying float vMix;
            uniform float uTime;
            void main() {
              vec3 p = position;
              float swirl = sin(uTime * 0.75 + p.y * 2.0 + p.x * 0.7) * 0.55;
              p.x += cos(uTime * 0.48 + p.z * 1.8) * 0.16 + swirl * 0.18;
              p.z += sin(uTime * 0.51 + p.x * 1.7) * 0.16 - swirl * 0.18;
              p.y += sin(uTime * 1.1 + (p.x + p.z) * 0.9) * 0.1;
              vec4 mv = modelViewMatrix * vec4(p, 1.0);
              gl_Position = projectionMatrix * mv;
              gl_PointSize = size * (230.0 / -mv.z);
              vMix = clamp((p.y + 3.0) / 6.0, 0.0, 1.0);
            }
          `,
          fragmentShader: `
            precision highp float;
            varying float vMix;
            uniform float uBurst;
            uniform vec3 uColorA;
            uniform vec3 uColorB;
            void main() {
              vec2 uv = gl_PointCoord - 0.5;
              float d = length(uv);
              if (d > 0.5) discard;
              float core = exp(-d * 10.5);
              float rim = exp(-abs(d - 0.34) * 22.0);
              vec3 col = mix(uColorA, uColorB, vMix);
              col += vec3(0.36, 0.45, 0.62) * uBurst;
              float alpha = (core * 0.84 + rim * 0.3) * (0.62 + uBurst * 0.4);
              gl_FragColor = vec4(col, alpha);
            }
          `,
        });

        points = new THREE.Points(geo, mat);
        scene.add(points);
      }

      reseedPoints();

      const arcs = [];
      for (let i = 0; i < 8; i += 1) {
        const geo = new THREE.TorusGeometry(2.2 + i * 0.25, 0.03, 8, 120, Math.PI * 1.6);
        const mat = new THREE.MeshBasicMaterial({ color: i % 2 ? 0x6acfff : 0x94ffd7, transparent: true, opacity: 0.25 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        scene.add(mesh);
        arcs.push(mesh);
      }

      let autoSpin = true;
      let palette = 0;
      let burst = 0;

      function applyPalette() {
        if (palette === 0) {
          points.material.uniforms.uColorA.value.set(0x67ccff);
          points.material.uniforms.uColorB.value.set(0x8dffe0);
          core.material.color.set(0x315d8c);
          core.material.emissive.set(0x2a91d8);
        } else if (palette === 1) {
          points.material.uniforms.uColorA.value.set(0xffbf7f);
          points.material.uniforms.uColorB.value.set(0xff8e7b);
          core.material.color.set(0x7f4f36);
          core.material.emissive.set(0xff7f3c);
        } else {
          points.material.uniforms.uColorA.value.set(0xc1a3ff);
          points.material.uniforms.uColorB.value.set(0x8cc0ff);
          core.material.color.set(0x4f4d8f);
          core.material.emissive.set(0x7f74ff);
        }
      }

      function onPointerDown(x, y) {
        orbit.dragging = true;
        orbit.px = x;
        orbit.py = y;
      }
      function onPointerMove(x, y) {
        if (!orbit.dragging) return;
        const dx = x - orbit.px;
        const dy = y - orbit.py;
        orbit.px = x;
        orbit.py = y;
        orbit.theta -= dx * 0.005;
        orbit.phi += dy * 0.004;
      }

      addEventListener('mousedown', (e) => onPointerDown(e.clientX, e.clientY));
      addEventListener('mousemove', (e) => onPointerMove(e.clientX, e.clientY));
      addEventListener('mouseup', () => { orbit.dragging = false; });
      addEventListener('touchstart', (e) => { const t = e.touches[0]; onPointerDown(t.clientX, t.clientY); }, { passive: true });
      addEventListener('touchmove', (e) => { const t = e.touches[0]; onPointerMove(t.clientX, t.clientY); }, { passive: true });
      addEventListener('touchend', () => { orbit.dragging = false; });
      addEventListener('wheel', (e) => { orbit.radius += e.deltaY * 0.01; });

      addEventListener('click', () => {
        burst = Math.min(1.8, burst + 1.0);
      });

      addEventListener('keydown', (event) => {
        const k = event.key.toLowerCase();
        if (k === 'a') autoSpin = !autoSpin;
        if (k === 'c') {
          palette = (palette + 1) % 3;
          applyPalette();
        }
        if (k === 'r') reseedPoints();
      });

      addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const clock = new THREE.Clock();
      applyPalette();

      function render() {
        const t = clock.getElapsedTime();

        if (autoSpin && !orbit.dragging) orbit.theta += 0.0014;
        updateCamera();

        burst = Math.max(0, burst - 0.02);

        core.rotation.y += 0.003;
        core.rotation.x = Math.sin(t * 0.7) * 0.14;
        core.material.emissiveIntensity = 0.85 + burst * 1.3;

        shell.rotation.y -= 0.0015;

        points.material.uniforms.uTime.value = t;
        points.material.uniforms.uBurst.value = burst;

        arcs.forEach((a, i) => {
          a.rotation.x += 0.002 + i * 0.0008;
          a.rotation.y += 0.0024 + i * 0.001;
          a.material.opacity = 0.18 + Math.sin(t * 1.9 + i) * 0.1 + burst * 0.12;
        });

        key.position.set(Math.cos(t * 0.8) * 4.5, 2.4 + Math.sin(t * 1.0), Math.sin(t * 0.8) * 4.5);
        fill.position.set(Math.cos(-t * 0.6) * 4.2, 1.1 + Math.cos(t * 0.9), Math.sin(-t * 0.6) * 4.2);

        renderer.render(scene, camera);
        requestAnimationFrame(render);
      }

      render();
    </script>
  </body>
</html>
