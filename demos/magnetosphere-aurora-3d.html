<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magnetosphere Aurora 3D</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #040912;
        color: #edf6ff;
        font-family: "Segoe UI", sans-serif;
      }
      #stage {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: 560px;
        background: rgba(8, 15, 27, 0.62);
        border: 1px solid rgba(165, 212, 255, 0.3);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }
      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.35; }
      .home { color: #95d5ff; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Magnetosphere Aurora 3D</h1>
      <p>Planet-scale magnetosphere lines, aurora curtains, and charged particles in orbital flow.</p>
      <p>Drag to orbit, wheel to zoom, click pulse storm, <strong>C</strong> palette, <strong>A</strong> auto-spin, <strong>R</strong> reseed particles.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";

      const canvas = document.getElementById('stage');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.16;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x040912);

      const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 140);

      const orbit = {
        target: new THREE.Vector3(0, 0, 0),
        theta: 0.95,
        phi: 1.04,
        radius: 9.6,
        dragging: false,
        px: 0,
        py: 0,
      };

      function updateCamera() {
        orbit.radius = Math.max(4.5, Math.min(22, orbit.radius));
        orbit.phi = Math.max(0.22, Math.min(Math.PI - 0.2, orbit.phi));

        const sinPhi = Math.sin(orbit.phi);
        camera.position.set(
          orbit.target.x + orbit.radius * sinPhi * Math.sin(orbit.theta),
          orbit.target.y + orbit.radius * Math.cos(orbit.phi),
          orbit.target.z + orbit.radius * sinPhi * Math.cos(orbit.theta)
        );
        camera.lookAt(orbit.target);
      }

      const hemi = new THREE.HemisphereLight(0x8ad6ff, 0x071422, 0.72);
      scene.add(hemi);

      const sun = new THREE.DirectionalLight(0xffffff, 1.1);
      sun.position.set(5, 3, 4);
      scene.add(sun);

      const planet = new THREE.Mesh(
        new THREE.SphereGeometry(1.5, 48, 48),
        new THREE.MeshStandardMaterial({
          color: 0x1b4f80,
          roughness: 0.72,
          metalness: 0.1,
          emissive: 0x0a243a,
          emissiveIntensity: 0.45,
        })
      );
      scene.add(planet);

      const atmosphere = new THREE.Mesh(
        new THREE.SphereGeometry(1.63, 48, 48),
        new THREE.MeshBasicMaterial({
          color: 0x65c5ff,
          transparent: true,
          opacity: 0.14,
          blending: THREE.AdditiveBlending,
          side: THREE.DoubleSide,
          depthWrite: false,
        })
      );
      scene.add(atmosphere);

      const starGeo = new THREE.BufferGeometry();
      const starPos = new Float32Array(1200 * 3);
      for (let i = 0; i < 1200; i += 1) {
        const r = 30 + Math.random() * 90;
        const a = Math.random() * Math.PI * 2;
        const z = (Math.random() - 0.5) * r;
        starPos[i * 3] = Math.cos(a) * r;
        starPos[i * 3 + 1] = z;
        starPos[i * 3 + 2] = Math.sin(a) * r;
      }
      starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
      const stars = new THREE.Points(
        starGeo,
        new THREE.PointsMaterial({ color: 0xb6d8ff, size: 0.08, transparent: true, opacity: 0.7 })
      );
      scene.add(stars);

      const auroraMaterial = new THREE.ShaderMaterial({
        transparent: true,
        side: THREE.DoubleSide,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        uniforms: {
          uTime: { value: 0 },
          uColorA: { value: new THREE.Color(0x4dffbf) },
          uColorB: { value: new THREE.Color(0x64c8ff) },
          uPulse: { value: 0 },
        },
        vertexShader: `
          varying vec2 vUv;
          uniform float uTime;
          void main() {
            vUv = uv;
            vec3 p = position;
            p.z += sin(uv.x * 12.0 + uTime * 2.5 + uv.y * 8.0) * 0.12;
            p.z += sin(uv.x * 24.0 - uTime * 1.8) * 0.06;
            vec4 mv = modelViewMatrix * vec4(p, 1.0);
            gl_Position = projectionMatrix * mv;
          }
        `,
        fragmentShader: `
          precision highp float;
          varying vec2 vUv;
          uniform vec3 uColorA;
          uniform vec3 uColorB;
          uniform float uPulse;
          void main() {
            float fadeY = smoothstep(0.0, 0.2, vUv.y) * (1.0 - smoothstep(0.72, 1.0, vUv.y));
            float bands = sin(vUv.x * 38.0) * 0.5 + 0.5;
            float alpha = fadeY * (0.28 + bands * 0.55 + uPulse * 0.2);
            vec3 col = mix(uColorA, uColorB, bands + vUv.y * 0.3);
            col += vec3(0.2, 0.25, 0.35) * uPulse;
            gl_FragColor = vec4(col, alpha);
          }
        `,
      });

      const aurora = new THREE.Mesh(new THREE.PlaneGeometry(5.4, 2.4, 90, 60), auroraMaterial);
      aurora.position.set(0, 1.8, 0);
      aurora.rotation.x = -Math.PI * 0.08;
      scene.add(aurora);

      const aurora2 = aurora.clone();
      aurora2.position.set(0, -1.8, 0);
      aurora2.rotation.x = Math.PI * 1.08;
      scene.add(aurora2);

      const lineGroup = new THREE.Group();
      scene.add(lineGroup);

      function createFieldLine(offset, color) {
        const points = [];
        for (let i = 0; i <= 120; i += 1) {
          const t = i / 120;
          const a = (t - 0.5) * Math.PI;
          const r = 2.2 + Math.cos(a) * 1.4;
          points.push(new THREE.Vector3(Math.cos(a) * r, Math.sin(a) * 2.6, offset));
        }
        const curve = new THREE.CatmullRomCurve3(points);
        const geo = new THREE.TubeGeometry(curve, 120, 0.018, 6, false);
        const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.55 });
        const mesh = new THREE.Mesh(geo, mat);
        lineGroup.add(mesh);
        return mesh;
      }

      const fieldLines = [];
      for (let i = 0; i < 9; i += 1) {
        const off = -1.2 + i * 0.3;
        const line = createFieldLine(off, i % 2 ? 0x76d2ff : 0x7bffc9);
        fieldLines.push(line);
      }

      let particles = [];
      const particleGeo = new THREE.SphereGeometry(0.03, 8, 8);
      function reseedParticles() {
        for (const p of particles) scene.remove(p.mesh);
        particles = [];
        for (let i = 0; i < 260; i += 1) {
          const mesh = new THREE.Mesh(particleGeo, new THREE.MeshBasicMaterial({ color: 0xbce8ff, transparent: true, opacity: 0.8 }));
          mesh.position.set((Math.random() - 0.5) * 8, (Math.random() - 0.5) * 5, (Math.random() - 0.5) * 8);
          scene.add(mesh);
          particles.push({ mesh, phase: Math.random() * Math.PI * 2, speed: 0.4 + Math.random() * 1.2, radius: 2 + Math.random() * 4 });
        }
      }
      reseedParticles();

      let autoSpin = true;
      let palette = 0;
      let pulse = 0;

      function applyPalette() {
        if (palette === 0) {
          auroraMaterial.uniforms.uColorA.value.set(0x4dffbf);
          auroraMaterial.uniforms.uColorB.value.set(0x64c8ff);
        } else if (palette === 1) {
          auroraMaterial.uniforms.uColorA.value.set(0xffb56a);
          auroraMaterial.uniforms.uColorB.value.set(0xff7b9f);
        } else {
          auroraMaterial.uniforms.uColorA.value.set(0xbe9dff);
          auroraMaterial.uniforms.uColorB.value.set(0x7ad8ff);
        }
      }

      function onPointerDown(x, y) {
        orbit.dragging = true;
        orbit.px = x;
        orbit.py = y;
      }
      function onPointerMove(x, y) {
        if (!orbit.dragging) return;
        const dx = x - orbit.px;
        const dy = y - orbit.py;
        orbit.px = x;
        orbit.py = y;
        orbit.theta -= dx * 0.005;
        orbit.phi += dy * 0.004;
      }

      addEventListener('mousedown', (e) => onPointerDown(e.clientX, e.clientY));
      addEventListener('mousemove', (e) => onPointerMove(e.clientX, e.clientY));
      addEventListener('mouseup', () => { orbit.dragging = false; });
      addEventListener('touchstart', (e) => { const t = e.touches[0]; onPointerDown(t.clientX, t.clientY); }, { passive: true });
      addEventListener('touchmove', (e) => { const t = e.touches[0]; onPointerMove(t.clientX, t.clientY); }, { passive: true });
      addEventListener('touchend', () => { orbit.dragging = false; });
      addEventListener('wheel', (e) => { orbit.radius += e.deltaY * 0.01; });

      addEventListener('click', () => {
        pulse = Math.min(1.7, pulse + 0.9);
      });

      addEventListener('keydown', (event) => {
        const k = event.key.toLowerCase();
        if (k === 'a') autoSpin = !autoSpin;
        if (k === 'c') {
          palette = (palette + 1) % 3;
          applyPalette();
        }
        if (k === 'r') reseedParticles();
      });

      addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const clock = new THREE.Clock();
      applyPalette();

      function render() {
        const t = clock.getElapsedTime();

        if (autoSpin && !orbit.dragging) orbit.theta += 0.0013;
        updateCamera();

        pulse = Math.max(0, pulse - 0.02);

        planet.rotation.y += 0.0016;
        atmosphere.rotation.y -= 0.0012;

        auroraMaterial.uniforms.uTime.value = t;
        auroraMaterial.uniforms.uPulse.value = pulse;

        fieldLines.forEach((line, i) => {
          line.rotation.y = t * 0.14 + i * 0.32;
          line.material.opacity = 0.36 + Math.sin(t * 1.8 + i) * 0.16 + pulse * 0.18;
        });

        for (const p of particles) {
          const ph = p.phase + t * p.speed;
          p.mesh.position.set(
            Math.cos(ph) * p.radius,
            Math.sin(ph * 1.6) * 1.8,
            Math.sin(ph) * p.radius
          );
          p.mesh.material.opacity = 0.35 + Math.sin(ph * 3.2) * 0.3 + pulse * 0.2;
        }

        renderer.render(scene, camera);
        requestAnimationFrame(render);
      }

      render();
    </script>
  </body>
</html>
