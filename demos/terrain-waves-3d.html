<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terrain Waves 3D</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b101b;
        color: #eef6ff;
        font-family: "Segoe UI", sans-serif;
      }

      #stage { width: 100vw; height: 100vh; display: block; }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: 470px;
        background: rgba(10, 17, 28, 0.62);
        border: 1px solid rgba(150, 214, 255, 0.33);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.36; }
      .home { color: #a3deff; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Terrain Waves 3D</h1>
      <p>Animated procedural terrain waves with custom orbit camera controls.</p>
      <p>Drag to orbit, wheel to zoom, press <strong>S</strong> to toggle wireframe overlay.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";

      const canvas = document.getElementById("stage");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.05;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0d1422);
      scene.fog = new THREE.Fog(0x0d1422, 35, 140);

      const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 240);

      const orbit = {
        target: new THREE.Vector3(0, 0, 0),
        theta: 0.85,
        phi: 1.0,
        radius: 34,
        dragging: false,
        px: 0,
        py: 0,
      };

      function updateCamera() {
        orbit.phi = Math.max(0.2, Math.min(Math.PI - 0.2, orbit.phi));
        orbit.radius = Math.max(12, Math.min(80, orbit.radius));

        const sp = Math.sin(orbit.phi);
        camera.position.set(
          orbit.target.x + orbit.radius * sp * Math.sin(orbit.theta),
          orbit.target.y + orbit.radius * Math.cos(orbit.phi),
          orbit.target.z + orbit.radius * sp * Math.cos(orbit.theta)
        );
        camera.lookAt(orbit.target);
      }

      const hemi = new THREE.HemisphereLight(0xaad8ff, 0x1e2b33, 0.78);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 1.05);
      dir.position.set(20, 30, 12);
      scene.add(dir);

      const size = 140;
      const seg = 180;
      const geo = new THREE.PlaneGeometry(size, size, seg, seg);
      geo.rotateX(-Math.PI * 0.5);

      const mat = new THREE.MeshStandardMaterial({ color: 0x4fc3ff, roughness: 0.7, metalness: 0.08 });
      const mesh = new THREE.Mesh(geo, mat);
      scene.add(mesh);

      const wire = new THREE.LineSegments(
        new THREE.WireframeGeometry(geo),
        new THREE.LineBasicMaterial({ color: 0x9de4ff, transparent: true, opacity: 0.18 })
      );
      scene.add(wire);

      let showWire = true;

      const pos = geo.attributes.position;

      function sampleHeight(x, z, t) {
        return (
          Math.sin(x * 0.11 + t * 1.2) * 1.7 +
          Math.cos(z * 0.1 - t * 1.15) * 1.8 +
          Math.sin((x + z) * 0.06 + t * 1.8) * 2.2 +
          Math.cos((x - z) * 0.045 - t * 1.4) * 1.4
        );
      }

      function pointerDown(x, y) {
        orbit.dragging = true;
        orbit.px = x;
        orbit.py = y;
      }

      function pointerMove(x, y) {
        if (!orbit.dragging) return;
        const dx = x - orbit.px;
        const dy = y - orbit.py;
        orbit.px = x;
        orbit.py = y;
        orbit.theta -= dx * 0.005;
        orbit.phi += dy * 0.0045;
      }

      window.addEventListener("mousedown", (event) => pointerDown(event.clientX, event.clientY));
      window.addEventListener("mousemove", (event) => pointerMove(event.clientX, event.clientY));
      window.addEventListener("mouseup", () => {
        orbit.dragging = false;
      });

      window.addEventListener(
        "touchstart",
        (event) => {
          const t = event.touches[0];
          pointerDown(t.clientX, t.clientY);
        },
        { passive: true }
      );
      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          pointerMove(t.clientX, t.clientY);
        },
        { passive: true }
      );
      window.addEventListener("touchend", () => {
        orbit.dragging = false;
      });

      window.addEventListener("wheel", (event) => {
        orbit.radius += event.deltaY * 0.03;
      });

      window.addEventListener("keydown", (event) => {
        if (event.key.toLowerCase() === "s") {
          showWire = !showWire;
          wire.visible = showWire;
        }
      });

      function animate(now) {
        const t = now * 0.001;

        for (let i = 0; i < pos.count; i += 1) {
          const x = pos.getX(i);
          const z = pos.getZ(i);
          pos.setY(i, sampleHeight(x, z, t));
        }
        pos.needsUpdate = true;
        geo.computeVertexNormals();

        const centerWave = 0.5 + 0.5 * Math.sin(t * 0.9);
        mat.color.setHSL(0.52 + centerWave * 0.08, 0.7, 0.52);

        dir.position.set(Math.cos(t * 0.23) * 30, 28, Math.sin(t * 0.23) * 30);

        updateCamera();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      updateCamera();
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
