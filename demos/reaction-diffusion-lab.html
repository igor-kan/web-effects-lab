<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reaction Diffusion Lab</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0d14;
        color: #ecf6ff;
        font-family: "Segoe UI", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        image-rendering: pixelated;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 5;
        max-width: 450px;
        background: rgba(9, 15, 28, 0.58);
        border: 1px solid rgba(152, 218, 255, 0.3);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
        opacity: 0.92;
      }

      .home {
        color: #93d9ff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Reaction Diffusion Lab</h1>
      <p>Drag to inject reagent B. Press <strong>R</strong> to reset and <strong>T</strong> to cycle palette.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d");

      let width = window.innerWidth;
      let height = window.innerHeight;

      const GRID_W = 220;
      const GRID_H = 140;
      const SIZE = GRID_W * GRID_H;

      let A = new Float32Array(SIZE);
      let B = new Float32Array(SIZE);
      let nextA = new Float32Array(SIZE);
      let nextB = new Float32Array(SIZE);

      const image = new ImageData(GRID_W, GRID_H);
      const lowResCanvas = document.createElement("canvas");
      lowResCanvas.width = GRID_W;
      lowResCanvas.height = GRID_H;
      const lowCtx = lowResCanvas.getContext("2d");

      let palette = 0;
      const pointer = { x: GRID_W * 0.5, y: GRID_H * 0.5, down: false };

      const DA = 1.0;
      const DB = 0.5;
      const FEED = 0.055;
      const KILL = 0.062;
      const STEPS_PER_FRAME = 8;

      function idx(x, y) {
        return x + y * GRID_W;
      }

      function reset() {
        A.fill(1);
        B.fill(0);

        for (let y = GRID_H * 0.45; y < GRID_H * 0.55; y += 1) {
          for (let x = GRID_W * 0.43; x < GRID_W * 0.57; x += 1) {
            B[idx(x | 0, y | 0)] = 1;
          }
        }
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function toGrid(clientX, clientY) {
        pointer.x = clamp(Math.floor((clientX / width) * GRID_W), 1, GRID_W - 2);
        pointer.y = clamp(Math.floor((clientY / height) * GRID_H), 1, GRID_H - 2);
      }

      function inject() {
        if (!pointer.down) return;

        for (let oy = -4; oy <= 4; oy += 1) {
          for (let ox = -4; ox <= 4; ox += 1) {
            const x = clamp(pointer.x + ox, 1, GRID_W - 2);
            const y = clamp(pointer.y + oy, 1, GRID_H - 2);
            if (ox * ox + oy * oy <= 16) {
              B[idx(x, y)] = 1;
            }
          }
        }
      }

      function laplacian(field, x, y) {
        const c = idx(x, y);
        return (
          field[c] * -1 +
          field[idx(x - 1, y)] * 0.2 +
          field[idx(x + 1, y)] * 0.2 +
          field[idx(x, y - 1)] * 0.2 +
          field[idx(x, y + 1)] * 0.2 +
          field[idx(x - 1, y - 1)] * 0.05 +
          field[idx(x + 1, y - 1)] * 0.05 +
          field[idx(x - 1, y + 1)] * 0.05 +
          field[idx(x + 1, y + 1)] * 0.05
        );
      }

      function step() {
        for (let y = 1; y < GRID_H - 1; y += 1) {
          for (let x = 1; x < GRID_W - 1; x += 1) {
            const i = idx(x, y);
            const a = A[i];
            const b = B[i];

            const reaction = a * b * b;

            nextA[i] = a + (DA * laplacian(A, x, y) - reaction + FEED * (1 - a));
            nextB[i] = b + (DB * laplacian(B, x, y) + reaction - (KILL + FEED) * b);
          }
        }

        [A, nextA] = [nextA, A];
        [B, nextB] = [nextB, B];
      }

      function shade(v) {
        const c = clamp(v * 255, 0, 255) | 0;
        if (palette === 0) {
          return [c * 0.2, c * 0.82, c, 255];
        }
        if (palette === 1) {
          return [c, c * 0.4, 255 - c * 0.2, 255];
        }
        return [255 - c * 0.25, c, c * 0.45, 255];
      }

      function draw() {
        const px = image.data;

        for (let i = 0; i < SIZE; i += 1) {
          const v = clamp(A[i] - B[i], 0, 1);
          const [r, g, b, a] = shade(v);
          const p = i * 4;
          px[p] = r;
          px[p + 1] = g;
          px[p + 2] = b;
          px[p + 3] = a;
        }

        lowCtx.putImageData(image, 0, 0);
        ctx.imageSmoothingEnabled = false;
        ctx.clearRect(0, 0, width, height);
        ctx.drawImage(lowResCanvas, 0, 0, width, height);
      }

      function frame() {
        inject();

        for (let i = 0; i < STEPS_PER_FRAME; i += 1) {
          step();
        }

        draw();
        requestAnimationFrame(frame);
      }

      function setPointer(clientX, clientY) {
        toGrid(clientX, clientY);
      }

      window.addEventListener("resize", resize);

      window.addEventListener("mousedown", (event) => {
        pointer.down = true;
        setPointer(event.clientX, event.clientY);
      });

      window.addEventListener("mouseup", () => {
        pointer.down = false;
      });

      window.addEventListener("mousemove", (event) => {
        setPointer(event.clientX, event.clientY);
      });

      window.addEventListener(
        "touchstart",
        (event) => {
          pointer.down = true;
          const t = event.touches[0];
          setPointer(t.clientX, t.clientY);
        },
        { passive: true }
      );

      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          setPointer(t.clientX, t.clientY);
        },
        { passive: true }
      );

      window.addEventListener("touchend", () => {
        pointer.down = false;
      });

      window.addEventListener("keydown", (event) => {
        if (event.key.toLowerCase() === "r") {
          reset();
        }
        if (event.key.toLowerCase() === "t") {
          palette = (palette + 1) % 3;
        }
      });

      resize();
      reset();
      frame();
    </script>
  </body>
</html>
