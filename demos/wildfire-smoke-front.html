<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wildfire Smoke Front</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0f12;
        color: #eff8ff;
        font-family: "Segoe UI", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        image-rendering: pixelated;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 9;
        max-width: 560px;
        background: rgba(10, 16, 23, 0.62);
        border: 1px solid rgba(146, 212, 255, 0.34);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
      }

      .home {
        color: #9fd8ff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Wildfire Smoke Front</h1>
      <p>
        Cellular wildfire spread model with fuel burn-down, wind-driven ignition, and advected smoke cover.
      </p>
      <p>Click/drag to ignite. <strong>W</strong> changes wind, <strong>P</strong> pause, <strong>R</strong> reset terrain.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d", { alpha: false });

      const W = 240;
      const H = 140;
      const SIZE = W * H;

      const low = document.createElement("canvas");
      low.width = W;
      low.height = H;
      const lowCtx = low.getContext("2d", { alpha: false });
      const image = lowCtx.createImageData(W, H);

      let width = window.innerWidth;
      let height = window.innerHeight;

      let fuel = new Float32Array(SIZE);
      let heat = new Float32Array(SIZE);
      let smoke = new Float32Array(SIZE);
      let nextSmoke = new Float32Array(SIZE);
      let burning = new Uint8Array(SIZE);
      let nextBurning = new Uint8Array(SIZE);

      let paused = false;
      let windMode = 1;
      let tick = 0;

      const pointer = {
        x: W * 0.5,
        y: H * 0.5,
        down: false,
      };

      function idx(x, y) {
        return x + y * W;
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function toGrid(clientX, clientY) {
        pointer.x = clamp(Math.floor((clientX / width) * W), 1, W - 2);
        pointer.y = clamp(Math.floor((clientY / height) * H), 1, H - 2);
      }

      function reset() {
        fuel.fill(0);
        heat.fill(0);
        smoke.fill(0);
        nextSmoke.fill(0);
        burning.fill(0);

        for (let y = 0; y < H; y += 1) {
          for (let x = 0; x < W; x += 1) {
            const i = idx(x, y);
            const n =
              Math.sin(x * 0.07) * 0.18 +
              Math.cos(y * 0.09) * 0.15 +
              Math.sin((x + y) * 0.05) * 0.13;
            fuel[i] = clamp(0.56 + n + Math.random() * 0.2, 0.2, 1);
          }
        }

        for (let y = Math.floor(H * 0.4); y < Math.floor(H * 0.7); y += 1) {
          const i = idx(2, y);
          burning[i] = 1;
          heat[i] = 1;
        }
      }

      function ignite(cx, cy, radius = 3) {
        for (let oy = -radius; oy <= radius; oy += 1) {
          for (let ox = -radius; ox <= radius; ox += 1) {
            if (ox * ox + oy * oy > radius * radius) continue;
            const x = clamp(cx + ox, 1, W - 2);
            const y = clamp(cy + oy, 1, H - 2);
            const i = idx(x, y);
            if (fuel[i] > 0.1) {
              burning[i] = 1;
              heat[i] = 1;
            }
          }
        }
      }

      function windVector() {
        if (windMode === 0) return { x: -1, y: -1, strength: 1.18 };
        if (windMode === 1) return { x: 0, y: -1, strength: 1.05 };
        return { x: 1, y: -1, strength: 1.2 };
      }

      function step() {
        tick += 1;
        const wind = windVector();

        if (pointer.down) {
          ignite(pointer.x, pointer.y, 4);
        }

        nextBurning.set(burning);

        for (let y = 1; y < H - 1; y += 1) {
          for (let x = 1; x < W - 1; x += 1) {
            const i = idx(x, y);

            if (burning[i]) {
              fuel[i] = Math.max(0, fuel[i] - 0.018);
              heat[i] = Math.min(1.8, heat[i] + 0.12);
              smoke[i] = Math.min(1.5, smoke[i] + 0.08);

              if (fuel[i] <= 0.03) {
                nextBurning[i] = 0;
                heat[i] *= 0.35;
              }
            } else {
              heat[i] *= 0.93;
            }

            if (!burning[i] && fuel[i] > 0.08) {
              let influence = 0;

              for (let oy = -1; oy <= 1; oy += 1) {
                for (let ox = -1; ox <= 1; ox += 1) {
                  if (ox === 0 && oy === 0) continue;
                  const n = idx(x + ox, y + oy);
                  if (!burning[n]) continue;

                  let w = 0.12;
                  if (ox === wind.x && oy === wind.y) w *= wind.strength;
                  if (oy === -1) w *= 1.08;
                  influence += w * (0.5 + heat[n] * 0.5);
                }
              }

              const igniteChance = influence + (Math.sin((x + y + tick) * 0.07) * 0.5 + 0.5) * 0.04;
              if (igniteChance > 0.42 + Math.random() * 0.2) {
                nextBurning[i] = 1;
                heat[i] = Math.max(heat[i], 0.65);
              }
            }
          }
        }

        burning.set(nextBurning);

        const advX = windMode - 1;

        for (let y = 1; y < H - 1; y += 1) {
          for (let x = 1; x < W - 1; x += 1) {
            const i = idx(x, y);
            const fromX = clamp(x - advX, 1, W - 2);
            const fromY = clamp(y + 1, 1, H - 2);

            const carried = smoke[idx(fromX, fromY)] * 0.976;
            const local = smoke[i] * 0.82;
            nextSmoke[i] = Math.max(local, carried);
          }
        }

        [smoke, nextSmoke] = [nextSmoke, smoke];
      }

      function draw() {
        const px = image.data;

        for (let i = 0; i < SIZE; i += 1) {
          const f = fuel[i];
          const h = clamp(heat[i], 0, 1.5);
          const s = clamp(smoke[i], 0, 1.4);

          let r = 18 + f * 46;
          let g = 28 + f * 84;
          let b = 18 + f * 36;

          if (burning[i]) {
            r = 130 + h * 95;
            g = 45 + h * 72;
            b = 16 + h * 22;
          } else if (f < 0.09) {
            r = 24;
            g = 19;
            b = 16;
          }

          r = r * (1 - s * 0.42) + s * 36;
          g = g * (1 - s * 0.48) + s * 41;
          b = b * (1 - s * 0.35) + s * 56;

          const p = i * 4;
          px[p] = clamp(r, 0, 255);
          px[p + 1] = clamp(g, 0, 255);
          px[p + 2] = clamp(b, 0, 255);
          px[p + 3] = 255;
        }

        lowCtx.putImageData(image, 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(low, 0, 0, width, height);
      }

      function frame() {
        if (!paused) {
          step();
        }
        draw();
        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize);

      window.addEventListener("mousemove", (event) => {
        toGrid(event.clientX, event.clientY);
      });

      window.addEventListener("mousedown", (event) => {
        pointer.down = true;
        toGrid(event.clientX, event.clientY);
      });

      window.addEventListener("mouseup", () => {
        pointer.down = false;
      });

      window.addEventListener(
        "touchstart",
        (event) => {
          pointer.down = true;
          const t = event.touches[0];
          toGrid(t.clientX, t.clientY);
        },
        { passive: true }
      );

      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          toGrid(t.clientX, t.clientY);
        },
        { passive: true }
      );

      window.addEventListener("touchend", () => {
        pointer.down = false;
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "r") reset();
        if (key === "p") paused = !paused;
        if (key === "w") windMode = (windMode + 1) % 3;
      });

      resize();
      reset();
      frame();
    </script>
  </body>
</html>
