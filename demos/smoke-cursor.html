<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smoke Cursor</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", sans-serif;
        color: #e8f4ff;
        background: radial-gradient(circle at 30% 30%, #15213d 0%, #090d1a 56%, #06080f 100%);
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 14px;
        top: 14px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(8, 15, 28, 0.52);
        border: 1px solid rgba(170, 215, 255, 0.25);
        backdrop-filter: blur(8px);
        max-width: 360px;
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.83rem;
        opacity: 0.88;
        line-height: 1.35;
      }

      .home {
        color: #b6ddff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Smoke Cursor</h1>
      <p>Move pointer to emit smoke, click to burst, press <strong>Space</strong> to clear.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d");

      const particles = [];
      const pointer = { x: 0, y: 0, down: false, moved: false };
      let frame = 0;

      function resize() {
        canvas.width = window.innerWidth * window.devicePixelRatio;
        canvas.height = window.innerHeight * window.devicePixelRatio;
        ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
      }

      function emit(x, y, amount = 9, force = 1) {
        for (let i = 0; i < amount; i += 1) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 1.2 * force;
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 0.7 * force,
            life: 70 + Math.random() * 90,
            maxLife: 70 + Math.random() * 90,
            size: 6 + Math.random() * 14,
            hue: 195 + Math.random() * 45,
          });
        }
      }

      function drawBackground() {
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "rgba(6, 9, 18, 0.085)";
        ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
      }

      function updateParticles() {
        ctx.globalCompositeOperation = "lighter";

        for (let i = particles.length - 1; i >= 0; i -= 1) {
          const p = particles[i];
          p.life -= 1;

          p.vx += (Math.random() - 0.5) * 0.05;
          p.vy -= 0.013;
          p.vx *= 0.992;
          p.vy *= 0.992;

          p.x += p.vx;
          p.y += p.vy;
          p.size += 0.045;

          if (p.life <= 0 || p.y < -50 || p.x < -50 || p.x > window.innerWidth + 50) {
            particles.splice(i, 1);
            continue;
          }

          const alpha = p.life / p.maxLife;
          const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
          gradient.addColorStop(0, `hsla(${p.hue}, 100%, 70%, ${0.18 * alpha})`);
          gradient.addColorStop(0.45, `hsla(${p.hue - 20}, 90%, 70%, ${0.08 * alpha})`);
          gradient.addColorStop(1, "rgba(110, 120, 145, 0)");

          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function tick() {
        frame += 1;
        drawBackground();

        if (pointer.moved) {
          emit(pointer.x, pointer.y, pointer.down ? 14 : 7, pointer.down ? 1.8 : 1);
          pointer.moved = false;
        }

        if (!pointer.down && frame % 5 === 0) {
          emit(window.innerWidth * 0.5 + Math.sin(frame * 0.013) * 140, window.innerHeight - 60, 3, 0.75);
        }

        updateParticles();
        requestAnimationFrame(tick);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("mousemove", (event) => {
        pointer.x = event.clientX;
        pointer.y = event.clientY;
        pointer.moved = true;
      });

      window.addEventListener("touchmove", (event) => {
        const t = event.touches[0];
        pointer.x = t.clientX;
        pointer.y = t.clientY;
        pointer.moved = true;
      }, { passive: true });

      window.addEventListener("mousedown", (event) => {
        pointer.down = true;
        emit(event.clientX, event.clientY, 36, 2.1);
      });

      window.addEventListener("mouseup", () => {
        pointer.down = false;
      });

      window.addEventListener("keydown", (event) => {
        if (event.code === "Space") {
          particles.length = 0;
        }
      });

      resize();
      tick();
    </script>
  </body>
</html>
