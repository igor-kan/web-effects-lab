<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dust Devil Vortex</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #120f0b;
        color: #f5eee5;
        font-family: "Segoe UI", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 9;
        max-width: 560px;
        background: rgba(26, 19, 13, 0.62);
        border: 1px solid rgba(255, 211, 168, 0.28);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
      }

      .home {
        color: #ffd8ad;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Dust Devil Vortex</h1>
      <p>
        Turbulent dust vortex simulation with rising particles, radial suction, and wind-sheared smoke ribbons.
      </p>
      <p>Move pointer to steer vortex, click for gust burst, <strong>W</strong> wind mode, <strong>G</strong> glow, <strong>R</strong> reset.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d");

      let width = window.innerWidth;
      let height = window.innerHeight;
      let prevTime = performance.now();
      let time = 0;

      const dust = [];
      const smoke = [];
      const DUST_COUNT = 2600;
      const SMOKE_COUNT = 620;

      let windMode = 1;
      let burst = 0;
      let glow = true;

      const vortex = {
        x: width * 0.5,
        y: height * 0.82,
        tx: width * 0.5,
        ty: height * 0.82,
      };

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function spawnDust(p) {
        p.x = Math.random() * width;
        p.y = height * (0.66 + Math.random() * 0.35);
        p.vx = (Math.random() * 2 - 1) * 1.2;
        p.vy = -Math.random() * 1.2;
        p.life = 0.45 + Math.random() * 1.15;
        p.size = 0.6 + Math.random() * 2.2;
      }

      function spawnSmoke(p) {
        p.x = vortex.x + (Math.random() * 2 - 1) * 35;
        p.y = vortex.y + Math.random() * 20;
        p.vx = (Math.random() * 2 - 1) * 0.8;
        p.vy = -0.4 - Math.random() * 1.3;
        p.life = 0.5 + Math.random() * 0.9;
        p.size = 8 + Math.random() * 28;
        p.shade = 90 + Math.random() * 85;
      }

      function reset() {
        dust.length = 0;
        smoke.length = 0;
        burst = 0;

        for (let i = 0; i < DUST_COUNT; i += 1) {
          const p = {};
          spawnDust(p);
          dust.push(p);
        }

        for (let i = 0; i < SMOKE_COUNT; i += 1) {
          const p = {};
          spawnSmoke(p);
          smoke.push(p);
        }
      }

      function windValue() {
        if (windMode === 0) return -0.09;
        if (windMode === 1) return 0;
        return 0.09;
      }

      function update(dt) {
        time += dt;
        burst = Math.max(0, burst - dt * 0.8);

        vortex.x += (vortex.tx - vortex.x) * 0.08;
        vortex.y += (vortex.ty - vortex.y) * 0.08;

        const wind = windValue();
        const coreRadius = 42 + burst * 36;

        for (const p of dust) {
          const dx = p.x - vortex.x;
          const dy = p.y - vortex.y;
          const d2 = dx * dx + dy * dy + 50;
          const d = Math.sqrt(d2);

          const swirl = (4600 / d2) * (1 + burst * 0.75);
          p.vx += (-dy / d) * swirl * dt * 50;
          p.vy += (dx / d) * swirl * dt * 50;

          const pull = Math.max(0, 1 - d / (coreRadius * 3));
          p.vx += (-dx / d) * pull * 0.16;
          p.vy += (-dy / d) * pull * 0.11;

          p.vx += wind * dt * 60;
          p.vy -= (0.03 + pull * 0.07) * dt * 60;

          const turb = Math.sin((p.x * 0.017 + time * 2.5) + Math.cos(p.y * 0.013 - time * 2.1));
          p.vx += turb * 0.03;
          p.vy += Math.cos(turb * 2.6) * 0.017;

          p.vx *= 0.988;
          p.vy *= 0.988;

          p.x += p.vx;
          p.y += p.vy;
          p.life -= 0.0058 * dt * 60;

          if (p.y < height * 0.1 || p.x < -20 || p.x > width + 20 || p.y > height + 20 || p.life <= 0) {
            spawnDust(p);
          }
        }

        for (const p of smoke) {
          const dx = p.x - vortex.x;
          const dy = p.y - vortex.y;
          const d2 = dx * dx + dy * dy + 80;
          const d = Math.sqrt(d2);

          const swirl = (3500 / d2) * (0.8 + burst * 0.5);
          p.vx += (-dy / d) * swirl * dt * 44;
          p.vy += (dx / d) * swirl * dt * 44;

          p.vx += wind * 0.4 * dt * 60;
          p.vy -= 0.03 * dt * 60;

          p.vx *= 0.994;
          p.vy *= 0.995;

          p.x += p.vx;
          p.y += p.vy;
          p.size *= 1.003;
          p.life -= 0.0035 * dt * 60;

          if (p.life <= 0 || p.y < -80 || p.x < -140 || p.x > width + 140) {
            spawnSmoke(p);
          }
        }
      }

      function render() {
        ctx.fillStyle = "rgba(18, 15, 11, 0.2)";
        ctx.fillRect(0, 0, width, height);

        for (const p of smoke) {
          const alpha = Math.min(0.23, p.life * 0.2);
          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
          g.addColorStop(0, `rgba(${p.shade}, ${p.shade - 10}, ${p.shade - 18}, ${alpha})`);
          g.addColorStop(1, "rgba(20, 16, 13, 0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.shadowBlur = glow ? 8 : 0;
        ctx.shadowColor = "rgba(255, 190, 130, 0.55)";

        for (const p of dust) {
          const alpha = Math.min(0.9, p.life * 0.88 + 0.08);
          ctx.fillStyle = `rgba(225, 190, 140, ${alpha})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.shadowBlur = 0;

        const core = ctx.createRadialGradient(vortex.x, vortex.y, 0, vortex.x, vortex.y, 56 + burst * 42);
        core.addColorStop(0, `rgba(255, 178, 108, ${0.18 + burst * 0.18})`);
        core.addColorStop(1, "rgba(255, 120, 70, 0)");
        ctx.fillStyle = core;
        ctx.beginPath();
        ctx.arc(vortex.x, vortex.y, 56 + burst * 42, 0, Math.PI * 2);
        ctx.fill();
      }

      function frame(now) {
        const dt = Math.min(0.05, (now - prevTime) * 0.001);
        prevTime = now;

        update(dt);
        render();
        requestAnimationFrame(frame);
      }

      function updatePointer(clientX, clientY) {
        vortex.tx = clientX;
        vortex.ty = clientY;
      }

      window.addEventListener("mousemove", (event) => updatePointer(event.clientX, event.clientY));
      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          updatePointer(t.clientX, t.clientY);
        },
        { passive: true }
      );

      window.addEventListener("click", () => {
        burst = Math.min(1.5, burst + 0.55);
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "w") windMode = (windMode + 1) % 3;
        if (key === "g") glow = !glow;
        if (key === "r") reset();
      });

      window.addEventListener("resize", resize);

      resize();
      reset();
      ctx.fillStyle = "#120f0b";
      ctx.fillRect(0, 0, width, height);
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
