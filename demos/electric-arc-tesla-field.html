<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electric Arc Tesla Field</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #02040a;
        color: #e9f3ff;
        font-family: "Segoe UI", sans-serif;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 9;
        max-width: 560px;
        background: rgba(8, 14, 28, 0.62);
        border: 1px solid rgba(162, 207, 255, 0.28);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }
      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.35; }
      .home { color: #9cd4ff; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Electric Arc Tesla Field</h1>
      <p>Branching arc network with charged nodes, glow bloom, and pointer-driven attraction.</p>
      <p>Move pointer to bend arcs, click overload burst, <strong>C</strong> palette, <strong>R</strong> reseed, <strong>A</strong> autopilot.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d');

      let width = innerWidth;
      let height = innerHeight;
      let time = 0;
      let burst = 0;
      let palette = 0;
      let autopilot = true;

      const pointer = { x: width * 0.5, y: height * 0.5, tx: width * 0.5, ty: height * 0.5 };
      const nodes = [];

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function resize() {
        width = innerWidth;
        height = innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function reseed() {
        nodes.length = 0;
        const count = Math.max(22, Math.floor((width * height) / 52000));
        for (let i = 0; i < count; i += 1) {
          const angle = Math.random() * Math.PI * 2;
          const radius = Math.sqrt(Math.random()) * Math.min(width, height) * 0.4;
          nodes.push({
            x: width * 0.5 + Math.cos(angle) * radius,
            y: height * 0.5 + Math.sin(angle) * radius,
            vx: (Math.random() - 0.5) * 26,
            vy: (Math.random() - 0.5) * 26,
            charge: Math.random() < 0.5 ? -1 : 1,
            phase: Math.random() * Math.PI * 2,
          });
        }
      }

      function paletteColors() {
        if (palette === 0) return ['#6dc5ff', '#9d7dff', '#e6f6ff'];
        if (palette === 1) return ['#58ffca', '#7be4ff', '#e9fff6'];
        if (palette === 2) return ['#ff9f6a', '#ffd977', '#fff2dc'];
        return ['#ff73c0', '#8ca5ff', '#f9e8ff'];
      }

      function drawArc(ax, ay, bx, by, intensity, depth = 2) {
        const jitter = 11 + intensity * 16 + burst * 8;
        const points = [{ x: ax, y: ay }];
        const segments = 5 + depth * 2;

        for (let i = 1; i < segments; i += 1) {
          const t = i / segments;
          let x = ax + (bx - ax) * t;
          let y = ay + (by - ay) * t;

          const nx = -(by - ay);
          const ny = bx - ax;
          const nLen = Math.hypot(nx, ny) || 1;
          const wave = Math.sin(t * 18 + time * 8 + intensity * 7 + depth) * 0.6 + (Math.random() - 0.5);
          const offset = (wave * jitter * (1 - Math.abs(t - 0.5) * 1.6)) / nLen;
          x += nx * offset;
          y += ny * offset;
          points.push({ x, y });
        }

        points.push({ x: bx, y: by });

        const [main, alt, glow] = paletteColors();

        ctx.strokeStyle = glow;
        ctx.lineWidth = 3.6 + intensity * 2.8;
        ctx.globalAlpha = 0.07 + intensity * 0.2 + burst * 0.15;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i += 1) ctx.lineTo(points[i].x, points[i].y);
        ctx.stroke();

        ctx.strokeStyle = depth % 2 ? alt : main;
        ctx.lineWidth = 1.2 + intensity * 1.7;
        ctx.globalAlpha = 0.42 + intensity * 0.3;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i += 1) ctx.lineTo(points[i].x, points[i].y);
        ctx.stroke();

        if (depth > 0 && Math.random() < 0.42 + burst * 0.25) {
          const j = 1 + Math.floor(Math.random() * (points.length - 2));
          const p = points[j];
          const angle = Math.atan2(by - ay, bx - ax) + (Math.random() - 0.5) * 1.6;
          const len = (Math.random() * 0.45 + 0.2) * Math.hypot(bx - ax, by - ay);
          drawArc(p.x, p.y, p.x + Math.cos(angle) * len, p.y + Math.sin(angle) * len, intensity * 0.65, depth - 1);
        }
      }

      function update(dt) {
        pointer.x += (pointer.tx - pointer.x) * 0.1;
        pointer.y += (pointer.ty - pointer.y) * 0.1;

        if (autopilot) {
          pointer.tx = width * 0.5 + Math.cos(time * 0.38) * width * 0.24;
          pointer.ty = height * 0.52 + Math.sin(time * 0.27) * height * 0.2;
        }

        for (const n of nodes) {
          const cx = width * 0.5;
          const cy = height * 0.5;
          const toCenterX = cx - n.x;
          const toCenterY = cy - n.y;
          n.vx += toCenterX * dt * 0.05;
          n.vy += toCenterY * dt * 0.05;

          const dx = pointer.x - n.x;
          const dy = pointer.y - n.y;
          const d = Math.hypot(dx, dy) + 1;
          const pull = (n.charge > 0 ? 1 : -1) * (180 / (d * d));
          n.vx += dx * pull * dt;
          n.vy += dy * pull * dt;

          n.phase += dt * (0.9 + Math.abs(n.charge) * 0.3);
          n.vx += Math.cos(n.phase * 1.7) * dt * 6;
          n.vy += Math.sin(n.phase * 1.3) * dt * 6;

          n.vx *= 0.986;
          n.vy *= 0.986;

          n.x += n.vx * dt;
          n.y += n.vy * dt;

          const margin = 14;
          if (n.x < margin || n.x > width - margin) n.vx *= -0.8;
          if (n.y < margin || n.y > height - margin) n.vy *= -0.8;
          n.x = clamp(n.x, margin, width - margin);
          n.y = clamp(n.y, margin, height - margin);
        }

        burst = Math.max(0, burst - dt * 0.85);
      }

      function draw() {
        const bg = ctx.createLinearGradient(0, 0, 0, height);
        bg.addColorStop(0, '#040815');
        bg.addColorStop(1, '#0a1224');
        ctx.fillStyle = bg;
        ctx.globalAlpha = 1;
        ctx.fillRect(0, 0, width, height);

        ctx.globalCompositeOperation = 'lighter';
        for (let i = 0; i < nodes.length; i += 1) {
          for (let j = i + 1; j < nodes.length; j += 1) {
            const a = nodes[i];
            const b = nodes[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const d = Math.hypot(dx, dy);
            const maxDist = 170 + burst * 80;
            if (d > maxDist) continue;
            if (a.charge === b.charge && d > maxDist * 0.55) continue;

            const intensity = clamp(1 - d / maxDist, 0, 1);
            if (Math.random() < 0.35 + intensity * 0.5 + burst * 0.25) {
              drawArc(a.x, a.y, b.x, b.y, intensity, 2);
            }
          }
        }

        const [main, alt, glow] = paletteColors();
        for (const n of nodes) {
          const r = 3 + (n.charge > 0 ? 1.1 : 0.6);
          ctx.globalAlpha = 0.7;
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(n.x, n.y, r + burst * 2, 0, Math.PI * 2);
          ctx.fill();

          ctx.globalAlpha = 0.9;
          ctx.fillStyle = n.charge > 0 ? main : alt;
          ctx.beginPath();
          ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.globalAlpha = 0.4 + burst * 0.2;
        ctx.strokeStyle = glow;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(pointer.x, pointer.y, 18 + burst * 28, 0, Math.PI * 2);
        ctx.stroke();

        ctx.globalCompositeOperation = 'source-over';
      }

      let last = performance.now();
      function frame(now) {
        const dt = Math.min(0.033, (now - last) * 0.001);
        last = now;
        time += dt;

        update(dt);
        draw();
        requestAnimationFrame(frame);
      }

      addEventListener('resize', resize);
      addEventListener('mousemove', (event) => {
        autopilot = false;
        pointer.tx = event.clientX;
        pointer.ty = event.clientY;
      });
      addEventListener('touchmove', (event) => {
        const t = event.touches[0];
        autopilot = false;
        pointer.tx = t.clientX;
        pointer.ty = t.clientY;
      }, { passive: true });

      addEventListener('click', () => {
        burst = Math.min(1.7, burst + 0.8);
      });

      addEventListener('keydown', (event) => {
        const key = event.key.toLowerCase();
        if (key === 'c') palette = (palette + 1) % 4;
        if (key === 'r') reseed();
        if (key === 'a') autopilot = !autopilot;
      });

      resize();
      reseed();
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
