<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sandstorm Particle Wall</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #120d08;
        color: #f5ecdf;
        font-family: "Segoe UI", sans-serif;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 9;
        max-width: 560px;
        background: rgba(28, 20, 12, 0.62);
        border: 1px solid rgba(255, 206, 156, 0.3);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }
      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.36; }
      .home { color: #ffd2a8; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Sandstorm Particle Wall</h1>
      <p>
        Dense wall of sand particles with layered depth fog, turbulent gusts, and directional wind shearing.
      </p>
      <p>Move pointer to bend gust direction, click gust burst, <strong>W</strong> wind cycle, <strong>D</strong> density mode.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d');

      let width = innerWidth;
      let height = innerHeight;
      let prev = performance.now();
      let time = 0;

      const particles = [];
      let dense = false;
      let windMode = 1;
      let burst = 0;

      const pointer = { x: width * 0.5, y: height * 0.5, tx: width * 0.5, ty: height * 0.5 };

      function resize() {
        const dpr = Math.min(devicePixelRatio || 1, 2);
        width = innerWidth;
        height = innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function windValue() {
        if (windMode === 0) return -1.2;
        if (windMode === 1) return 0.2;
        return 1.4;
      }

      function spawn(p) {
        p.depth = Math.random();
        p.x = Math.random() * width;
        p.y = Math.random() * height;
        p.vx = windValue() * (0.8 + (1 - p.depth) * 2.2);
        p.vy = (Math.random() * 2 - 1) * 0.4;
        p.size = 0.6 + (1 - p.depth) * 2.8;
        p.life = 0.5 + Math.random() * 1.3;
      }

      function reset() {
        particles.length = 0;
        const count = dense ? 5200 : 3400;
        for (let i = 0; i < count; i += 1) {
          const p = {};
          spawn(p);
          particles.push(p);
        }
      }

      function update(dt) {
        time += dt;
        burst = Math.max(0, burst - dt * 0.85);

        pointer.x += (pointer.tx - pointer.x) * 0.1;
        pointer.y += (pointer.ty - pointer.y) * 0.1;

        const baseWind = windValue();

        for (const p of particles) {
          const local = Math.sin((p.y * 0.012 + time * 2.2) + Math.cos(p.x * 0.01 - time * 1.6));
          const py = (pointer.y / height) * 2 - 1;
          const px = (pointer.x / width) * 2 - 1;

          p.vx += (baseWind * 0.08 + local * 0.05 + px * 0.06 + burst * 0.4) * dt * 60;
          p.vy += (local * 0.04 + py * 0.03) * dt * 60;

          p.vx *= 0.992;
          p.vy *= 0.992;

          p.x += p.vx;
          p.y += p.vy;
          p.life -= 0.0052 * dt * 60;

          if (p.x < -30 || p.x > width + 30 || p.y < -20 || p.y > height + 20 || p.life <= 0) {
            spawn(p);
            if (baseWind > 0) p.x = -15;
            else p.x = width + 15;
          }
        }
      }

      function render() {
        ctx.fillStyle = 'rgba(18, 13, 8, 0.2)';
        ctx.fillRect(0, 0, width, height);

        for (const p of particles) {
          const alpha = (0.12 + (1 - p.depth) * 0.42) * Math.min(1, p.life);
          const c = 130 + (1 - p.depth) * 92;
          ctx.fillStyle = `rgba(${c + 18}, ${c}, ${c - 35}, ${alpha})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        }

        const haze = ctx.createLinearGradient(0, 0, width, 0);
        haze.addColorStop(0, 'rgba(180, 130, 75, 0.08)');
        haze.addColorStop(0.5, 'rgba(110, 85, 55, 0.02)');
        haze.addColorStop(1, 'rgba(180, 130, 75, 0.08)');
        ctx.fillStyle = haze;
        ctx.fillRect(0, 0, width, height);
      }

      function frame(now) {
        const dt = Math.min(0.05, (now - prev) * 0.001);
        prev = now;
        update(dt);
        render();
        requestAnimationFrame(frame);
      }

      addEventListener('mousemove', (event) => {
        pointer.tx = event.clientX;
        pointer.ty = event.clientY;
      });
      addEventListener('touchmove', (event) => {
        const t = event.touches[0];
        pointer.tx = t.clientX;
        pointer.ty = t.clientY;
      }, { passive: true });

      addEventListener('click', () => {
        burst = Math.min(1.3, burst + 0.5);
      });

      addEventListener('keydown', (event) => {
        const key = event.key.toLowerCase();
        if (key === 'w') windMode = (windMode + 1) % 3;
        if (key === 'd') {
          dense = !dense;
          reset();
        }
      });

      addEventListener('resize', () => {
        resize();
        reset();
      });

      resize();
      reset();
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
