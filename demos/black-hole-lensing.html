<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Hole Lensing</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #02040a;
        color: #eaf4ff;
        font-family: "Segoe UI", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 8;
        max-width: 540px;
        background: rgba(7, 12, 24, 0.62);
        border: 1px solid rgba(146, 206, 255, 0.34);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
      }

      .home {
        color: #9dd7ff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Black Hole Lensing</h1>
      <p>
        Relativistic-style starfield lensing with a steerable black hole and glowing accretion ring.
      </p>
      <p>Move pointer to steer. Wheel changes mass. Press <strong>A</strong> auto-drift and <strong>R</strong> reset.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d");

      let width = window.innerWidth;
      let height = window.innerHeight;
      let centerX = width * 0.5;
      let centerY = height * 0.5;

      const STAR_COUNT = 1800;
      const stars = Array.from({ length: STAR_COUNT }, () => ({}));

      let prevTime = performance.now();
      let holeRadius = 54;
      let autoDrift = false;
      let driftT = Math.random() * Math.PI * 2;

      const pointer = {
        x: centerX,
        y: centerY,
        tx: centerX,
        ty: centerY,
      };

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function resetStar(star, deep = false) {
        const spread = Math.max(width, height) * 1.15;
        star.x = rand(-spread, spread);
        star.y = rand(-spread, spread);
        star.z = deep ? rand(60, 1900) : rand(300, 1900);
        star.pz = star.z;
        star.tint = rand(0, 1);
      }

      function initStars() {
        for (const s of stars) {
          resetStar(s, true);
        }
      }

      function updateHoleTarget(dt) {
        if (autoDrift) {
          driftT += dt * 0.48;
          pointer.tx = width * 0.5 + Math.cos(driftT * 0.92) * width * 0.2;
          pointer.ty = height * 0.5 + Math.sin(driftT * 1.17) * height * 0.17;
        }

        pointer.x += (pointer.tx - pointer.x) * 0.08;
        pointer.y += (pointer.ty - pointer.y) * 0.08;
      }

      function render(now) {
        const dt = Math.min(0.05, (now - prevTime) * 0.001);
        prevTime = now;

        updateHoleTarget(dt);

        ctx.fillStyle = "rgba(2, 4, 10, 0.32)";
        ctx.fillRect(0, 0, width, height);

        const focal = Math.min(width, height) * 0.92;
        const speed = 44;

        for (const s of stars) {
          s.pz = s.z;
          s.z -= speed * dt * 28;
          if (s.z < 3) {
            resetStar(s);
            continue;
          }

          let px = centerX + (s.x / s.z) * focal;
          let py = centerY + (s.y / s.z) * focal;
          const ppx = centerX + (s.x / s.pz) * focal;
          const ppy = centerY + (s.y / s.pz) * focal;

          const dx = px - pointer.x;
          const dy = py - pointer.y;
          const d = Math.hypot(dx, dy) + 0.001;

          if (d < holeRadius * 0.85) {
            continue;
          }

          if (d < 340) {
            const bend = ((holeRadius * holeRadius) / (d * d + 900)) * 210;
            const tangX = (-dy / d) * bend;
            const tangY = (dx / d) * bend;
            const pull = ((holeRadius * holeRadius * 2.3) / (d * d + 650)) * 1.2;
            px += tangX - (dx / d) * pull;
            py += tangY - (dy / d) * pull;
          }

          if (px < -120 || px > width + 120 || py < -120 || py > height + 120) {
            resetStar(s);
            continue;
          }

          const depth = 1 - s.z / 1900;
          const len = Math.hypot(px - ppx, py - ppy);
          const alpha = 0.2 + depth * 0.76;
          const hue = 200 + s.tint * 36 + depth * 18;

          ctx.strokeStyle = `hsla(${hue}, 92%, ${68 + depth * 22}%, ${alpha})`;
          ctx.lineWidth = 0.45 + depth * 1.5 + Math.min(1.2, len * 0.08);
          ctx.shadowBlur = 8 + depth * 20;
          ctx.shadowColor = `hsla(${hue}, 96%, 64%, ${0.75 * alpha})`;

          ctx.beginPath();
          ctx.moveTo(ppx, ppy);
          ctx.lineTo(px, py);
          ctx.stroke();
        }

        ctx.shadowBlur = 0;

        const ringOuter = holeRadius * 2.25;
        const ringInner = holeRadius * 1.25;
        const ring = ctx.createRadialGradient(pointer.x, pointer.y, ringInner, pointer.x, pointer.y, ringOuter);
        ring.addColorStop(0, "rgba(255, 130, 40, 0)");
        ring.addColorStop(0.55, "rgba(255, 164, 70, 0.28)");
        ring.addColorStop(0.78, "rgba(255, 218, 150, 0.55)");
        ring.addColorStop(1, "rgba(255, 180, 88, 0)");
        ctx.fillStyle = ring;
        ctx.beginPath();
        ctx.arc(pointer.x, pointer.y, ringOuter, 0, Math.PI * 2);
        ctx.fill();

        const eventHorizon = ctx.createRadialGradient(pointer.x, pointer.y, 0, pointer.x, pointer.y, holeRadius);
        eventHorizon.addColorStop(0, "rgba(0, 0, 0, 0.98)");
        eventHorizon.addColorStop(1, "rgba(0, 0, 0, 0.9)");
        ctx.fillStyle = eventHorizon;
        ctx.beginPath();
        ctx.arc(pointer.x, pointer.y, holeRadius, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(render);
      }

      window.addEventListener("mousemove", (event) => {
        pointer.tx = event.clientX;
        pointer.ty = event.clientY;
      });

      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          pointer.tx = t.clientX;
          pointer.ty = t.clientY;
        },
        { passive: true }
      );

      window.addEventListener("wheel", (event) => {
        holeRadius += event.deltaY > 0 ? -3 : 3;
        holeRadius = Math.max(26, Math.min(112, holeRadius));
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "a") {
          autoDrift = !autoDrift;
        }
        if (key === "r") {
          initStars();
        }
      });

      window.addEventListener("resize", resize);

      resize();
      initStars();
      ctx.fillStyle = "#02040a";
      ctx.fillRect(0, 0, width, height);
      requestAnimationFrame(render);
    </script>
  </body>
</html>
