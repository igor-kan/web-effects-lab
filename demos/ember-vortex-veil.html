<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ember Vortex Veil</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #100a09;
        color: #fff1e4;
        font-family: "Segoe UI", sans-serif;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 9;
        max-width: 560px;
        background: rgba(27, 14, 10, 0.6);
        border: 1px solid rgba(255, 192, 145, 0.3);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }
      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.35; }
      .home { color: #ffc48f; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Ember Vortex Veil</h1>
      <p>Swirling ember veil with layered smoke haze, turbulence advection, and cinematic glow trails.</p>
      <p>Move pointer to steer vortex, click burst embers, <strong>G</strong> glow mode, <strong>W</strong> wind mode, <strong>R</strong> reset.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d');

      let width = innerWidth;
      let height = innerHeight;
      let time = 0;
      let burst = 0;
      let glowMode = 1;
      let windMode = 1;

      const pointer = { x: width * 0.5, y: height * 0.62, tx: width * 0.5, ty: height * 0.62 };
      let particles = [];

      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

      function resize() {
        width = innerWidth;
        height = innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function wind() {
        if (windMode === 0) return -14;
        if (windMode === 1) return 0;
        return 14;
      }

      function glow() {
        if (glowMode === 0) return 0.5;
        if (glowMode === 1) return 1.0;
        return 1.7;
      }

      function reset() {
        particles = [];
        for (let i = 0; i < 2200; i += 1) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            age: Math.random(),
            life: 1.2 + Math.random() * 1.5,
            ember: Math.random() < 0.35,
            size: Math.random() < 0.35 ? 1 + Math.random() * 1.6 : 5 + Math.random() * 12,
          });
        }
      }

      function update(dt) {
        pointer.x += (pointer.tx - pointer.x) * 0.08;
        pointer.y += (pointer.ty - pointer.y) * 0.08;

        burst = Math.max(0, burst - dt * 0.85);

        const w = wind();

        for (let i = particles.length - 1; i >= 0; i -= 1) {
          const p = particles[i];
          p.age += dt;
          if (p.age > p.life) {
            p.x = Math.random() * width;
            p.y = Math.random() * height;
            p.vx = (Math.random() - 0.5) * 8;
            p.vy = (Math.random() - 0.5) * 8;
            p.age = 0;
            p.life = 1.1 + Math.random() * 1.6;
            p.ember = Math.random() < 0.35;
            p.size = p.ember ? 1 + Math.random() * 1.6 : 5 + Math.random() * 12;
          }

          const dx = p.x - pointer.x;
          const dy = p.y - pointer.y;
          const d = Math.hypot(dx, dy) + 1;

          const swirl = 1900 / (d + 80);
          p.vx += (-dy / d) * swirl * dt;
          p.vy += (dx / d) * swirl * dt;

          p.vx += w * dt * 0.8;
          p.vy -= (p.ember ? 34 : 14) * dt;

          p.vx += Math.sin(time * 2.2 + p.y * 0.02) * dt * 8;
          p.vy += Math.cos(time * 2.1 + p.x * 0.02) * dt * 8;

          p.vx *= 0.992;
          p.vy *= 0.992;

          p.x += p.vx * dt * 60;
          p.y += p.vy * dt * 60;

          if (p.x < -50 || p.x > width + 50 || p.y < -50 || p.y > height + 50) {
            p.x = Math.random() * width;
            p.y = height + Math.random() * 80;
            p.vx = (Math.random() - 0.5) * 10;
            p.vy = -40 - Math.random() * 50;
          }
        }
      }

      function draw() {
        const bg = ctx.createLinearGradient(0, 0, 0, height);
        bg.addColorStop(0, '#130a0b');
        bg.addColorStop(1, '#1a110d');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, width, height);

        const haze = ctx.createRadialGradient(pointer.x, pointer.y, 0, pointer.x, pointer.y, 260 + burst * 160);
        haze.addColorStop(0, 'rgba(255,140,78,0.2)');
        haze.addColorStop(1, 'rgba(255,140,78,0)');
        ctx.fillStyle = haze;
        ctx.fillRect(pointer.x - 320, pointer.y - 320, 640, 640);

        ctx.globalCompositeOperation = 'lighter';

        const g = glow();

        for (const p of particles) {
          const t = p.age / p.life;
          if (p.ember) {
            const alpha = (1 - t) * (0.75 + burst * 0.2) * g;
            const r = p.size * (1 + t * 0.6);
            ctx.fillStyle = `rgba(255, ${120 + (1 - t) * 90}, ${55 + (1 - t) * 40}, ${alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
            ctx.fill();
          } else {
            const alpha = (1 - t) * 0.14 * g;
            const r = p.size * (1.1 + t * 1.6);
            const c = 70 + (1 - t) * 50;
            ctx.fillStyle = `rgba(${c}, ${c - 10}, ${c - 18}, ${alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        ctx.globalCompositeOperation = 'source-over';
      }

      let prev = performance.now();
      function frame(now) {
        const dt = Math.min(0.033, (now - prev) * 0.001);
        prev = now;
        time += dt;

        update(dt);
        draw();
        requestAnimationFrame(frame);
      }

      addEventListener('resize', () => {
        resize();
        reset();
      });
      addEventListener('mousemove', (e) => {
        pointer.tx = e.clientX;
        pointer.ty = e.clientY;
      });
      addEventListener('touchmove', (e) => {
        const t = e.touches[0];
        pointer.tx = t.clientX;
        pointer.ty = t.clientY;
      }, { passive: true });
      addEventListener('click', () => {
        burst = Math.min(1.9, burst + 1.0);
      });
      addEventListener('keydown', (event) => {
        const k = event.key.toLowerCase();
        if (k === 'g') glowMode = (glowMode + 1) % 3;
        if (k === 'w') windMode = (windMode + 1) % 3;
        if (k === 'r') reset();
      });

      resize();
      reset();
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
