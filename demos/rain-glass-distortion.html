<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rain Glass Distortion</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a1221;
        color: #e6f4ff;
        font-family: "Segoe UI", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: 500px;
        background: rgba(11, 21, 39, 0.64);
        border: 1px solid rgba(145, 203, 255, 0.35);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.36; }
      .home { color: #9cd7ff; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Rain Glass Distortion</h1>
      <p>Procedural raindrops slide down glass and refract the background city lights.</p>
      <p>Press <strong>D</strong> for dense rain and <strong>R</strong> to reset drops.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d", { alpha: false });

      let width = window.innerWidth;
      let height = window.innerHeight;

      const drops = [];
      let dense = false;

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function randomDrop(y = -20) {
        return {
          x: Math.random() * width,
          y,
          r: 2 + Math.random() * 10,
          vy: 0.7 + Math.random() * 1.7,
          vx: (Math.random() - 0.5) * 0.18,
          streak: 8 + Math.random() * 40,
          wobble: Math.random() * Math.PI * 2,
        };
      }

      function seedDrops(count = 120) {
        drops.length = 0;
        for (let i = 0; i < count; i += 1) {
          drops.push(randomDrop(Math.random() * height));
        }
      }

      function drawBackground(t) {
        const g = ctx.createLinearGradient(0, 0, 0, height);
        g.addColorStop(0, "#13233f");
        g.addColorStop(1, "#080f1f");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, width, height);

        // soft city lights
        for (let i = 0; i < 24; i += 1) {
          const x = (i / 24) * width + Math.sin(t * 0.0004 + i) * 18;
          const y = height * (0.52 + (i % 6) * 0.07);
          const r = 18 + (i % 5) * 10;
          const hue = 190 + ((i * 31) % 120);
          const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
          grad.addColorStop(0, `hsla(${hue}, 90%, 75%, 0.28)`);
          grad.addColorStop(1, `hsla(${hue}, 90%, 60%, 0)`);
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function updateDrops(t) {
        const spawnRate = dense ? 6 : 3;
        for (let i = 0; i < spawnRate; i += 1) {
          if (Math.random() < (dense ? 0.75 : 0.45)) {
            drops.push(randomDrop());
          }
        }

        for (let i = drops.length - 1; i >= 0; i -= 1) {
          const d = drops[i];
          d.wobble += 0.05;
          d.x += d.vx + Math.sin(d.wobble) * 0.05;
          d.y += d.vy + d.r * 0.015;

          if (d.y - d.r > height + 80) {
            drops.splice(i, 1);
          }
        }

        if (drops.length > (dense ? 480 : 260)) {
          drops.splice(0, drops.length - (dense ? 480 : 260));
        }
      }

      function drawDrops(t) {
        ctx.save();
        ctx.globalCompositeOperation = "screen";

        for (const d of drops) {
          const refractShift = Math.sin(t * 0.002 + d.wobble) * 5;

          // streak
          ctx.strokeStyle = "rgba(200, 235, 255, 0.09)";
          ctx.lineWidth = Math.max(0.7, d.r * 0.18);
          ctx.beginPath();
          ctx.moveTo(d.x, d.y - d.streak);
          ctx.lineTo(d.x + refractShift * 0.2, d.y + d.r);
          ctx.stroke();

          // droplet body
          const grad = ctx.createRadialGradient(
            d.x - d.r * 0.25,
            d.y - d.r * 0.25,
            0,
            d.x,
            d.y,
            d.r * 1.2
          );
          grad.addColorStop(0, "rgba(240, 252, 255, 0.34)");
          grad.addColorStop(0.45, "rgba(170, 220, 255, 0.14)");
          grad.addColorStop(1, "rgba(120, 180, 220, 0)");
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(d.x + refractShift * 0.08, d.y, d.r, 0, Math.PI * 2);
          ctx.fill();

          // highlight
          ctx.fillStyle = "rgba(255,255,255,0.24)";
          ctx.beginPath();
          ctx.ellipse(d.x - d.r * 0.28, d.y - d.r * 0.34, d.r * 0.27, d.r * 0.16, -0.6, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      function frame(now) {
        drawBackground(now);
        updateDrops(now);
        drawDrops(now);
        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", () => {
        resize();
        seedDrops(dense ? 200 : 120);
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "d") dense = !dense;
        if (key === "r") seedDrops(dense ? 200 : 120);
      });

      resize();
      seedDrops(120);
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
