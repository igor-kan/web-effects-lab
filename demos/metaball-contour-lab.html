<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metaball Contour Lab</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #040812;
        color: #e8f6ff;
        font-family: "Segoe UI", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 8;
        max-width: 520px;
        background: rgba(9, 16, 30, 0.62);
        border: 1px solid rgba(144, 213, 255, 0.34);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
      }

      .home {
        color: #9ad4ff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Metaball Contour Lab</h1>
      <p>
        Marching-squares contour extraction over a dynamic metaball field. Move pointer to inject a live influence.
      </p>
      <p>Click to add a new blob, press <strong>C</strong> to clear extras, <strong>R</strong> to reseed.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d");

      const GRID_W = 220;
      const GRID_H = 140;
      const SIZE = GRID_W * GRID_H;

      const field = new Float32Array(SIZE);
      const low = document.createElement("canvas");
      low.width = GRID_W;
      low.height = GRID_H;
      const lowCtx = low.getContext("2d", { alpha: false });
      const image = lowCtx.createImageData(GRID_W, GRID_H);

      let width = window.innerWidth;
      let height = window.innerHeight;
      let blobs = [];
      let tick = 0;

      const pointer = {
        x: GRID_W * 0.5,
        y: GRID_H * 0.5,
        active: false,
      };

      const segmentTable = [
        [],
        [[3, 2]],
        [[2, 1]],
        [[3, 1]],
        [[0, 1]],
        [[0, 3], [1, 2]],
        [[0, 2]],
        [[0, 3]],
        [[0, 3]],
        [[0, 2]],
        [[0, 1], [2, 3]],
        [[0, 1]],
        [[1, 3]],
        [[2, 1]],
        [[3, 2]],
        [],
      ];

      function idx(x, y) {
        return x + y * GRID_W;
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function spawnBlob(x = Math.random() * GRID_W, y = Math.random() * GRID_H) {
        blobs.push({
          x,
          y,
          vx: Math.random() * 1.2 - 0.6,
          vy: Math.random() * 1.2 - 0.6,
          r: 18 + Math.random() * 18,
          wobble: Math.random() * Math.PI * 2,
        });
      }

      function reseed() {
        blobs = [];
        for (let i = 0; i < 7; i += 1) {
          spawnBlob();
        }
      }

      function updateBlobs() {
        for (const b of blobs) {
          b.wobble += 0.02;
          b.x += b.vx + Math.sin(tick * 0.02 + b.wobble) * 0.08;
          b.y += b.vy + Math.cos(tick * 0.018 + b.wobble) * 0.08;

          if (b.x < 0 || b.x > GRID_W) b.vx *= -1;
          if (b.y < 0 || b.y > GRID_H) b.vy *= -1;

          b.x = clamp(b.x, 1, GRID_W - 1);
          b.y = clamp(b.y, 1, GRID_H - 1);
        }
      }

      function computeField() {
        const px = image.data;

        for (let y = 0; y < GRID_H; y += 1) {
          for (let x = 0; x < GRID_W; x += 1) {
            let sum = 0;

            for (const b of blobs) {
              const dx = x - b.x;
              const dy = y - b.y;
              sum += (b.r * b.r) / (dx * dx + dy * dy + 10);
            }

            if (pointer.active) {
              const dx = x - pointer.x;
              const dy = y - pointer.y;
              sum += 900 / (dx * dx + dy * dy + 35);
            }

            const i = idx(x, y);
            field[i] = sum;

            const v = clamp((sum - 0.2) * 145, 0, 255);
            const p = i * 4;
            px[p] = 6 + v * 0.22;
            px[p + 1] = 20 + v * 0.62;
            px[p + 2] = 38 + v * 0.98;
            px[p + 3] = 255;
          }
        }

        lowCtx.putImageData(image, 0, 0);
      }

      function interp(v1, v2, threshold) {
        return (threshold - v1) / (v2 - v1 + 1e-6);
      }

      function edgePoint(edge, x, y, a, b, c, d, threshold) {
        if (edge === 0) {
          const t = interp(a, b, threshold);
          return [x + t, y];
        }
        if (edge === 1) {
          const t = interp(b, c, threshold);
          return [x + 1, y + t];
        }
        if (edge === 2) {
          const t = interp(d, c, threshold);
          return [x + t, y + 1];
        }
        const t = interp(a, d, threshold);
        return [x, y + t];
      }

      function drawContours() {
        const levels = [0.95, 1.15, 1.35];

        lowCtx.lineWidth = 1;
        lowCtx.shadowBlur = 8;
        lowCtx.shadowColor = "rgba(117, 236, 255, 0.8)";

        for (let l = 0; l < levels.length; l += 1) {
          const threshold = levels[l] + Math.sin(tick * 0.013 + l * 0.8) * 0.035;
          lowCtx.strokeStyle = l === 0 ? "rgba(118, 236, 255, 0.82)" : l === 1 ? "rgba(84, 201, 255, 0.72)" : "rgba(190, 248, 255, 0.5)";
          lowCtx.beginPath();

          for (let y = 0; y < GRID_H - 1; y += 1) {
            for (let x = 0; x < GRID_W - 1; x += 1) {
              const a = field[idx(x, y)];
              const b = field[idx(x + 1, y)];
              const c = field[idx(x + 1, y + 1)];
              const d = field[idx(x, y + 1)];

              const mask =
                (a > threshold ? 8 : 0) |
                (b > threshold ? 4 : 0) |
                (c > threshold ? 2 : 0) |
                (d > threshold ? 1 : 0);

              if (mask === 0 || mask === 15) continue;

              const segments = segmentTable[mask];
              for (const [e1, e2] of segments) {
                const p1 = edgePoint(e1, x, y, a, b, c, d, threshold);
                const p2 = edgePoint(e2, x, y, a, b, c, d, threshold);
                lowCtx.moveTo(p1[0], p1[1]);
                lowCtx.lineTo(p2[0], p2[1]);
              }
            }
          }

          lowCtx.stroke();
        }

        lowCtx.shadowBlur = 0;
      }

      function drawFrame() {
        ctx.fillStyle = "#040812";
        ctx.fillRect(0, 0, width, height);

        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(low, 0, 0, width, height);
      }

      function frame() {
        tick += 1;
        updateBlobs();
        computeField();
        drawContours();
        drawFrame();
        requestAnimationFrame(frame);
      }

      function updatePointer(clientX, clientY) {
        pointer.active = true;
        pointer.x = clamp((clientX / width) * GRID_W, 0, GRID_W - 1);
        pointer.y = clamp((clientY / height) * GRID_H, 0, GRID_H - 1);
      }

      window.addEventListener("mousemove", (event) => {
        updatePointer(event.clientX, event.clientY);
      });

      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          updatePointer(t.clientX, t.clientY);
        },
        { passive: true }
      );

      window.addEventListener("click", (event) => {
        const x = (event.clientX / width) * GRID_W;
        const y = (event.clientY / height) * GRID_H;
        if (blobs.length < 15) {
          spawnBlob(x, y);
        }
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "r") {
          reseed();
        }
        if (key === "c") {
          blobs = blobs.slice(0, 7);
        }
      });

      window.addEventListener("resize", resize);

      resize();
      reseed();
      frame();
    </script>
  </body>
</html>
