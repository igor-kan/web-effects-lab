<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal Growth DLA</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #040a14;
        color: #e9f7ff;
        font-family: "Segoe UI", sans-serif;
      }

      canvas { width: 100vw; height: 100vh; display: block; image-rendering: pixelated; }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 8;
        max-width: 500px;
        background: rgba(8, 17, 31, 0.62);
        border: 1px solid rgba(150, 216, 255, 0.33);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.36; }
      .home { color: #a4dbff; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Crystal Growth DLA</h1>
      <p>Diffusion-limited aggregation crystal simulation. Click to seed additional growth centers.</p>
      <p>Press <strong>R</strong> to reset and <strong>F</strong> to toggle fast growth mode.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d", { alpha: false });

      const W = 260;
      const H = 170;
      const SIZE = W * H;

      const lowCanvas = document.createElement("canvas");
      lowCanvas.width = W;
      lowCanvas.height = H;
      const lowCtx = lowCanvas.getContext("2d", { alpha: false });
      const image = lowCtx.createImageData(W, H);

      const grid = new Uint8Array(SIZE);
      const walkers = [];

      let width = window.innerWidth;
      let height = window.innerHeight;
      let fast = false;
      let ticks = 0;

      function idx(x, y) {
        return x + y * W;
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function seed(x, y) {
        const gx = clamp(x | 0, 1, W - 2);
        const gy = clamp(y | 0, 1, H - 2);
        grid[idx(gx, gy)] = 1;
      }

      function reset() {
        grid.fill(0);
        walkers.length = 0;
        ticks = 0;

        seed(W * 0.5, H * 0.5);
        for (let i = 0; i < 4200; i += 1) {
          walkers.push({
            x: Math.random() * W,
            y: Math.random() * H,
          });
        }
      }

      function hasNeighbor(x, y) {
        for (let oy = -1; oy <= 1; oy += 1) {
          for (let ox = -1; ox <= 1; ox += 1) {
            if (ox === 0 && oy === 0) continue;
            if (grid[idx(x + ox, y + oy)] === 1) return true;
          }
        }
        return false;
      }

      function stepWalkers() {
        ticks += 1;
        const repeats = fast ? 3 : 1;

        for (let r = 0; r < repeats; r += 1) {
          for (const w of walkers) {
            w.x += (Math.random() * 3 - 1.5);
            w.y += (Math.random() * 3 - 1.5);

            w.x = clamp(w.x, 1, W - 2);
            w.y = clamp(w.y, 1, H - 2);

            const x = w.x | 0;
            const y = w.y | 0;

            if (grid[idx(x, y)] === 1) {
              w.x = Math.random() * W;
              w.y = Math.random() * H;
              continue;
            }

            if (hasNeighbor(x, y)) {
              grid[idx(x, y)] = 1;
              w.x = Math.random() * W;
              w.y = Math.random() * H;
            }
          }
        }
      }

      function draw() {
        const px = image.data;

        for (let y = 0; y < H; y += 1) {
          for (let x = 0; x < W; x += 1) {
            const p = idx(x, y) * 4;

            if (grid[idx(x, y)] === 1) {
              const d = Math.hypot(x - W * 0.5, y - H * 0.5);
              const hue = (190 + d * 0.9 + ticks * 0.02) % 360;
              const s = 90;
              const l = 62;

              // quick HSL->RGB
              const c = (1 - Math.abs(2 * l / 100 - 1)) * (s / 100);
              const hh = hue / 60;
              const x2 = c * (1 - Math.abs((hh % 2) - 1));
              let r = 0,
                g = 0,
                b = 0;
              if (hh < 1) [r, g, b] = [c, x2, 0];
              else if (hh < 2) [r, g, b] = [x2, c, 0];
              else if (hh < 3) [r, g, b] = [0, c, x2];
              else if (hh < 4) [r, g, b] = [0, x2, c];
              else if (hh < 5) [r, g, b] = [x2, 0, c];
              else [r, g, b] = [c, 0, x2];
              const m = l / 100 - c / 2;

              px[p] = (r + m) * 255;
              px[p + 1] = (g + m) * 255;
              px[p + 2] = (b + m) * 255;
              px[p + 3] = 255;
            } else {
              const bg = 8 + (Math.sin(x * 0.11 + y * 0.09 + ticks * 0.008) * 0.5 + 0.5) * 8;
              px[p] = bg;
              px[p + 1] = bg + 8;
              px[p + 2] = bg + 18;
              px[p + 3] = 255;
            }
          }
        }

        lowCtx.putImageData(image, 0, 0);
        ctx.imageSmoothingEnabled = false;
        ctx.clearRect(0, 0, width, height);
        ctx.drawImage(lowCanvas, 0, 0, width, height);
      }

      function frame() {
        stepWalkers();
        draw();
        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("click", (event) => {
        const x = (event.clientX / width) * W;
        const y = (event.clientY / height) * H;
        seed(x, y);
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "r") reset();
        if (key === "f") fast = !fast;
      });

      resize();
      reset();
      frame();
    </script>
  </body>
</html>
