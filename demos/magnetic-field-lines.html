<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magnetic Field Lines</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #050b15;
        color: #e8f7ff;
        font-family: "Segoe UI", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 7;
        max-width: 500px;
        background: rgba(8, 18, 34, 0.62);
        border: 1px solid rgba(152, 210, 255, 0.3);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
      }

      .home {
        color: #9fd7ff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Magnetic Field Lines</h1>
      <p>Tracer particles follow a dynamic dipole-like vector field. Drag to move the interactive pole.</p>
      <p>Press <strong>F</strong> to flip pole polarity and <strong>R</strong> to reseed tracers.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d", { alpha: false });

      let width = window.innerWidth;
      let height = window.innerHeight;

      const poles = [
        { x: 0.32, y: 0.52, q: 1.2 },
        { x: 0.68, y: 0.48, q: -1.1 },
        { x: 0.5, y: 0.3, q: 0.8 },
      ];

      const dragPole = { x: 0.5, y: 0.65, q: 1.0 };

      const tracerCount = 7600;
      const tracers = Array.from({ length: tracerCount }, () => ({
        x: Math.random(),
        y: Math.random(),
        age: Math.random() * 180,
      }));

      const pointer = { x: 0.5, y: 0.5, down: false };

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function setPointer(clientX, clientY) {
        pointer.x = clientX / width;
        pointer.y = clientY / height;
      }

      function fieldAt(x, y) {
        let fx = 0;
        let fy = 0;

        const allPoles = [...poles, dragPole];

        for (const p of allPoles) {
          const dx = x - p.x;
          const dy = y - p.y;
          const d2 = dx * dx + dy * dy + 0.00008;
          const inv = p.q / d2;

          fx += dx * inv;
          fy += dy * inv;
        }

        const curlishX = Math.sin((x + y) * 8.0) * 0.08;
        const curlishY = Math.cos((x - y) * 8.3) * 0.08;

        return { fx: fx + curlishX, fy: fy + curlishY };
      }

      function reseed() {
        for (const t of tracers) {
          t.x = Math.random();
          t.y = Math.random();
          t.age = Math.random() * 140;
        }
      }

      function drawPoles(time) {
        const pulse = 1 + Math.sin(time * 0.003) * 0.12;

        for (const p of [...poles, dragPole]) {
          const sx = p.x * width;
          const sy = p.y * height;
          const pos = p.q > 0;

          ctx.beginPath();
          ctx.fillStyle = pos ? "rgba(255, 102, 128, 0.86)" : "rgba(95, 196, 255, 0.86)";
          ctx.arc(sx, sy, 7 * pulse, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "rgba(255,255,255,0.9)";
          ctx.font = "11px Segoe UI, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(pos ? "+" : "-", sx, sy - 0.5);
        }
      }

      function frame(now) {
        if (pointer.down) {
          dragPole.x += (pointer.x - dragPole.x) * 0.16;
          dragPole.y += (pointer.y - dragPole.y) * 0.16;
        }

        ctx.fillStyle = "rgba(5, 12, 22, 0.08)";
        ctx.fillRect(0, 0, width, height);

        ctx.globalCompositeOperation = "lighter";

        for (const t of tracers) {
          t.age += 1;

          const { fx, fy } = fieldAt(t.x, t.y);
          const speed = 0.0016;

          const ox = t.x;
          const oy = t.y;

          t.x += fx * speed;
          t.y += fy * speed;

          if (t.age > 220 || t.x < 0 || t.x > 1 || t.y < 0 || t.y > 1) {
            t.x = Math.random();
            t.y = Math.random();
            t.age = 0;
            continue;
          }

          const sx0 = ox * width;
          const sy0 = oy * height;
          const sx1 = t.x * width;
          const sy1 = t.y * height;

          const hue = fx * 180 + fy * 90 > 0 ? 204 : 350;
          const alpha = 0.07;

          ctx.strokeStyle = `hsla(${hue}, 100%, 72%, ${alpha})`;
          ctx.lineWidth = 1.05;
          ctx.beginPath();
          ctx.moveTo(sx0, sy0);
          ctx.lineTo(sx1, sy1);
          ctx.stroke();
        }

        ctx.globalCompositeOperation = "source-over";
        drawPoles(now);

        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize);

      window.addEventListener("mousedown", (event) => {
        pointer.down = true;
        setPointer(event.clientX, event.clientY);
      });
      window.addEventListener("mousemove", (event) => {
        setPointer(event.clientX, event.clientY);
      });
      window.addEventListener("mouseup", () => {
        pointer.down = false;
      });

      window.addEventListener(
        "touchstart",
        (event) => {
          pointer.down = true;
          const t = event.touches[0];
          setPointer(t.clientX, t.clientY);
        },
        { passive: true }
      );
      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          setPointer(t.clientX, t.clientY);
        },
        { passive: true }
      );
      window.addEventListener("touchend", () => {
        pointer.down = false;
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "f") dragPole.q *= -1;
        if (key === "r") reseed();
      });

      resize();
      ctx.fillStyle = "#050b15";
      ctx.fillRect(0, 0, width, height);
      frame(0);
    </script>
  </body>
</html>
