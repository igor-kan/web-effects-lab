<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realistic Smoke Plume</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #070a11;
        color: #edf7ff;
        font-family: "Segoe UI", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        image-rendering: pixelated;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 9;
        max-width: 560px;
        background: rgba(8, 16, 30, 0.62);
        border: 1px solid rgba(146, 212, 255, 0.34);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
      }

      .home {
        color: #9fd8ff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Realistic Smoke Plume</h1>
      <p>
        Grid-advection smoke simulation with buoyancy, cooling, turbulent drift, and denser soot layering.
      </p>
      <p>Drag to inject smoke. <strong>W</strong> wind toggle, <strong>D</strong> dense mode, <strong>R</strong> reset.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d", { alpha: false });

      const W = 260;
      const H = 160;
      const SIZE = W * H;

      const low = document.createElement("canvas");
      low.width = W;
      low.height = H;
      const lowCtx = low.getContext("2d", { alpha: false });
      const image = lowCtx.createImageData(W, H);

      let width = window.innerWidth;
      let height = window.innerHeight;

      let density = new Float32Array(SIZE);
      let temperature = new Float32Array(SIZE);
      let vx = new Float32Array(SIZE);
      let vy = new Float32Array(SIZE);

      let nextDensity = new Float32Array(SIZE);
      let nextTemp = new Float32Array(SIZE);

      let denseMode = false;
      let windMode = 0;
      let tick = 0;

      const pointer = {
        x: W * 0.5,
        y: H * 0.8,
        down: false,
      };

      function idx(x, y) {
        return x + y * W;
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function toGrid(clientX, clientY) {
        pointer.x = clamp((clientX / width) * W, 2, W - 3);
        pointer.y = clamp((clientY / height) * H, 2, H - 3);
      }

      function sample(field, x, y) {
        const x0 = clamp(Math.floor(x), 0, W - 1);
        const y0 = clamp(Math.floor(y), 0, H - 1);
        const x1 = clamp(x0 + 1, 0, W - 1);
        const y1 = clamp(y0 + 1, 0, H - 1);

        const tx = x - x0;
        const ty = y - y0;

        const a = field[idx(x0, y0)];
        const b = field[idx(x1, y0)];
        const c = field[idx(x0, y1)];
        const d = field[idx(x1, y1)];

        return (a * (1 - tx) + b * tx) * (1 - ty) + (c * (1 - tx) + d * tx) * ty;
      }

      function injectSource(cx, cy, radius, densityAmt, tempAmt) {
        for (let oy = -radius; oy <= radius; oy += 1) {
          for (let ox = -radius; ox <= radius; ox += 1) {
            const d2 = ox * ox + oy * oy;
            if (d2 > radius * radius) continue;

            const x = clamp((cx + ox) | 0, 1, W - 2);
            const y = clamp((cy + oy) | 0, 1, H - 2);
            const i = idx(x, y);

            const falloff = 1 - d2 / (radius * radius + 0.001);
            density[i] += densityAmt * falloff;
            temperature[i] += tempAmt * falloff;

            vx[i] += (Math.random() * 2 - 1) * 0.24;
            vy[i] -= 0.5 + Math.random() * 0.7;
          }
        }
      }

      function reset() {
        density.fill(0);
        temperature.fill(0);
        vx.fill(0);
        vy.fill(0);
      }

      function step() {
        tick += 1;
        const t = tick * 0.02;

        const baseX = W * 0.5 + Math.sin(t * 0.9) * 4;
        const baseY = H - 11;
        injectSource(baseX, baseY, 8, denseMode ? 1.65 : 1.2, 1.15);

        if (pointer.down) {
          injectSource(pointer.x, pointer.y, 7, 0.9, 0.75);
        }

        const wind = windMode === 0 ? 0 : windMode === 1 ? 0.06 : -0.06;

        for (let y = 1; y < H - 1; y += 1) {
          for (let x = 1; x < W - 1; x += 1) {
            const i = idx(x, y);

            const d = density[i];
            const temp = temperature[i];

            const buoyancy = temp * 0.028 + d * 0.008;
            vy[i] -= buoyancy;

            const swirl = Math.sin(x * 0.09 + t * 1.4) + Math.cos(y * 0.08 - t * 1.1);
            vx[i] += Math.cos(swirl) * 0.014 + wind;
            vy[i] += Math.sin(swirl * 1.2) * 0.011;

            vx[i] *= 0.992;
            vy[i] *= 0.992;
          }
        }

        for (let y = 1; y < H - 1; y += 1) {
          for (let x = 1; x < W - 1; x += 1) {
            const i = idx(x, y);
            const bx = x - vx[i] * 1.9;
            const by = y - vy[i] * 1.9;

            nextDensity[i] = sample(density, bx, by) * 0.993;
            nextTemp[i] = sample(temperature, bx, by) * 0.988;
          }
        }

        [density, nextDensity] = [nextDensity, density];
        [temperature, nextTemp] = [nextTemp, temperature];

        for (let x = 0; x < W; x += 1) {
          density[idx(x, 0)] = density[idx(x, 1)] * 0.98;
          temperature[idx(x, 0)] = temperature[idx(x, 1)] * 0.98;
        }
      }

      function render() {
        const px = image.data;

        for (let i = 0; i < SIZE; i += 1) {
          const d = clamp(density[i] * 1.35, 0, 1);
          const h = clamp(temperature[i] * 1.25, 0, 1);

          const soot = Math.pow(d, 0.9);
          const ember = Math.pow(h, 1.8);

          const r = 10 + soot * 90 + ember * 210;
          const g = 14 + soot * 118 + ember * 120;
          const b = 20 + soot * 165 + ember * 42;

          const p = i * 4;
          px[p] = clamp(r, 0, 255);
          px[p + 1] = clamp(g, 0, 255);
          px[p + 2] = clamp(b, 0, 255);
          px[p + 3] = 255;
        }

        lowCtx.putImageData(image, 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(low, 0, 0, width, height);
      }

      function frame() {
        for (let i = 0; i < 2; i += 1) {
          step();
        }
        render();
        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize);

      window.addEventListener("mousemove", (event) => {
        toGrid(event.clientX, event.clientY);
      });

      window.addEventListener("mousedown", (event) => {
        pointer.down = true;
        toGrid(event.clientX, event.clientY);
      });

      window.addEventListener("mouseup", () => {
        pointer.down = false;
      });

      window.addEventListener(
        "touchstart",
        (event) => {
          pointer.down = true;
          const t = event.touches[0];
          toGrid(t.clientX, t.clientY);
        },
        { passive: true }
      );

      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          toGrid(t.clientX, t.clientY);
        },
        { passive: true }
      );

      window.addEventListener("touchend", () => {
        pointer.down = false;
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "r") {
          reset();
        }
        if (key === "d") {
          denseMode = !denseMode;
        }
        if (key === "w") {
          windMode = (windMode + 1) % 3;
        }
      });

      resize();
      reset();
      frame();
    </script>
  </body>
</html>
