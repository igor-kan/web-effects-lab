<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystalline Orbit Assembly 3D</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #070b13;
        color: #eef6ff;
        font-family: "Segoe UI", sans-serif;
      }
      #stage {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: 560px;
        background: rgba(10, 16, 28, 0.62);
        border: 1px solid rgba(163, 213, 255, 0.3);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }
      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.35; }
      .home { color: #95d5ff; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Crystalline Orbit Assembly 3D</h1>
      <p>Procedural crystal ring machine with orbiting shards, emissive rails, and dynamic lighting.</p>
      <p>Drag to orbit, wheel to zoom, click pulse, <strong>A</strong> auto-spin, <strong>C</strong> color mode, <strong>R</strong> reseed.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";

      const canvas = document.getElementById('stage');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.18;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x070d16);
      scene.fog = new THREE.Fog(0x070d16, 8, 30);

      const camera = new THREE.PerspectiveCamera(54, window.innerWidth / window.innerHeight, 0.1, 120);

      const orbit = {
        target: new THREE.Vector3(0, 0.8, 0),
        theta: 0.9,
        phi: 1.05,
        radius: 9.8,
        dragging: false,
        px: 0,
        py: 0,
      };

      function updateCamera() {
        orbit.phi = Math.max(0.25, Math.min(Math.PI - 0.2, orbit.phi));
        orbit.radius = Math.max(4.2, Math.min(18, orbit.radius));

        const sinPhi = Math.sin(orbit.phi);
        camera.position.set(
          orbit.target.x + orbit.radius * sinPhi * Math.sin(orbit.theta),
          orbit.target.y + orbit.radius * Math.cos(orbit.phi),
          orbit.target.z + orbit.radius * sinPhi * Math.cos(orbit.theta)
        );
        camera.lookAt(orbit.target);
      }

      const hemi = new THREE.HemisphereLight(0x8ed0ff, 0x0b1320, 0.75);
      scene.add(hemi);

      const key = new THREE.PointLight(0x74d0ff, 12, 38, 2);
      key.position.set(4.2, 3.2, 2.8);
      scene.add(key);

      const rim = new THREE.PointLight(0x89ffde, 6, 36, 2);
      rim.position.set(-4.5, 1.5, -3.5);
      scene.add(rim);

      const floor = new THREE.Mesh(
        new THREE.CircleGeometry(9.5, 70),
        new THREE.MeshStandardMaterial({ color: 0x132034, roughness: 0.88, metalness: 0.08 })
      );
      floor.rotation.x = -Math.PI * 0.5;
      floor.position.y = -1.12;
      scene.add(floor);

      const assembly = new THREE.Group();
      scene.add(assembly);

      const core = new THREE.Mesh(
        new THREE.IcosahedronGeometry(1.25, 2),
        new THREE.MeshStandardMaterial({
          color: 0x1f4f80,
          roughness: 0.2,
          metalness: 0.72,
          emissive: 0x1a6cb8,
          emissiveIntensity: 0.8,
        })
      );
      core.position.y = 0.8;
      assembly.add(core);

      const ringMaterial = new THREE.MeshStandardMaterial({
        color: 0x7dd4ff,
        emissive: 0x39a8ff,
        emissiveIntensity: 1,
        roughness: 0.26,
        metalness: 0.82,
      });

      const rings = [];
      for (let i = 0; i < 3; i += 1) {
        const ring = new THREE.Mesh(new THREE.TorusGeometry(2.35 + i * 0.42, 0.06, 20, 180), ringMaterial.clone());
        ring.position.y = 0.8;
        ring.rotation.set(Math.PI * (0.2 + i * 0.3), Math.PI * (0.08 + i * 0.2), Math.PI * i * 0.16);
        assembly.add(ring);
        rings.push(ring);
      }

      const shards = [];
      const shardGroup = new THREE.Group();
      scene.add(shardGroup);

      function reseedShards() {
        for (const s of shards) shardGroup.remove(s.mesh);
        shards.length = 0;

        const count = 48;
        for (let i = 0; i < count; i += 1) {
          const geom = new THREE.ConeGeometry(0.06 + Math.random() * 0.11, 0.35 + Math.random() * 0.65, 5);
          const mat = new THREE.MeshStandardMaterial({
            color: new THREE.Color().setHSL(0.56 + Math.random() * 0.08, 0.72, 0.6),
            roughness: 0.18,
            metalness: 0.63,
            emissive: 0x133b5f,
            emissiveIntensity: 0.45,
          });
          const mesh = new THREE.Mesh(geom, mat);
          shardGroup.add(mesh);

          shards.push({
            mesh,
            radius: 2.8 + Math.random() * 2.1,
            height: -0.8 + Math.random() * 3.0,
            angle: Math.random() * Math.PI * 2,
            speed: 0.35 + Math.random() * 0.95,
            tilt: (Math.random() - 0.5) * 1.6,
          });
        }
      }

      reseedShards();

      const sparks = [];
      const sparkGeo = new THREE.SphereGeometry(0.03, 8, 8);
      for (let i = 0; i < 120; i += 1) {
        const spark = new THREE.Mesh(
          sparkGeo,
          new THREE.MeshBasicMaterial({ color: 0xb9ebff, transparent: true, opacity: 0.6 })
        );
        spark.position.set((Math.random() - 0.5) * 7, Math.random() * 4 - 1, (Math.random() - 0.5) * 7);
        spark.userData = { phase: Math.random() * Math.PI * 2, speed: 0.3 + Math.random() * 0.8 };
        scene.add(spark);
        sparks.push(spark);
      }

      let autoSpin = true;
      let colorMode = 0;
      let pulse = 0;

      function applyPalette(mode) {
        if (mode === 0) {
          core.material.color.set(0x1f4f80);
          core.material.emissive.set(0x1a6cb8);
          for (const ring of rings) {
            ring.material.color.set(0x7dd4ff);
            ring.material.emissive.set(0x39a8ff);
          }
        } else if (mode === 1) {
          core.material.color.set(0x5d3f86);
          core.material.emissive.set(0x8d5aff);
          for (const ring of rings) {
            ring.material.color.set(0xc29dff);
            ring.material.emissive.set(0x8b68ff);
          }
        } else {
          core.material.color.set(0x73502f);
          core.material.emissive.set(0xef9b43);
          for (const ring of rings) {
            ring.material.color.set(0xffcf85);
            ring.material.emissive.set(0xff9f3f);
          }
        }
      }

      function onPointerDown(x, y) {
        orbit.dragging = true;
        orbit.px = x;
        orbit.py = y;
      }

      function onPointerMove(x, y) {
        if (!orbit.dragging) return;
        const dx = x - orbit.px;
        const dy = y - orbit.py;
        orbit.px = x;
        orbit.py = y;
        orbit.theta -= dx * 0.005;
        orbit.phi += dy * 0.0044;
      }

      window.addEventListener('mousedown', (event) => onPointerDown(event.clientX, event.clientY));
      window.addEventListener('mousemove', (event) => onPointerMove(event.clientX, event.clientY));
      window.addEventListener('mouseup', () => {
        orbit.dragging = false;
      });
      window.addEventListener('touchstart', (event) => {
        const t = event.touches[0];
        onPointerDown(t.clientX, t.clientY);
      }, { passive: true });
      window.addEventListener('touchmove', (event) => {
        const t = event.touches[0];
        onPointerMove(t.clientX, t.clientY);
      }, { passive: true });
      window.addEventListener('touchend', () => {
        orbit.dragging = false;
      });

      window.addEventListener('wheel', (event) => {
        orbit.radius += event.deltaY * 0.01;
      });

      window.addEventListener('click', () => {
        pulse = Math.min(1.7, pulse + 0.85);
      });

      window.addEventListener('keydown', (event) => {
        const k = event.key.toLowerCase();
        if (k === 'a') autoSpin = !autoSpin;
        if (k === 'c') {
          colorMode = (colorMode + 1) % 3;
          applyPalette(colorMode);
        }
        if (k === 'r') reseedShards();
      });

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const clock = new THREE.Clock();
      applyPalette(0);

      function render() {
        const t = clock.getElapsedTime();

        if (autoSpin && !orbit.dragging) {
          orbit.theta += 0.0015;
        }

        pulse = Math.max(0, pulse - 0.018);
        updateCamera();

        core.rotation.y += 0.005;
        core.rotation.x = Math.sin(t * 0.55) * 0.18;
        core.material.emissiveIntensity = 0.8 + pulse * 1.8;

        for (let i = 0; i < rings.length; i += 1) {
          const ring = rings[i];
          ring.rotation.x += 0.003 + i * 0.0012;
          ring.rotation.y += 0.0025 + i * 0.0014;
          ring.material.emissiveIntensity = 0.8 + pulse * 1.4 + Math.sin(t * 2 + i) * 0.14;
        }

        for (const s of shards) {
          s.angle += 0.003 * s.speed;
          const wobble = Math.sin(t * s.speed + s.tilt) * 0.28;
          s.mesh.position.set(
            Math.cos(s.angle) * (s.radius + wobble),
            s.height + Math.sin(t * 1.8 + s.angle * 2.4) * 0.2,
            Math.sin(s.angle) * (s.radius + wobble)
          );
          s.mesh.rotation.set(t * 0.7 + s.tilt, t * 1.2 + s.angle, t * 0.5 + s.tilt * 0.4);
          s.mesh.material.emissiveIntensity = 0.3 + pulse * 0.7;
        }

        key.position.set(Math.cos(t * 0.7) * 4.6, 2.7 + Math.sin(t * 0.9), Math.sin(t * 0.7) * 4.6);
        rim.position.set(Math.cos(-t * 0.5) * 4.4, 1.2 + Math.cos(t * 1.1), Math.sin(-t * 0.5) * 4.4);

        for (const spark of sparks) {
          const p = spark.userData;
          const phase = p.phase + t * p.speed;
          spark.position.y += Math.sin(phase * 2.3) * 0.004;
          spark.position.x += Math.cos(phase * 1.7) * 0.003;
          spark.position.z += Math.sin(phase * 1.9) * 0.003;
          spark.material.opacity = 0.35 + Math.sin(phase * 4) * 0.25 + pulse * 0.2;
        }

        renderer.render(scene, camera);
        requestAnimationFrame(render);
      }

      render();
    </script>
  </body>
</html>
