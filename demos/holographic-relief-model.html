<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holographic Relief Model</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #f3f8ff;
        font-family: "Trebuchet MS", sans-serif;
      }

      #stage {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: 420px;
        background: rgba(249, 253, 255, 0.86);
        border: 1px solid rgba(58, 94, 128, 0.2);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
        color: #17384c;
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
      }

      .home {
        color: #0d6f90;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Holographic Relief Model</h1>
      <p>Shader-deformed 3D surface with animated scanlines. Drag to orbit and inspect.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script type="module">
      import * as THREE from "https://esm.sh/three@0.164.1";
      import { OrbitControls } from "https://esm.sh/three@0.164.1/examples/jsm/controls/OrbitControls.js";

      const canvas = document.getElementById("stage");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.18;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xedf7ff);

      const camera = new THREE.PerspectiveCamera(56, window.innerWidth / window.innerHeight, 0.1, 120);
      camera.position.set(0, 1.9, 5.8);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.enablePan = false;
      controls.minDistance = 2.8;
      controls.maxDistance = 12;
      controls.minPolarAngle = Math.PI * 0.12;
      controls.maxPolarAngle = Math.PI * 0.9;

      scene.add(new THREE.HemisphereLight(0xffffff, 0xc2d6e6, 0.7));

      const pointA = new THREE.PointLight(0x4ad6ff, 2.8, 25, 2);
      pointA.position.set(4, 4, 3);
      scene.add(pointA);

      const pointB = new THREE.PointLight(0xff8c4f, 2.2, 25, 2);
      pointB.position.set(-3, 3, -4);
      scene.add(pointB);

      const keyLight = new THREE.DirectionalLight(0xffffff, 0.55);
      keyLight.position.set(5, 6, 5);
      scene.add(keyLight);

      const floor = new THREE.Mesh(
        new THREE.CircleGeometry(8, 64),
        new THREE.MeshStandardMaterial({ color: 0xd8ebf9, roughness: 0.92, metalness: 0.04 })
      );
      floor.rotation.x = -Math.PI * 0.5;
      floor.position.y = -1.35;
      scene.add(floor);

      const uniforms = {
        uTime: { value: 0 },
      };

      const material = new THREE.ShaderMaterial({
        uniforms,
        vertexShader: `
          uniform float uTime;
          varying vec3 vPos;
          varying vec3 vWorldPos;
          varying vec3 vWorldNormal;

          void main() {
            vec3 p = position;

            float ripple = sin((p.x * 3.5 + uTime * 1.7)) * 0.07;
            ripple += cos((p.z * 3.0 - uTime * 1.2)) * 0.05;
            ripple += sin((p.y * 4.6 + p.x * 2.0 + uTime * 2.2)) * 0.04;

            p += normal * ripple;

            vPos = p;
            vec4 worldPos = modelMatrix * vec4(p, 1.0);
            vWorldPos = worldPos.xyz;
            vWorldNormal = normalize(mat3(modelMatrix) * normal);
            gl_Position = projectionMatrix * viewMatrix * worldPos;
          }
        `,
        fragmentShader: `
          uniform float uTime;
          varying vec3 vPos;
          varying vec3 vWorldPos;
          varying vec3 vWorldNormal;

          void main() {
            vec3 n = normalize(vWorldNormal);
            vec3 viewDir = normalize(cameraPosition - vWorldPos);

            vec3 baseA = vec3(0.06, 0.40, 0.92);
            vec3 baseB = vec3(0.06, 0.92, 0.80);
            vec3 baseC = vec3(0.93, 0.58, 0.21);

            float band = sin(vPos.y * 18.0 + uTime * 7.0) * 0.5 + 0.5;
            float stripes = smoothstep(0.46, 0.54, fract(vPos.y * 8.0 - uTime * 0.8));

            vec3 col = mix(baseA, baseB, band);
            col = mix(col, baseC, stripes * 0.28);

            vec3 lightDir = normalize(vec3(0.5, 0.8, 0.7));
            float diff = max(dot(n, lightDir), 0.0);
            float fres = pow(1.0 - max(dot(n, viewDir), 0.0), 2.2);

            col *= 0.4 + diff * 0.9;
            col += fres * vec3(0.5, 0.9, 1.2);

            gl_FragColor = vec4(col, 0.95);
          }
        `,
        transparent: true,
        side: THREE.DoubleSide,
      });

      const mesh = new THREE.Mesh(new THREE.TorusKnotGeometry(1.3, 0.45, 340, 48), material);
      scene.add(mesh);

      const wire = new THREE.LineSegments(
        new THREE.WireframeGeometry(new THREE.TorusKnotGeometry(1.33, 0.45, 200, 18)),
        new THREE.LineBasicMaterial({ color: 0x68d8ff, transparent: true, opacity: 0.4 })
      );
      scene.add(wire);

      const rings = new THREE.Group();
      scene.add(rings);
      for (let i = 0; i < 3; i += 1) {
        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(2.2 + i * 0.28, 0.02, 12, 160),
          new THREE.MeshBasicMaterial({ color: i === 2 ? 0xff8b51 : 0x4ed7ff, transparent: true, opacity: 0.55 })
        );
        ring.rotation.x = Math.PI * (0.22 + i * 0.18);
        rings.add(ring);
      }

      function animate(time) {
        const t = time * 0.001;
        uniforms.uTime.value = t;

        mesh.rotation.x = t * 0.32;
        mesh.rotation.y = t * 0.47;
        wire.rotation.copy(mesh.rotation);

        rings.rotation.y = t * 0.4;
        rings.rotation.z = Math.sin(t * 0.8) * 0.2;

        pointA.position.x = Math.cos(t * 1.2) * 4;
        pointA.position.z = Math.sin(t * 1.2) * 4;
        keyLight.position.set(Math.cos(t * 0.4) * 5, 5.6 + Math.sin(t * 1.1), Math.sin(t * 0.4) * 5);

        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      requestAnimationFrame(animate);
    </script>
  </body>
</html>
