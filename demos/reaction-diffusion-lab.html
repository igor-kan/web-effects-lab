<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reaction Diffusion Lab</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0d14;
        color: #ecf6ff;
        font-family: "Segoe UI", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        image-rendering: pixelated;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 5;
        max-width: 470px;
        background: rgba(9, 15, 28, 0.58);
        border: 1px solid rgba(152, 218, 255, 0.3);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
        opacity: 0.92;
      }

      .home {
        color: #93d9ff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Reaction Diffusion Lab</h1>
      <p>
        Drag to inject reagent B. Press <strong>R</strong> reset, <strong>T</strong> palette,
        <strong>P</strong> pause.
      </p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d", { alpha: false });

      let width = window.innerWidth;
      let height = window.innerHeight;

      const GRID_W = 260;
      const GRID_H = 170;
      const SIZE = GRID_W * GRID_H;
      const DT = 1.0;

      let A = new Float32Array(SIZE);
      let B = new Float32Array(SIZE);
      let nextA = new Float32Array(SIZE);
      let nextB = new Float32Array(SIZE);

      const lowResCanvas = document.createElement("canvas");
      lowResCanvas.width = GRID_W;
      lowResCanvas.height = GRID_H;
      const lowCtx = lowResCanvas.getContext("2d", { alpha: false });
      const image = lowCtx.createImageData(GRID_W, GRID_H);

      let palette = 0;
      let paused = false;
      let tick = 0;
      const pointer = { x: GRID_W * 0.5, y: GRID_H * 0.5, down: false };

      const DA = 1.0;
      const DB = 0.5;
      const FEED_BASE = 0.0545;
      const KILL_BASE = 0.0618;
      const STEPS_PER_FRAME = 7;

      function idx(x, y) {
        return x + y * GRID_W;
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function reset() {
        A.fill(1);
        B.fill(0);

        for (let y = 0; y < GRID_H; y += 1) {
          for (let x = 0; x < GRID_W; x += 1) {
            if (Math.random() < 0.0025) {
              B[idx(x, y)] = 1;
            }
          }
        }

        const cx = (GRID_W * 0.5) | 0;
        const cy = (GRID_H * 0.5) | 0;

        for (let oy = -11; oy <= 11; oy += 1) {
          for (let ox = -11; ox <= 11; ox += 1) {
            if (ox * ox + oy * oy < 110) {
              B[idx(clamp(cx + ox, 1, GRID_W - 2), clamp(cy + oy, 1, GRID_H - 2))] = 1;
            }
          }
        }
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function toGrid(clientX, clientY) {
        pointer.x = clamp(Math.floor((clientX / width) * GRID_W), 1, GRID_W - 2);
        pointer.y = clamp(Math.floor((clientY / height) * GRID_H), 1, GRID_H - 2);
      }

      function injectBrush(cx, cy, radius = 6) {
        for (let oy = -radius; oy <= radius; oy += 1) {
          for (let ox = -radius; ox <= radius; ox += 1) {
            const d2 = ox * ox + oy * oy;
            if (d2 > radius * radius) continue;
            const x = clamp(cx + ox, 1, GRID_W - 2);
            const y = clamp(cy + oy, 1, GRID_H - 2);
            B[idx(x, y)] = 1;
          }
        }
      }

      function laplacian(field, x, y) {
        const c = idx(x, y);
        return (
          field[c] * -1 +
          field[idx(x - 1, y)] * 0.2 +
          field[idx(x + 1, y)] * 0.2 +
          field[idx(x, y - 1)] * 0.2 +
          field[idx(x, y + 1)] * 0.2 +
          field[idx(x - 1, y - 1)] * 0.05 +
          field[idx(x + 1, y - 1)] * 0.05 +
          field[idx(x - 1, y + 1)] * 0.05 +
          field[idx(x + 1, y + 1)] * 0.05
        );
      }

      function step() {
        const feed = FEED_BASE + Math.sin(tick * 0.004) * 0.0017;
        const kill = KILL_BASE + Math.cos(tick * 0.003) * 0.0015;

        for (let y = 1; y < GRID_H - 1; y += 1) {
          for (let x = 1; x < GRID_W - 1; x += 1) {
            const i = idx(x, y);
            const a = A[i];
            const b = B[i];
            const reaction = a * b * b;

            let na = a + (DA * laplacian(A, x, y) - reaction + feed * (1 - a)) * DT;
            let nb = b + (DB * laplacian(B, x, y) + reaction - (kill + feed) * b) * DT;

            nextA[i] = clamp(na, 0, 1);
            nextB[i] = clamp(nb, 0, 1);
          }
        }

        for (let x = 0; x < GRID_W; x += 1) {
          nextA[idx(x, 0)] = nextA[idx(x, 1)];
          nextA[idx(x, GRID_H - 1)] = nextA[idx(x, GRID_H - 2)];
          nextB[idx(x, 0)] = nextB[idx(x, 1)];
          nextB[idx(x, GRID_H - 1)] = nextB[idx(x, GRID_H - 2)];
        }

        for (let y = 0; y < GRID_H; y += 1) {
          nextA[idx(0, y)] = nextA[idx(1, y)];
          nextA[idx(GRID_W - 1, y)] = nextA[idx(GRID_W - 2, y)];
          nextB[idx(0, y)] = nextB[idx(1, y)];
          nextB[idx(GRID_W - 1, y)] = nextB[idx(GRID_W - 2, y)];
        }

        [A, nextA] = [nextA, A];
        [B, nextB] = [nextB, B];
      }

      function shade(v) {
        const c = (clamp(v, 0, 1) * 255) | 0;
        if (palette === 0) {
          return [c * 0.16, c * 0.8, c, 255];
        }
        if (palette === 1) {
          return [c, c * 0.42, 255 - c * 0.2, 255];
        }
        if (palette === 2) {
          return [255 - c * 0.2, c, c * 0.42, 255];
        }
        return [c * 0.85, 255 - c * 0.18, c * 0.25, 255];
      }

      function draw() {
        const px = image.data;

        for (let i = 0; i < SIZE; i += 1) {
          const v = A[i] - B[i];
          const [r, g, b, a] = shade(v);
          const p = i * 4;
          px[p] = r;
          px[p + 1] = g;
          px[p + 2] = b;
          px[p + 3] = a;
        }

        lowCtx.putImageData(image, 0, 0);

        ctx.imageSmoothingEnabled = false;
        ctx.clearRect(0, 0, width, height);
        ctx.drawImage(lowResCanvas, 0, 0, width, height);
      }

      function frame() {
        tick += 1;

        if (!paused) {
          if (pointer.down) {
            injectBrush(pointer.x, pointer.y, 7);
          }

          if (tick % 120 === 0) {
            const x = (GRID_W * (0.2 + Math.random() * 0.6)) | 0;
            const y = (GRID_H * (0.2 + Math.random() * 0.6)) | 0;
            injectBrush(x, y, 5);
          }

          for (let i = 0; i < STEPS_PER_FRAME; i += 1) {
            step();
          }
        }

        draw();
        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize);

      window.addEventListener("mousedown", (event) => {
        pointer.down = true;
        toGrid(event.clientX, event.clientY);
      });

      window.addEventListener("mouseup", () => {
        pointer.down = false;
      });

      window.addEventListener("mousemove", (event) => {
        toGrid(event.clientX, event.clientY);
      });

      window.addEventListener(
        "touchstart",
        (event) => {
          pointer.down = true;
          const t = event.touches[0];
          toGrid(t.clientX, t.clientY);
        },
        { passive: true }
      );

      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          toGrid(t.clientX, t.clientY);
        },
        { passive: true }
      );

      window.addEventListener("touchend", () => {
        pointer.down = false;
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "r") {
          reset();
        }
        if (key === "t") {
          palette = (palette + 1) % 4;
        }
        if (key === "p") {
          paused = !paused;
        }
      });

      resize();
      reset();
      frame();
    </script>
  </body>
</html>
