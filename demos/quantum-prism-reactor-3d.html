<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantum Prism Reactor 3D</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #060a13;
        color: #edf5ff;
        font-family: "Segoe UI", sans-serif;
      }
      #stage {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: 560px;
        background: rgba(8, 14, 28, 0.62);
        border: 1px solid rgba(166, 212, 255, 0.3);
        border-radius: 11px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }
      .hud h1 { margin: 0; font-size: 1rem; }
      .hud p { margin: 6px 0 0; font-size: 0.84rem; line-height: 1.35; }
      .home { color: #95d3ff; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Quantum Prism Reactor 3D</h1>
      <p>Procedural prism reactor with orbiting energy rails, chromatic beams, and pulse-reactive shards.</p>
      <p>Drag to orbit, wheel to zoom, click pulse burst, <strong>C</strong> palette, <strong>A</strong> auto-spin, <strong>R</strong> reseed shards.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";

      const canvas = document.getElementById('stage');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.18;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x060c16);
      scene.fog = new THREE.Fog(0x060c16, 8, 34);

      const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 140);

      const orbit = {
        target: new THREE.Vector3(0, 0.8, 0),
        theta: 0.92,
        phi: 1.05,
        radius: 10,
        dragging: false,
        px: 0,
        py: 0,
      };

      function updateCamera() {
        orbit.radius = Math.max(4.2, Math.min(18, orbit.radius));
        orbit.phi = Math.max(0.24, Math.min(Math.PI - 0.2, orbit.phi));
        const sinPhi = Math.sin(orbit.phi);
        camera.position.set(
          orbit.target.x + orbit.radius * sinPhi * Math.sin(orbit.theta),
          orbit.target.y + orbit.radius * Math.cos(orbit.phi),
          orbit.target.z + orbit.radius * sinPhi * Math.cos(orbit.theta)
        );
        camera.lookAt(orbit.target);
      }

      scene.add(new THREE.HemisphereLight(0x8bd2ff, 0x081323, 0.72));
      const key = new THREE.PointLight(0x73d2ff, 10, 36, 2);
      key.position.set(4.5, 3.0, 2.8);
      scene.add(key);
      const fill = new THREE.PointLight(0x9bffd6, 5, 34, 2);
      fill.position.set(-4.0, 1.2, -3.7);
      scene.add(fill);

      const base = new THREE.Mesh(
        new THREE.CylinderGeometry(2.2, 2.6, 0.6, 40),
        new THREE.MeshStandardMaterial({ color: 0x1b2b45, roughness: 0.78, metalness: 0.2 })
      );
      base.position.y = -1.0;
      scene.add(base);

      const prism = new THREE.Mesh(
        new THREE.CylinderGeometry(0.75, 0.75, 2.2, 6),
        new THREE.MeshStandardMaterial({
          color: 0x87d6ff,
          emissive: 0x33a8ff,
          emissiveIntensity: 0.9,
          roughness: 0.18,
          metalness: 0.7,
          transparent: true,
          opacity: 0.85,
        })
      );
      prism.position.y = 0.8;
      scene.add(prism);

      const rails = [];
      for (let i = 0; i < 3; i += 1) {
        const rail = new THREE.Mesh(
          new THREE.TorusGeometry(1.45 + i * 0.35, 0.05, 12, 180),
          new THREE.MeshStandardMaterial({
            color: 0x79d6ff,
            emissive: 0x2f9fff,
            emissiveIntensity: 0.85,
            roughness: 0.22,
            metalness: 0.82,
          })
        );
        rail.position.y = 0.8;
        rail.rotation.set(Math.PI * (0.22 + i * 0.3), Math.PI * (0.08 + i * 0.2), Math.PI * i * 0.18);
        scene.add(rail);
        rails.push(rail);
      }

      const shardGroup = new THREE.Group();
      scene.add(shardGroup);
      let shards = [];

      function reseedShards() {
        for (const s of shards) shardGroup.remove(s.mesh);
        shards = [];

        for (let i = 0; i < 48; i += 1) {
          const mesh = new THREE.Mesh(
            new THREE.ConeGeometry(0.07 + Math.random() * 0.1, 0.34 + Math.random() * 0.6, 5),
            new THREE.MeshStandardMaterial({
              color: 0x9de3ff,
              emissive: 0x2e8fd1,
              emissiveIntensity: 0.45,
              roughness: 0.2,
              metalness: 0.64,
            })
          );
          shardGroup.add(mesh);
          shards.push({
            mesh,
            radius: 2.3 + Math.random() * 1.8,
            height: -0.5 + Math.random() * 2.6,
            angle: Math.random() * Math.PI * 2,
            speed: 0.35 + Math.random() * 0.9,
            tilt: (Math.random() - 0.5) * 1.4,
          });
        }
      }

      reseedShards();

      let autoSpin = true;
      let palette = 0;
      let pulse = 0;

      function applyPalette() {
        if (palette === 0) {
          prism.material.color.set(0x87d6ff);
          prism.material.emissive.set(0x33a8ff);
          rails.forEach((r) => { r.material.color.set(0x79d6ff); r.material.emissive.set(0x2f9fff); });
        } else if (palette === 1) {
          prism.material.color.set(0xffcb86);
          prism.material.emissive.set(0xff9a3f);
          rails.forEach((r) => { r.material.color.set(0xffc17c); r.material.emissive.set(0xff8a37); });
        } else {
          prism.material.color.set(0xc4a4ff);
          prism.material.emissive.set(0x7d6aff);
          rails.forEach((r) => { r.material.color.set(0xc0afff); r.material.emissive.set(0x6b70ff); });
        }
      }

      function onPointerDown(x, y) {
        orbit.dragging = true;
        orbit.px = x;
        orbit.py = y;
      }
      function onPointerMove(x, y) {
        if (!orbit.dragging) return;
        const dx = x - orbit.px;
        const dy = y - orbit.py;
        orbit.px = x;
        orbit.py = y;
        orbit.theta -= dx * 0.005;
        orbit.phi += dy * 0.0042;
      }

      addEventListener('mousedown', (e) => onPointerDown(e.clientX, e.clientY));
      addEventListener('mousemove', (e) => onPointerMove(e.clientX, e.clientY));
      addEventListener('mouseup', () => { orbit.dragging = false; });
      addEventListener('touchstart', (e) => { const t = e.touches[0]; onPointerDown(t.clientX, t.clientY); }, { passive: true });
      addEventListener('touchmove', (e) => { const t = e.touches[0]; onPointerMove(t.clientX, t.clientY); }, { passive: true });
      addEventListener('touchend', () => { orbit.dragging = false; });
      addEventListener('wheel', (e) => { orbit.radius += e.deltaY * 0.01; });

      addEventListener('click', () => {
        pulse = Math.min(1.9, pulse + 1.0);
      });

      addEventListener('keydown', (event) => {
        const k = event.key.toLowerCase();
        if (k === 'a') autoSpin = !autoSpin;
        if (k === 'c') {
          palette = (palette + 1) % 3;
          applyPalette();
        }
        if (k === 'r') reseedShards();
      });

      addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const clock = new THREE.Clock();
      applyPalette();

      function render() {
        const t = clock.getElapsedTime();

        if (autoSpin && !orbit.dragging) orbit.theta += 0.0015;
        updateCamera();

        pulse = Math.max(0, pulse - 0.02);

        prism.rotation.y += 0.003;
        prism.rotation.x = Math.sin(t * 0.6) * 0.1;
        prism.material.emissiveIntensity = 0.85 + pulse * 1.5;

        rails.forEach((r, i) => {
          r.rotation.x += 0.002 + i * 0.0008;
          r.rotation.y += 0.0023 + i * 0.0012;
          r.material.emissiveIntensity = 0.8 + pulse * 1.2 + Math.sin(t * 2 + i) * 0.14;
        });

        shards.forEach((s) => {
          s.angle += 0.003 * s.speed;
          const wobble = Math.sin(t * s.speed + s.tilt) * 0.24;
          s.mesh.position.set(
            Math.cos(s.angle) * (s.radius + wobble),
            s.height + Math.sin(t * 1.7 + s.angle * 2.2) * 0.18,
            Math.sin(s.angle) * (s.radius + wobble)
          );
          s.mesh.rotation.set(t * 0.8 + s.tilt, t * 1.1 + s.angle, t * 0.5 + s.tilt * 0.4);
          s.mesh.material.emissiveIntensity = 0.35 + pulse * 0.7;
        });

        key.position.set(Math.cos(t * 0.8) * 4.6, 2.7 + Math.sin(t * 1.0), Math.sin(t * 0.8) * 4.6);
        fill.position.set(Math.cos(-t * 0.55) * 4.1, 1.2 + Math.cos(t * 0.9), Math.sin(-t * 0.55) * 4.1);

        renderer.render(scene, camera);
        requestAnimationFrame(render);
      }

      render();
    </script>
  </body>
</html>
