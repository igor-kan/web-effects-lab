<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wireframe Wormhole 3D</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #02060f;
        font-family: "Segoe UI", sans-serif;
        color: #eaf6ff;
      }

      #stage {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: 540px;
        background: rgba(8, 16, 30, 0.62);
        border: 1px solid rgba(147, 214, 255, 0.34);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
      }

      .home {
        color: #9cd7ff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Wireframe Wormhole 3D</h1>
      <p>
        Neon wireframe tunnel composed of animated ring slices with camera drift and speed modulation.
      </p>
      <p>Move pointer to steer, click boost, <strong>Q</strong> speed mode, <strong>P</strong> pause.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";

      const canvas = document.getElementById("stage");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.05;

      const scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x02060f, 4, 70);

      const camera = new THREE.PerspectiveCamera(64, window.innerWidth / window.innerHeight, 0.1, 150);

      const hemi = new THREE.HemisphereLight(0x7ee7ff, 0x081321, 0.65);
      scene.add(hemi);

      const rings = [];
      const RING_COUNT = 160;

      function ringShape(z) {
        const r = 2.2 + Math.sin(z * 0.22) * 0.33 + Math.cos(z * 0.17) * 0.23;
        return r;
      }

      const lineMaterial = new THREE.MeshBasicMaterial({
        color: 0x7ce7ff,
        wireframe: true,
        transparent: true,
        opacity: 0.62,
      });

      for (let i = 0; i < RING_COUNT; i += 1) {
        const z = -i * 0.55;
        const radius = ringShape(z);
        const geo = new THREE.TorusGeometry(radius, 0.06, 6, 48);
        const mesh = new THREE.Mesh(geo, lineMaterial.clone());
        mesh.position.z = z;
        mesh.rotation.x = Math.sin(i * 0.25) * 0.2;
        mesh.rotation.y = Math.cos(i * 0.21) * 0.2;
        mesh.material.color.setHSL(0.54 + Math.sin(i * 0.13) * 0.06, 0.95, 0.62);
        scene.add(mesh);
        rings.push(mesh);
      }

      const starsGeo = new THREE.BufferGeometry();
      const STAR_COUNT = 1100;
      const starPos = new Float32Array(STAR_COUNT * 3);
      for (let i = 0; i < STAR_COUNT; i += 1) {
        const i3 = i * 3;
        starPos[i3] = (Math.random() * 2 - 1) * 28;
        starPos[i3 + 1] = (Math.random() * 2 - 1) * 16;
        starPos[i3 + 2] = -Math.random() * 90;
      }
      starsGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
      const starsMat = new THREE.PointsMaterial({ color: 0x9fe8ff, size: 0.05, transparent: true, opacity: 0.85 });
      const stars = new THREE.Points(starsGeo, starsMat);
      scene.add(stars);

      const pointer = { x: 0.5, y: 0.5, tx: 0.5, ty: 0.5 };

      let paused = false;
      let speedMode = 1;
      let boost = 0;
      let travel = 0;
      let prev = performance.now();

      function speedValue() {
        if (speedMode === 0) return 6;
        if (speedMode === 1) return 11;
        return 17;
      }

      function updatePointer(clientX, clientY) {
        pointer.tx = clientX / window.innerWidth;
        pointer.ty = clientY / window.innerHeight;
      }

      function animate(now) {
        const dt = Math.min(0.05, (now - prev) * 0.001);
        prev = now;

        pointer.x += (pointer.tx - pointer.x) * 0.08;
        pointer.y += (pointer.ty - pointer.y) * 0.08;

        boost = Math.max(0, boost - dt * 0.9);

        if (!paused) {
          travel += dt * (speedValue() + boost * 10);
        }

        camera.position.set((pointer.x - 0.5) * 1.8, -(pointer.y - 0.5) * 1.3, 0.6);
        camera.lookAt((pointer.x - 0.5) * 1.1, -(pointer.y - 0.5) * 0.9, -12);

        for (let i = 0; i < rings.length; i += 1) {
          const ring = rings[i];
          const zBase = -i * 0.55 + (travel % (RING_COUNT * 0.55));
          ring.position.z = zBase;

          const r = ringShape(zBase + travel * 0.45 + i * 0.09);
          ring.scale.setScalar(0.72 + r * 0.22);

          ring.rotation.z += 0.004 + i * 0.00001;
          ring.rotation.x = Math.sin(travel * 0.5 + i * 0.15) * 0.38;
          ring.rotation.y = Math.cos(travel * 0.62 + i * 0.11) * 0.38;

          const hue = 0.51 + Math.sin(travel * 0.65 + i * 0.07) * 0.1;
          ring.material.color.setHSL(hue, 0.95, 0.62);
          ring.material.opacity = 0.35 + Math.max(0, 1 - Math.abs(ring.position.z) / 28) * 0.35;
        }

        const arr = starsGeo.attributes.position.array;
        for (let i = 0; i < STAR_COUNT; i += 1) {
          const i3 = i * 3;
          arr[i3 + 2] += dt * (speedValue() + boost * 10) * 2.6;
          if (arr[i3 + 2] > 2) {
            arr[i3] = (Math.random() * 2 - 1) * 28;
            arr[i3 + 1] = (Math.random() * 2 - 1) * 16;
            arr[i3 + 2] = -90;
          }
        }
        starsGeo.attributes.position.needsUpdate = true;

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      window.addEventListener("mousemove", (event) => updatePointer(event.clientX, event.clientY));
      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          updatePointer(t.clientX, t.clientY);
        },
        { passive: true }
      );

      window.addEventListener("click", () => {
        boost = Math.min(1.4, boost + 0.55);
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "q") {
          speedMode = (speedMode + 1) % 3;
        }
        if (key === "p") {
          paused = !paused;
        }
      });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      requestAnimationFrame(animate);
    </script>
  </body>
</html>
