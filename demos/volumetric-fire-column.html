<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volumetric Fire Column</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #05070d;
        color: #f0f8ff;
        font-family: "Segoe UI", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 9;
        max-width: 560px;
        background: rgba(8, 15, 28, 0.62);
        border: 1px solid rgba(146, 212, 255, 0.34);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.36;
      }

      .home {
        color: #9fd8ff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Volumetric Fire Column</h1>
      <p>
        Layered fire and soot particle system with buoyant plume behavior, embers, and turbulent updraft.
      </p>
      <p>Move pointer to steer nozzle, click burst, <strong>W</strong> wind cycle, <strong>R</strong> reset.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d");

      let width = window.innerWidth;
      let height = window.innerHeight;
      let prev = performance.now();

      const flames = [];
      const smoke = [];
      const embers = [];

      const MAX_FLAME = 3200;
      const MAX_SMOKE = 1800;
      const MAX_EMBERS = 1100;

      let windMode = 0;
      let burst = 0;
      let time = 0;

      const nozzle = {
        x: width * 0.5,
        y: height * 0.86,
        tx: width * 0.5,
        ty: height * 0.86,
      };

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function reset() {
        flames.length = 0;
        smoke.length = 0;
        embers.length = 0;
      }

      function spawnFlame(count) {
        for (let i = 0; i < count; i += 1) {
          if (flames.length >= MAX_FLAME) break;

          flames.push({
            x: nozzle.x + (Math.random() * 2 - 1) * 18,
            y: nozzle.y + (Math.random() * 2 - 1) * 6,
            vx: (Math.random() * 2 - 1) * 0.8,
            vy: -2.2 - Math.random() * 2.4,
            life: 1,
            size: 5 + Math.random() * 10,
            heat: 0.7 + Math.random() * 0.3,
          });
        }
      }

      function spawnSmoke(x, y, intensity = 1) {
        if (smoke.length >= MAX_SMOKE) return;
        smoke.push({
          x,
          y,
          vx: (Math.random() * 2 - 1) * 0.4,
          vy: -0.4 - Math.random() * 0.8,
          life: 0.5 + Math.random() * 0.8,
          size: (12 + Math.random() * 24) * intensity,
          shade: 0.35 + Math.random() * 0.45,
        });
      }

      function spawnEmber(x, y) {
        if (embers.length >= MAX_EMBERS) return;
        embers.push({
          x,
          y,
          vx: (Math.random() * 2 - 1) * 1.6,
          vy: -1 - Math.random() * 2.2,
          life: 0.5 + Math.random() * 0.6,
          size: 1 + Math.random() * 2,
        });
      }

      function windValue() {
        if (windMode === 0) return 0;
        if (windMode === 1) return 0.09;
        return -0.09;
      }

      function update(dt) {
        time += dt;
        burst = Math.max(0, burst - dt * 0.8);

        nozzle.x += (nozzle.tx - nozzle.x) * 0.08;
        nozzle.y += (nozzle.ty - nozzle.y) * 0.08;

        const emission = 34 + Math.floor(burst * 28);
        spawnFlame(emission);

        const wind = windValue();

        for (let i = flames.length - 1; i >= 0; i -= 1) {
          const f = flames[i];
          const turb = Math.sin((f.x * 0.014 + time * 8) + Math.cos(f.y * 0.01 - time * 6));

          f.vx += (turb * 0.08 + wind * 0.8) * dt * 60;
          f.vy -= (0.04 + f.heat * 0.05) * dt * 60;

          f.vx *= 0.985;
          f.vy *= 0.988;

          f.x += f.vx;
          f.y += f.vy;

          f.life -= (0.016 + (1 - f.heat) * 0.008) * dt * 60;
          f.heat *= 0.992;

          if (Math.random() < 0.07) {
            spawnEmber(f.x, f.y);
          }

          if (f.life < 0.55 && Math.random() < 0.24) {
            spawnSmoke(f.x, f.y, 0.8 + (1 - f.life));
          }

          if (f.life <= 0 || f.y < -40 || f.x < -80 || f.x > width + 80) {
            flames.splice(i, 1);
          }
        }

        for (let i = smoke.length - 1; i >= 0; i -= 1) {
          const s = smoke[i];
          const turb = Math.sin((s.x * 0.009 + time * 2.2) - Math.cos(s.y * 0.01 + time * 2.8));

          s.vx += (turb * 0.035 + wind * 0.45) * dt * 60;
          s.vy -= 0.012 * dt * 60;

          s.vx *= 0.994;
          s.vy *= 0.994;

          s.x += s.vx;
          s.y += s.vy;
          s.life -= 0.0045 * dt * 60;
          s.size *= 1.003;

          if (s.life <= 0 || s.y < -80 || s.x < -160 || s.x > width + 160) {
            smoke.splice(i, 1);
          }
        }

        for (let i = embers.length - 1; i >= 0; i -= 1) {
          const e = embers[i];
          e.vx += wind * 0.03 * dt * 60;
          e.vy += 0.012 * dt * 60;
          e.vx *= 0.995;
          e.vy *= 0.996;
          e.x += e.vx;
          e.y += e.vy;
          e.life -= 0.012 * dt * 60;

          if (e.life <= 0 || e.y > height + 40 || e.x < -40 || e.x > width + 40) {
            embers.splice(i, 1);
          }
        }
      }

      function drawRadial(x, y, radius, inner, outer, alpha, colorInner, colorOuter) {
        const g = ctx.createRadialGradient(x, y, inner, x, y, radius);
        g.addColorStop(0, `${colorInner}${alpha})`);
        g.addColorStop(1, `${colorOuter}0)`);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      function render() {
        ctx.fillStyle = "rgba(5, 7, 13, 0.2)";
        ctx.fillRect(0, 0, width, height);

        ctx.globalCompositeOperation = "source-over";
        for (const s of smoke) {
          const a = Math.min(0.28, s.life * 0.22);
          drawRadial(s.x, s.y, s.size, 0, s.size, a, "rgba(120, 140, 156, ", "rgba(20, 26, 35, ");
        }

        ctx.globalCompositeOperation = "lighter";
        for (const f of flames) {
          const hot = Math.pow(f.life, 0.55);
          const radius = f.size * (0.62 + hot * 0.52);
          const alpha = Math.min(0.95, hot * 0.75 + burst * 0.2);
          drawRadial(f.x, f.y, radius, 0.4, radius, alpha, "rgba(255, 240, 180, ", "rgba(255, 80, 20, ");
        }

        for (const e of embers) {
          const a = Math.min(0.95, e.life * 1.15);
          ctx.fillStyle = `rgba(255, 183, 92, ${a})`;
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.globalCompositeOperation = "source-over";
      }

      function frame(now) {
        const dt = Math.min(0.05, (now - prev) * 0.001);
        prev = now;

        update(dt);
        render();
        requestAnimationFrame(frame);
      }

      function updatePointer(clientX, clientY) {
        nozzle.tx = clientX;
        nozzle.ty = clientY;
      }

      window.addEventListener("mousemove", (event) => updatePointer(event.clientX, event.clientY));

      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          updatePointer(t.clientX, t.clientY);
        },
        { passive: true }
      );

      window.addEventListener("click", () => {
        burst = Math.min(1.2, burst + 0.45);
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "w") {
          windMode = (windMode + 1) % 3;
        }
        if (key === "r") {
          reset();
        }
      });

      window.addEventListener("resize", resize);

      resize();
      reset();
      ctx.fillStyle = "#05070d";
      ctx.fillRect(0, 0, width, height);
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
