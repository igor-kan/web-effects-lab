<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fluid Flow Dye</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #030914;
        color: #dff3ff;
        font-family: "Trebuchet MS", sans-serif;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 14px;
        top: 14px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(5, 18, 36, 0.55);
        border: 1px solid rgba(146, 214, 255, 0.3);
        backdrop-filter: blur(8px);
        max-width: 380px;
        z-index: 5;
      }

      .hud h1 {
        margin: 0;
        font-size: 1rem;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 0.84rem;
        line-height: 1.35;
        opacity: 0.9;
      }

      .home {
        color: #8ecfff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <h1>Fluid Flow Dye</h1>
      <p>Drag pointer to inject color and momentum. Press <strong>Space</strong> to reset.</p>
      <p><a class="home" href="../index.html">Back to gallery</a></p>
    </div>

    <script>
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d");

      const N = 84;
      const DT = 0.11;
      const DIFF = 0.00007;
      const VISC = 0.00002;
      const ITER = 8;
      const SIZE = (N + 2) * (N + 2);

      const u = new Float32Array(SIZE);
      const v = new Float32Array(SIZE);
      const uPrev = new Float32Array(SIZE);
      const vPrev = new Float32Array(SIZE);
      const density = new Float32Array(SIZE);
      const densityPrev = new Float32Array(SIZE);

      let width = window.innerWidth;
      let height = window.innerHeight;
      let cellW = width / N;
      let cellH = height / N;

      const pointer = {
        down: false,
        x: width * 0.5,
        y: height * 0.5,
        px: width * 0.5,
        py: height * 0.5,
      };

      function ix(x, y) {
        return x + (N + 2) * y;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function setBounds(b, x) {
        for (let i = 1; i <= N; i += 1) {
          x[ix(0, i)] = b === 1 ? -x[ix(1, i)] : x[ix(1, i)];
          x[ix(N + 1, i)] = b === 1 ? -x[ix(N, i)] : x[ix(N, i)];
          x[ix(i, 0)] = b === 2 ? -x[ix(i, 1)] : x[ix(i, 1)];
          x[ix(i, N + 1)] = b === 2 ? -x[ix(i, N)] : x[ix(i, N)];
        }

        x[ix(0, 0)] = 0.5 * (x[ix(1, 0)] + x[ix(0, 1)]);
        x[ix(0, N + 1)] = 0.5 * (x[ix(1, N + 1)] + x[ix(0, N)]);
        x[ix(N + 1, 0)] = 0.5 * (x[ix(N, 0)] + x[ix(N + 1, 1)]);
        x[ix(N + 1, N + 1)] = 0.5 * (x[ix(N, N + 1)] + x[ix(N + 1, N)]);
      }

      function linSolve(b, x, x0, a, c) {
        for (let k = 0; k < ITER; k += 1) {
          for (let j = 1; j <= N; j += 1) {
            for (let i = 1; i <= N; i += 1) {
              x[ix(i, j)] =
                (x0[ix(i, j)] +
                  a * (x[ix(i - 1, j)] + x[ix(i + 1, j)] + x[ix(i, j - 1)] + x[ix(i, j + 1)])) /
                c;
            }
          }
          setBounds(b, x);
        }
      }

      function diffuse(b, x, x0, diff, dt) {
        const a = dt * diff * N * N;
        linSolve(b, x, x0, a, 1 + 4 * a);
      }

      function advect(b, d, d0, uField, vField, dt) {
        const dt0 = dt * N;

        for (let j = 1; j <= N; j += 1) {
          for (let i = 1; i <= N; i += 1) {
            let x = i - dt0 * uField[ix(i, j)];
            let y = j - dt0 * vField[ix(i, j)];

            x = clamp(x, 0.5, N + 0.5);
            y = clamp(y, 0.5, N + 0.5);

            const i0 = Math.floor(x);
            const i1 = i0 + 1;
            const j0 = Math.floor(y);
            const j1 = j0 + 1;

            const s1 = x - i0;
            const s0 = 1 - s1;
            const t1 = y - j0;
            const t0 = 1 - t1;

            d[ix(i, j)] =
              s0 * (t0 * d0[ix(i0, j0)] + t1 * d0[ix(i0, j1)]) +
              s1 * (t0 * d0[ix(i1, j0)] + t1 * d0[ix(i1, j1)]);
          }
        }

        setBounds(b, d);
      }

      function project(uField, vField, p, div) {
        for (let j = 1; j <= N; j += 1) {
          for (let i = 1; i <= N; i += 1) {
            div[ix(i, j)] =
              (-0.5 *
                (uField[ix(i + 1, j)] - uField[ix(i - 1, j)] + vField[ix(i, j + 1)] - vField[ix(i, j - 1)])) /
              N;
            p[ix(i, j)] = 0;
          }
        }

        setBounds(0, div);
        setBounds(0, p);
        linSolve(0, p, div, 1, 4);

        for (let j = 1; j <= N; j += 1) {
          for (let i = 1; i <= N; i += 1) {
            uField[ix(i, j)] -= 0.5 * N * (p[ix(i + 1, j)] - p[ix(i - 1, j)]);
            vField[ix(i, j)] -= 0.5 * N * (p[ix(i, j + 1)] - p[ix(i, j - 1)]);
          }
        }

        setBounds(1, uField);
        setBounds(2, vField);
      }

      function addDensity(gridX, gridY, amount) {
        density[ix(gridX, gridY)] += amount;
      }

      function addVelocity(gridX, gridY, amountX, amountY) {
        const index = ix(gridX, gridY);
        u[index] += amountX;
        v[index] += amountY;
      }

      function stepFluid() {
        uPrev.set(u);
        diffuse(1, u, uPrev, VISC, DT);

        vPrev.set(v);
        diffuse(2, v, vPrev, VISC, DT);

        project(u, v, uPrev, vPrev);

        uPrev.set(u);
        vPrev.set(v);
        advect(1, u, uPrev, uPrev, vPrev, DT);
        advect(2, v, vPrev, uPrev, vPrev, DT);

        project(u, v, uPrev, vPrev);

        densityPrev.set(density);
        diffuse(0, density, densityPrev, DIFF, DT);

        densityPrev.set(density);
        advect(0, density, densityPrev, u, v, DT);

        for (let i = 0; i < SIZE; i += 1) {
          density[i] *= 0.994;
        }
      }

      function injectFromPointer() {
        if (!pointer.down) {
          return;
        }

        const gx = clamp(Math.floor((pointer.x / width) * N) + 1, 1, N);
        const gy = clamp(Math.floor((pointer.y / height) * N) + 1, 1, N);

        const dx = pointer.x - pointer.px;
        const dy = pointer.y - pointer.py;

        for (let oy = -2; oy <= 2; oy += 1) {
          for (let ox = -2; ox <= 2; ox += 1) {
            const x = clamp(gx + ox, 1, N);
            const y = clamp(gy + oy, 1, N);
            const falloff = 1 - Math.min(1, (ox * ox + oy * oy) / 9);
            addDensity(x, y, 140 * falloff);
            addVelocity(x, y, dx * 0.16 * falloff, dy * 0.16 * falloff);
          }
        }

        pointer.px = pointer.x;
        pointer.py = pointer.y;
      }

      function autoPulse(time) {
        const centerX = Math.floor(N * 0.5 + Math.sin(time * 0.0008) * N * 0.17);
        const centerY = Math.floor(N * 0.52 + Math.cos(time * 0.0011) * N * 0.13);
        addDensity(centerX, centerY, 16);
        addVelocity(centerX, centerY, Math.cos(time * 0.003) * 0.07, Math.sin(time * 0.0034) * 0.07);
      }

      function draw() {
        ctx.fillStyle = "rgba(4, 10, 20, 0.28)";
        ctx.fillRect(0, 0, width, height);

        for (let j = 1; j <= N; j += 1) {
          for (let i = 1; i <= N; i += 1) {
            const index = ix(i, j);
            const d = density[index];

            if (d < 0.08) {
              continue;
            }

            const speed = Math.hypot(u[index], v[index]);
            const hue = 186 + Math.min(80, d * 0.25) + speed * 190;
            const light = Math.min(78, 18 + d * 0.08 + speed * 220);
            const alpha = Math.min(0.92, d * 0.012);

            ctx.fillStyle = `hsla(${hue}, 95%, ${light}%, ${alpha})`;
            ctx.fillRect((i - 1) * cellW, (j - 1) * cellH, cellW + 1, cellH + 1);
          }
        }
      }

      function frame(time) {
        autoPulse(time);
        injectFromPointer();

        for (let i = 0; i < 2; i += 1) {
          stepFluid();
        }

        draw();
        requestAnimationFrame(frame);
      }

      function reset() {
        u.fill(0);
        v.fill(0);
        uPrev.fill(0);
        vPrev.fill(0);
        density.fill(0);
        densityPrev.fill(0);
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        cellW = width / N;
        cellH = height / N;
      }

      function pointerEvent(clientX, clientY) {
        pointer.x = clientX;
        pointer.y = clientY;
      }

      window.addEventListener("resize", resize);
      window.addEventListener("mousedown", (event) => {
        pointer.down = true;
        pointerEvent(event.clientX, event.clientY);
        pointer.px = event.clientX;
        pointer.py = event.clientY;
      });
      window.addEventListener("mouseup", () => {
        pointer.down = false;
      });
      window.addEventListener("mousemove", (event) => {
        pointerEvent(event.clientX, event.clientY);
      });

      window.addEventListener(
        "touchstart",
        (event) => {
          const t = event.touches[0];
          pointer.down = true;
          pointerEvent(t.clientX, t.clientY);
          pointer.px = t.clientX;
          pointer.py = t.clientY;
        },
        { passive: true }
      );

      window.addEventListener(
        "touchmove",
        (event) => {
          const t = event.touches[0];
          pointerEvent(t.clientX, t.clientY);
        },
        { passive: true }
      );

      window.addEventListener("touchend", () => {
        pointer.down = false;
      });

      window.addEventListener("keydown", (event) => {
        if (event.code === "Space") {
          reset();
        }
      });

      resize();
      reset();
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
